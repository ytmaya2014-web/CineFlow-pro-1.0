        </button>
      `).join('')}
    </div>

    <div class="section-title"><h3>最近阅读</h3><span>${recentDocs.length ? '自动记录' : '尚未打开文档'}</span></div>
    <div class="list">
      ${recentDocs.length ? recentDocs.slice(0,4).map(doc => docCard(doc)).join('') : '<div class="empty">你打开过的文档会出现在这里，方便手机上快速回看。</div>'}
    </div>

    <div class="section-title"><h3>收藏夹</h3><span>${favoriteDocs.length ? '可长期置顶' : '尚未收藏'}</span></div>
    <div class="list">
      ${favoriteDocs.length ? favoriteDocs.slice(0,4).map(doc => docCard(doc)).join('') : '<div class="empty">把最常用的稿件加入收藏，提案、沟通和现场对照都会更顺手。</div>'}
    </div>

    <div class="footer-space"></div>
  `;
}
function renderCategory() {
  const name = state.currentFilter;
  let docs = [];
  let intro = '';
  let groups = null;

  if (name === '纪录片') {
    const gov = sectionDocs('documentary', '政府版');
    const owner = sectionDocs('documentary', '业主版');
    intro = '纪录片部分分为政府版与业主版：前者建立标准、责任与建设可信度，后者建立未来生活的信任与代入。';
    groups = [
      {title:'政府版', desc:'更偏政府、行业与建设能力的表达。', docs: gov},
      {title:'业主版', desc:'更偏准业主、生活感与真实体验的表达。', docs: owner}
    ];
  } else if (name === '概念版') {
    docs = sectionDocs('concept');
    intro = '概念版不是纪录片的附属，而是独立的精神主片链条。这里保留从母题、旁白到执行与后期的推进路径。';
  }

  return `
    <div class="topbar">
      <div class="brand">
        <div>
          <h1>${name}</h1>
          <p>${intro}</p>
        </div>
        <button class="icon-btn" onclick="setView('home')">返回首页</button>
      </div>
    </div>

    ${groups ? groups.map(group => `
      <div class="section-title"><h3>${group.title}</h3><span>${group.docs.length} 篇</span></div>
      <div class="card"><p>${group.desc}</p></div>
      <div class="list">${group.docs.map(doc => docCard(doc)).join('')}</div>
    `).join('') : `
      <div class="section-title"><h3>文档列表</h3><span>${docs.length} 篇</span></div>
      <div class="list">${docs.map(doc => docCard(doc)).join('')}</div>
    `}
  `;
}
function renderQuick() {
  const audience = state.quickAudience || '甲方';
  const docs = audienceDocs(audience);
  const descMap = {
    '甲方':'优先看整体逻辑、分工关系与最能建立方向认知的核心稿件。',
    '剧组':'优先看执行、分镜、拍摄与后期协同关系明确的工作稿。',
    '影棚':'优先看概念版里涉及模型、虚拟影棚、演员与空间转换的文档。',
    '统筹':'适合自己总控项目推进，快速切换三部影片的任务边界与工作口径。'
  };
  return `
    <div class="topbar">
      <div class="brand">
        <div>
          <h1>快速导航</h1>
          <p>${descMap[audience]}</p>
        </div>
        <button class="icon-btn" onclick="setView('home')">返回首页</button>
      </div>
    </div>

    <div class="chip-row" style="margin:10px 0 16px">
      ${['甲方','剧组','影棚','统筹'].map(item => `
        <button class="chip ${item === audience ? 'active' : ''}" onclick="openQuick('${item}')">${item}</button>
      `).join('')}
    </div>

    <div class="list">${docs.map(doc => docCard(doc)).join('')}</div>
  `;
}
function renderSearch() {
  const q = state.searchKeyword.trim().toLowerCase();
  let results = [];
  if (q) {
    results = DOCS.filter(doc => [doc.title, doc.subtitle, doc.desc, doc.text, ...(doc.tags||[]), ...(doc.audience||[])]
      .join('\n').toLowerCase().includes(q));
  }
  return `
    <div class="topbar">
      <div class="brand">
        <div>
          <h1>搜索</h1>
          <p>可搜标题、说明、标签和正文内容</p>
        </div>
        <button class="icon-btn" onclick="setView('home')">首页</button>
      </div>
    </div>

    <div class="searchbar">
      <input id="searchInput" type="search" placeholder="例如：虚拟影棚 / 家 / 政府版 / 分镜 / 后期" value="${escapeHtml(state.searchKeyword)}" />
      <button class="primary-btn" onclick="runSearch()">搜索</button>
    </div>

    <div class="section-title"><h3>${q ? '搜索结果' : '建议关键词'}</h3><span>${q ? results.length + ' 条' : '点一下即可搜'}</span></div>

    ${q ? `
      <div class="list">
        ${results.length ? results.map(doc => docCard(doc)).join('') : '<div class="empty">没有找到相关内容。试试更短的关键词，或者换一个表达。</div>'}
      </div>
    ` : `
      <div class="chip-row">
        ${['概念版','政府版','业主版','分镜','后期','旁白','虚拟影棚','家','城市更新','执行'].map(k => `
          <button class="chip" onclick="useKeyword('${k}')">${k}</button>
        `).join('')}
      </div>
    `}
  `;
}
function renderFavOrRecent(kind) {
  const ids = kind === 'favorites' ? state.favorites : state.recents;
  const docs = ids.map(byId).filter(Boolean);
  const title = kind === 'favorites' ? '收藏夹' : '最近阅读';
  const desc = kind === 'favorites'
    ? '把你最常用的稿件放在这里，现场沟通、开会与提案时会更高效。'
    : '自动记录最近打开过的文档，方便你快速继续阅读。';
  return `
    <div class="topbar">
      <div class="brand">
        <div>
          <h1>${title}</h1>
          <p>${desc}</p>
        </div>
        <button class="icon-btn" onclick="setView('home')">首页</button>
      </div>
    </div>
    <div class="list">${docs.length ? docs.map(doc => docCard(doc)).join('') : '<div class="empty">这里还没有内容。</div>'}</div>
  `;
}
function renderDoc() {
  const doc = byId(state.currentDocId);
  if (!doc) return '<div class="empty">文档不存在。</div>';
  const progress = Math.round((state.progress[doc.id] || 0) * 100);
  const crumbTarget = doc.section === 'overall' ? "setView('home')" : `setView('category', '${doc.group}')`;
  const crumbText = doc.section === 'overall' ? '整体介绍' : doc.group;
  return `
    <div class="doc-header">
      <div class="breadcrumb">
        <button onclick="setView('home')">首页</button>
        <span>·</span>
        <button onclick="${crumbTarget}">${crumbText}</button>
        ${doc.subgroup ? `<span>·</span><span>${doc.subgroup}</span>` : ''}
      </div>
      <div class="brand">
        <div>
          <h1 style="font-size:22px; margin:0">${doc.title}</h1>
          <p>${doc.desc}</p>
        </div>
        <button class="icon-btn" onclick="goBackSmart()">返回</button>
      </div>
      <div class="doc-actions">
        <button class="ghost-btn" onclick="toggleFavorite('${doc.id}')">${state.favorites.includes(doc.id) ? '取消收藏' : '加入收藏'}</button>
        <button class="ghost-btn" onclick="toggleReading()">${state.readingMode ? '退出纯阅读' : '纯阅读模式'}</button>
        <button class="ghost-btn" onclick="toggleTheme()">${state.darkMode ? '日间' : '夜间'}</button>
      </div>
      <div class="chip-row" style="margin-top:12px">
        <span class="chip">${doc.group}</span>
        ${doc.subgroup ? `<span class="chip">${doc.subgroup}</span>` : ''}
        <span class="chip">${doc.subtitle || '工作稿'}</span>
        ${(doc.tags||[]).slice(0,4).map(tag => `<span class="chip">${tag}</span>`).join('')}
      </div>
      <div style="margin-top:12px" class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="mini" style="margin-top:6px">阅读进度：${progress}%</div>
    </div>

    <div class="${state.readingMode ? 'reading' : ''}">
      <div class="article" data-article-scroll style="max-height: calc(100dvh - 260px); overflow:auto;" onscroll="updateProgress()">
        <h1>${doc.title}</h1>
        <div class="meta-row" style="margin-bottom:16px">
          <span class="meta-pill">${doc.subtitle || '工作稿'}</span>
          <span class="meta-pill">${doc.group}${doc.subgroup ? ' · ' + doc.subgroup : ''}</span>
          <span class="meta-pill">适用：${(doc.audience || []).join(' / ')}</span>
        </div>
        ${doc.content}
      </div>
    </div>
  `;
}
function goBackSmart() {
  if (state.currentDocId) {
    const doc = byId(state.currentDocId);
    if (state.view === 'doc' && doc) {
      if (doc.section === 'overall') setView('home');
      else setView('category', doc.group);
      return;
    }
  }
  setView('home');
}
function runSearch() {
  const input = document.getElementById('searchInput') || document.getElementById('homeSearchInput');
  if (input) state.searchKeyword = input.value.trim();
  setView('search');
}
function useKeyword(keyword) { state.searchKeyword = keyword; setView('search'); }
function toggleTheme() { state.darkMode = !state.darkMode; saveState(); applyTheme(); render(); }
function toggleReading() { state.readingMode = !state.readingMode; saveState(); render(); }
function openQuick(name) { state.quickAudience = name; state.view = 'quick'; render(); }
function escapeHtml(str='') {
  return str.replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));
}
function setNavActive(name) {
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.nav === name));
}
function render() {
  applyTheme();
  if (state.view === 'home') { app.innerHTML = renderHome(); setNavActive('home'); }
  else if (state.view === 'category') { app.innerHTML = renderCategory(); setNavActive('home'); }
  else if (state.view === 'quick') { app.innerHTML = renderQuick(); setNavActive('home'); }
  else if (state.view === 'search') { app.innerHTML = renderSearch(); setNavActive('search'); }
  else if (state.view === 'favorites') { app.innerHTML = renderFavOrRecent('favorites'); setNavActive('favorites'); }
  else if (state.view === 'recent') { app.innerHTML = renderFavOrRecent('recent'); setNavActive('recent'); }
  else if (state.view === 'doc') { app.innerHTML = renderDoc(); setNavActive('home'); }
}
bottomNav.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-nav]');
  if (!btn) return;
  const nav = btn.dataset.nav;
  if (nav === 'home') setView('home');
  if (nav === 'search') setView('search');
  if (nav === 'favorites') setView('favorites');
  if (nav === 'recent') setView('recent');
});
render();
</script>
</body>
</html>
