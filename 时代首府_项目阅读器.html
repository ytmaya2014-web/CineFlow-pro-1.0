\n<p>尾章的任务，是把整支片子从“自然启示”重新落回“设计实现”。</p>\n<p>如果没有这一步，整片就会成为一场漂亮的远游；有了这一步，它才真正属于时代首府。</p>\n<p>因此，尾章必须保留：同一张桌子、同一盏灯、同一扇窗，但模型已完成，山石压图，设计师回到起点，却已完成认知变化。</p>\n<p>这不是重复，而是闭环。它让概念不悬空，让所有自然意象最终落到建筑、项目和城市。</p>\n<h2>五、哪些内容必须保护</h2>\n<p>第一，创作总纲必须保护。概念版的高度来自“建筑生命觉醒”这一定义，不能在后续执行中被功能化稀释。</p>\n<p>第二，五境结构必须保护。它不是包装层，而是这支片子的叙事骨架。</p>\n<p>第三，真实自然与微缩模型的时空折叠方法必须保护。这是形式识别度和高级感的重要来源。</p>\n<p>第四，关键声音设计必须保护，尤其怒江关窗后的切断感，以及终章的静默处理。</p>\n<p>第五，尾章闭环必须保护。它是整支片子真正回到时代首府的门。</p>\n<h2>六、哪些部分最危险</h2>\n<p>第一，演员最危险。这个人物必须是“寻找答案的人”，而不是“表演意义的人”。一旦演得太满，整片就会显得端着。</p>\n<p>第二，第四境最危险。朝圣路一章概念很强，但尺度最难拿捏，稍重就会显得借神性抬项目。</p>\n<p>第三，语言最危险。概念片最容易沉迷于句子本身，因此必须提前控制禁忌词、过满词和过度神化表达。</p>\n<p>第四，项目归属最危险。每一境都必须回到时代首府的具体价值对应，否则会变成一支漂亮但不属于项目的艺术短片。</p>\n<h3>七、实景 / 虚拟影棚 / 演员 / 模型 / 声音 的初步分工框架</h3>\n<p>实景拍摄负责真实的自然重量。雪山、森林、瀑布、朝圣路等段落，必须先用真实景观把身体感建立起来，不能完全依赖后期制造。</p>\n<p>虚拟影棚负责尺度控制与建筑转译。它最适合完成自然场景向项目细节、模型关系和空间秩序的过渡，而不是替代真实自然。</p>\n<p>演员负责观看、触碰、行走、停顿、举模型、关窗、回桌这些动作，不负责外放情绪。演员在本片中应被视作容器。</p>\n<p>模型负责时空折叠和概念落地。它不是道具，而是自然与建筑之间的接口。所有模型镜头都要避免炫技式展示，而应强调“被使用”。</p>\n<p>声音负责完成至少一半的感知转化。尤其在瀑布、门窗、脚步、风声、呼吸和静默段落中，声音往往比画面更接近观众身体。</p>\n<h2>八、这一版提纯后的总执行判断</h2>\n<p>这支概念版后续所有工作，都应围绕一个中心判断：不要把它做成“项目很高级”的广告，而要把它做成“建筑如何被重新理解”的品牌电影序章。</p>\n<p>因此，后续无论写旁白、搭分镜、排实拍、进虚拟影棚还是定演员状态，都要始终服从两个尺度：一是精神高度不能掉；二是时代首府的项目归属不能松。</p>\n<p>只有这两个尺度同时成立，这支片子才会真正成为三版中的精神主片。</p>\n<h2>九、下一步建议</h2>\n<p>下一步不建议直接修改全部旁白，最顺的推进方式是继续做 V2《概念版结构提纯后的旁白重组稿》或 V3《概念版执行转化版》。</p>\n<p>前者解决语言位置、诗性比例和每境题眼；后者直接进入实景、虚拟影棚、演员、模型、声音的分工落地。</p>\n<p>如果以拍摄推进为优先，我更建议先做执行转化，因为这支片子比另外两版更依赖执行精度。</p>\n<p>工作备注： 本版为结构提纯稿，重点在于定母题、定主线、定五境职责、定执行边界；不是最终口播稿，也不是分镜头脚本。</p>", "text": "时代首府\nV1《概念版母稿诊断后结构提纯》\n导演工作稿 / 结构提纯版\n这份文档不是成稿重写，而是基于当前概念版脚本所做的结构提纯。目标不是把句子写得更满，而是先把这支片子的母题、主线、五境功能和执行边界定稳，避免后续在改旁白、做分镜、搭实拍与虚拟影棚时发生漂移。\n这支概念版应被视为三版中的精神主片。它不是功能介绍片，也不是卖点汇总片，而是一部以“建筑生命觉醒”为核心命题的品牌电影序章。\n一、这版真正的总母题\n建议总母题：时代首府要表达的，不是建筑如何被制造出来，而是建筑如何被唤醒，最终成为人的归属、秩序与精神坐标。\n这一定义决定了概念版不能回退成普通地产广告，也不能只停留在诗性抒发。它必须始终同时完成两件事：一是保持精神高度；二是把这种高度稳稳绑定到时代首府的项目气质与价值结构上。\n因此，这版片子的真正问题不是“项目有哪些卖点”，而是“什么样的建筑，才值得被称为真正的归属之地”。\n二、这版真正的主线\n建议主线：从“建筑应被如何理解”出发，经由自然启示完成五次认知递进，最终回到城市与家，确认建筑真正的价值不是被看见，而是让人看见自己。\n这条主线不是横向并列的五个景观意象，而是一条连续向上的精神路径：站稳、呼吸、安静、抵达、看见自己。\n所以后续所有调整都必须服从这条线，不能把五境剪成五支漂亮段落，更不能让每一境都只停留在“自然很壮美、建筑很高级”的表层感受。\n三、这版的气质定位\n建议气质定义：高远、克制、觉醒、沉浸、留白，有神性气息，但不过度神化。\n它的格调必须高于业主版和政府版，但这种高，不是靠堆砌大词，而是靠结构统一、节奏克制、声音准确和意象对应。\n所有语言都应避免过满。真正高级的概念片，不是句句都像题眼，而是在关键处抬升，其余部分留给画面和声音完成。\n四、五境功能重组表\n4.1 序章：空白图纸 / 初始发问\n这一段只负责提出问题：建筑到底从什么时候开始拥有生命。它不是信息引入段，也不是项目说明段，而是整支片子的意识起点。\n序章的功能是把观众从日常观看里拉出来，让他接受一种新的观看方式：接下来看到的不是房地产内容，而是一场关于建筑本质的寻找。\n因此，序章要克制，不急着交代项目名，不急着解释五境，也不急着释放全部野心。它只需要把那张空白图纸、未完成模型、设计师的停顿和疑问定住。\n4.2 第一境：雪山 / 生根 / 意志\n这一境的任务，是立住“地基”不是工程术语，而是建筑意志的来源。\n雪山不只是壮丽景观，它对应的是时代首府“站稳”的能力：建筑不是漂浮在地面上的消费品，而是从大地深处生长出来的秩序。\n后续执行上，雪山必须牢牢落回项目关于稳固、基础、安全与信念的第一层价值，不能只剪成恢宏自然片。\n这一境的精神关键词建议定为：生根、承重、意志、稳定、向上。\n4.3 第二境：森林 / 呼吸 / 共生\n这一境的任务，是把时代首府的空中庭院、垂直生态和生活中的自然关系，翻译成“建筑的肺”。\n森林这一境不是为了表达绿色，而是为了表达共生。真正重要的不是“有树”，而是建筑是否允许呼吸、允许生命进入、允许人在空间中感受到自然的存在。\n因此，这一境后续打磨时要特别警惕把它做成普通景观宣传。它真正该落的是：建筑如何从封闭体，转变成会呼吸的生命体。\n这一境的精神关键词建议定为：呼吸、渗透、共生、庭院、生命关系。\n4.4 第三境：瀑布 / 过滤 / 选择\n这一境是全片最强的感官转换段之一。它的任务，不是讲门窗参数，而是讲“人有权决定自己住在世界的哪个版本里”。\n瀑布与怒江的声压，是世界对人的冲击；关窗后瞬间归于安静，是建筑给予人的保护和筛选能力。\n这正是时代首府产品价值里极其关键的一层：不是隔绝世界，而是在喧嚣与安静之间，给居住者保留选择权。\n这一境后续无论旁白、分镜还是声音设计，都必须保护住这个瞬间切换。它不是效果段，而是立意段。\n这一境的精神关键词建议定为：冲击、过滤、切换、选择、安静权。\n4.5 第四境：朝圣路 / 仪式 / 抵达\n这一境的任务，是把“回家”从交通动线提升为一种仪式秩序。\n它对应的不是神秘感，而是归家过程中的节奏、识别、安顿和心理转场。真正重要的，不是借用朝圣感来抬高项目，而是把“抵达”这件事拍得有分寸、有重量。\n因此，这一境必须从抽象神性往居住真实体验上落：脚步、转折、门厅、识别灯、木香、光影变化、由外入内的心理安静。\n这一境是全片最容易失手的一章。后续继续写时，宁可少一层玄意，也不要把朝圣隐喻压得太满。\n这一境的精神关键词建议定为：归来、识别、过渡、秩序、抵达感。\n4.6 第五境：神山 / 心域 / 看见自己\n这一境是终极落点。它必须回答：当建筑真正完成自身之后，它最终给人的是什么。\n答案不是炫耀感，不是被观看感，而是让人在空间里回到自己，认出自己，安顿自己。\n所以“神山”不只是高峰意象，它对应的是时代首府所要建立的最高层价值：建筑退后，生活浮现；空间隐去，内心出现。\n这一境语言和画面都要收，不要喊。越到最后，越要让观众自己把答案补全。\n这一境的精神关键词建议定为：心域、安顿、归属、自我照见、建筑隐去。\n4.7 尾章：回到城市工作室 / 闭环成立\n尾章的任务，是把整支片子从“自然启示”重新落回“设计实现”。\n如果没有这一步，整片就会成为一场漂亮的远游；有了这一步，它才真正属于时代首府。\n因此，尾章必须保留：同一张桌子、同一盏灯、同一扇窗，但模型已完成，山石压图，设计师回到起点，却已完成认知变化。\n这不是重复，而是闭环。它让概念不悬空，让所有自然意象最终落到建筑、项目和城市。\n五、哪些内容必须保护\n第一，创作总纲必须保护。概念版的高度来自“建筑生命觉醒”这一定义，不能在后续执行中被功能化稀释。\n第二，五境结构必须保护。它不是包装层，而是这支片子的叙事骨架。\n第三，真实自然与微缩模型的时空折叠方法必须保护。这是形式识别度和高级感的重要来源。\n第四，关键声音设计必须保护，尤其怒江关窗后的切断感，以及终章的静默处理。\n第五，尾章闭环必须保护。它是整支片子真正回到时代首府的门。\n六、哪些部分最危险\n第一，演员最危险。这个人物必须是“寻找答案的人”，而不是“表演意义的人”。一旦演得太满，整片就会显得端着。\n第二，第四境最危险。朝圣路一章概念很强，但尺度最难拿捏，稍重就会显得借神性抬项目。\n第三，语言最危险。概念片最容易沉迷于句子本身，因此必须提前控制禁忌词、过满词和过度神化表达。\n第四，项目归属最危险。每一境都必须回到时代首府的具体价值对应，否则会变成一支漂亮但不属于项目的艺术短片。\n七、实景 / 虚拟影棚 / 演员 / 模型 / 声音 的初步分工框架\n实景拍摄负责真实的自然重量。雪山、森林、瀑布、朝圣路等段落，必须先用真实景观把身体感建立起来，不能完全依赖后期制造。\n虚拟影棚负责尺度控制与建筑转译。它最适合完成自然场景向项目细节、模型关系和空间秩序的过渡，而不是替代真实自然。\n演员负责观看、触碰、行走、停顿、举模型、关窗、回桌这些动作，不负责外放情绪。演员在本片中应被视作容器。\n模型负责时空折叠和概念落地。它不是道具，而是自然与建筑之间的接口。所有模型镜头都要避免炫技式展示，而应强调“被使用”。\n声音负责完成至少一半的感知转化。尤其在瀑布、门窗、脚步、风声、呼吸和静默段落中，声音往往比画面更接近观众身体。\n八、这一版提纯后的总执行判断\n这支概念版后续所有工作，都应围绕一个中心判断：不要把它做成“项目很高级”的广告，而要把它做成“建筑如何被重新理解”的品牌电影序章。\n因此，后续无论写旁白、搭分镜、排实拍、进虚拟影棚还是定演员状态，都要始终服从两个尺度：一是精神高度不能掉；二是时代首府的项目归属不能松。\n只有这两个尺度同时成立，这支片子才会真正成为三版中的精神主片。\n九、下一步建议\n下一步不建议直接修改全部旁白，最顺的推进方式是继续做 V2《概念版结构提纯后的旁白重组稿》或 V3《概念版执行转化版》。\n前者解决语言位置、诗性比例和每境题眼；后者直接进入实景、虚拟影棚、演员、模型、声音的分工落地。\n如果以拍摄推进为优先，我更建议先做执行转化，因为这支片子比另外两版更依赖执行精度。\n工作备注： 本版为结构提纯稿，重点在于定母题、定主线、定五境职责、定执行边界；不是最终口播稿，也不是分镜头脚本。"}, {"filename": "时代首府_V2_概念版结构提纯后的旁白重组稿.docx", "id": "concept-2", "section": "concept", "group": "概念版", "title": "概念版结构提纯后的旁白重组稿", "subtitle": "概念版 V2", "desc": "在结构提纯基础上重组旁白主干，统一母题、意象与项目落点。", "audience": ["导演组", "编剧", "后期"], "tags": ["概念版", "旁白", "重组"], "content": "<p>时代首府 V2《概念版结构提纯后的旁白重组稿》</p>\n<p>在结构提纯基础上重组旁白主干，统一母题、意象与项目落点</p>\n<div class=\"table-wrap\"><table><thead><tr><th>文档类型</th><th>导演写作系统 / 概念版工作稿</th></tr></thead><tbody><tr><td>适用对象</td><td>导演、编剧、制片、执行导演、摄影、美术、后期</td></tr><tr><td>用途</td><td>用于概念片旁白重组与执行转化的内部推进</td></tr></tbody></table></div>\n<p class=\"label\"><strong>工作说明：</strong>本稿不追求把概念片写成普通地产广告，也不把诗性语言无限放大。核心目标，是在保留“建筑生命觉醒史”这一高度的前提下，把概念片旁白与执行方法重新压实，让文本、影像、声音、演员与模型协同成立。</p>\n<h2>一、重组原则</h2>\n<ul>\n<li>这版旁白不再把“概念高度”与“项目价值”分开说，而是始终坚持一条主线：从自然启示进入建筑判断，再从建筑判断回到人的内在归属。</li>\n<li>旁白的任务不是替画面解释一切，而是负责立题、提纯、收束。真正能被镜头证明的部分，尽量留给实景、虚拟影棚、模型与声音自己说话。</li>\n<li>诗性语言保留，但只放在题眼、境与境的转换处、以及终章收束处，不大面积承担信息叙述，以免整片发飘。</li>\n<li>所有段落都必须能回扣时代首府的真实价值，不允许停留在漂亮的自然隐喻里。</li>\n</ul>\n<h2>二、全片总旁白</h2>\n<p>我们曾经以为，建筑只是一种回答。它回答土地，回答城市，回答功能，回答尺度。可真正动人的建筑，从来不止于被建造出来。它还要被唤醒。</p>\n<p>于是，我们把问题重新放回出发之初：一处真正值得长久停留的居所，究竟应该从哪里开始？</p>\n<p>答案并不只在图纸上，也不只在参数里。它藏在山体的站立里，藏在森林的呼吸里，藏在水声被隔开后的安静里，藏在归家脚步的节奏里，也藏在一个人终于能够慢下来、与自己重新相处的片刻里。</p>\n<p>时代首府所寻找的，不是更热闹的表达，而是一种更深的安顿。</p>\n<h2>三、分境旁白重组</h2>\n<h3>序章｜启程</h3>\n<p>我想重新寻找，建筑最初为什么会出现。</p>\n<p>不是为了堆叠形体，不是为了制造声量，而是为了在变化的世界里，留下一处可以安放心绪、容纳日常、让人愿意回来的地方。</p>\n<p>当一张图纸还没有落笔，当一座模型还停留在未完成的轮廓里，真正重要的，从来不是它将呈现得多么醒目，而是它最终是否能够回应人的内在需要。</p>\n<h3>第一境｜雪山 - 生根</h3>\n<p>站在雪山面前，人会重新理解“稳固”两个字。</p>\n<p>真正可靠的力量，不在表面，而在向下生长的部分。它沉入土地，穿过风雪，承受时间，也因此获得了向上生长的意志。</p>\n<p>建筑也是如此。它首先要站稳，不只是结构上的站稳，更是对生活的承托能够被长久信任。</p>\n<p>时代首府所强调的地基感，不只是工程意义上的开始，而是一种从大地深处长出来的笃定。</p>\n<h3>第二境｜森林 - 共生</h3>\n<p>进入森林，才会明白生命从来不是孤立存在的。</p>\n<p>树影、湿度、风向、光的停留方式，彼此都在影响彼此。好的空间也不该只把自然当作背景，而该让自然真正参与生活。</p>\n<p>因此，庭院不是装点，绿意也不是附着。它们更像建筑的呼吸系统，让风可以穿行，让视线可以停留，让人在高密度城市中，依然感到身体与自然保持着联系。</p>\n<p>时代首府所寻找的，是建筑与生态之间更温和、更持久的相处关系。</p>\n<h3>第三境｜瀑布 - 选择</h3>\n<p>站在瀑布前，会第一次如此清楚地感受到，声音也有重量。</p>\n<p>世界并不总是安静的。真正珍贵的，不是逃离喧响，而是拥有选择的能力：什么时候打开，什么时候收拢；什么时候与城市相连，什么时候回到自己的秩序里。</p>\n<p>于是，门窗不再只是构件，它们成为生活与外界之间的边界管理者。它过滤噪声，也保留光线；它挡住干扰，也让风景被温和地带入。</p>\n<p>时代首府所珍视的安静，不是封闭，而是让居住者重新拥有对日常节奏的掌控。</p>\n<h3>第四境｜朝圣路 - 抵达</h3>\n<p>一条路之所以重要，并不只是因为它通向哪里，更在于它怎样让人一步步靠近自己想去的地方。</p>\n<p>回家的过程，也不该只是从外部空间进入内部空间的机械切换。它应该有节奏，有过渡，有由外而内逐渐安静下来的秩序。</p>\n<p>当脚步、灯光、材质、门厅与转折都被认真组织，归家便不再只是结束一天，而像是在喧闹之后，重新回到属于自己的方向。</p>\n<p>时代首府所重视的归家动线，真正要建立的，是一种被认真对待的抵达感。</p>\n<h3>第五境｜神山 - 看见自己</h3>\n<p>抵达神山，人最终面对的并不是风景，而是自己。</p>\n<p>最好的建筑，也不该始终要求被注视。它应当在恰当的时候退后，让光、风、尺度、材料与日常默默起作用，让人在其中不再不断意识到“设计”，而是自然地安定下来。</p>\n<p>当建筑隐去，生活才真正出现；当空间不再喧哗，人也终于能够看见自己。</p>\n<p>这，正是时代首府所理解的高级：不是表面的昂贵感，而是让居住回到内心秩序，让日常恢复温度。</p>\n<p>终章｜回到图纸</p>\n<p>当旅程结束，答案并没有停留在远方。</p>\n<p>它回到桌上的图纸，回到手中的模型，回到每一个关于地基、庭院、门窗、归家与尺度的具体判断里。</p>\n<p>原来，等待被寻找的，从来不是一个抽象结论，而是建筑怎样在真实生活中，慢慢成为人的内在坐标。</p>\n<p>时代首府想完成的，也正是这样一种唤醒：让建筑不止被看见，更让人在其中，重新感到安稳、归属与久处不厌。</p>\n<h2>四、旁白使用提醒</h2>\n<ul>\n<li>序章与终章可以承担较高的精神高度；中间五境则必须把诗性语言压回可感知的项目价值，避免全片都在“讲道理”。</li>\n<li>“神山”一境不宜再把情绪拉到过满，结尾最好留白半步，让画面和无声停顿承担最后的分量。</li>\n<li>所有涉及居住传播的表达，应持续避开容易产生文化不适的词汇，统一转向“安顿、归属、安静、秩序、久处、被照顾”等语义。</li>\n<li>演员的存在是经验容器，不是概念代言人；因此旁白语气必须克制，像一个经历者，而不是一个宣布答案的人。</li>\n</ul>", "text": "时代首府 V2《概念版结构提纯后的旁白重组稿》\n在结构提纯基础上重组旁白主干，统一母题、意象与项目落点\n文档类型 | 导演写作系统 / 概念版工作稿\n适用对象 | 导演、编剧、制片、执行导演、摄影、美术、后期\n用途 | 用于概念片旁白重组与执行转化的内部推进\n工作说明：本稿不追求把概念片写成普通地产广告，也不把诗性语言无限放大。核心目标，是在保留“建筑生命觉醒史”这一高度的前提下，把概念片旁白与执行方法重新压实，让文本、影像、声音、演员与模型协同成立。\n一、重组原则\n• 这版旁白不再把“概念高度”与“项目价值”分开说，而是始终坚持一条主线：从自然启示进入建筑判断，再从建筑判断回到人的内在归属。\n• 旁白的任务不是替画面解释一切，而是负责立题、提纯、收束。真正能被镜头证明的部分，尽量留给实景、虚拟影棚、模型与声音自己说话。\n• 诗性语言保留，但只放在题眼、境与境的转换处、以及终章收束处，不大面积承担信息叙述，以免整片发飘。\n• 所有段落都必须能回扣时代首府的真实价值，不允许停留在漂亮的自然隐喻里。\n二、全片总旁白\n我们曾经以为，建筑只是一种回答。它回答土地，回答城市，回答功能，回答尺度。可真正动人的建筑，从来不止于被建造出来。它还要被唤醒。\n于是，我们把问题重新放回出发之初：一处真正值得长久停留的居所，究竟应该从哪里开始？\n答案并不只在图纸上，也不只在参数里。它藏在山体的站立里，藏在森林的呼吸里，藏在水声被隔开后的安静里，藏在归家脚步的节奏里，也藏在一个人终于能够慢下来、与自己重新相处的片刻里。\n时代首府所寻找的，不是更热闹的表达，而是一种更深的安顿。\n三、分境旁白重组\n序章｜启程\n我想重新寻找，建筑最初为什么会出现。\n不是为了堆叠形体，不是为了制造声量，而是为了在变化的世界里，留下一处可以安放心绪、容纳日常、让人愿意回来的地方。\n当一张图纸还没有落笔，当一座模型还停留在未完成的轮廓里，真正重要的，从来不是它将呈现得多么醒目，而是它最终是否能够回应人的内在需要。\n第一境｜雪山 - 生根\n站在雪山面前，人会重新理解“稳固”两个字。\n真正可靠的力量，不在表面，而在向下生长的部分。它沉入土地，穿过风雪，承受时间，也因此获得了向上生长的意志。\n建筑也是如此。它首先要站稳，不只是结构上的站稳，更是对生活的承托能够被长久信任。\n时代首府所强调的地基感，不只是工程意义上的开始，而是一种从大地深处长出来的笃定。\n第二境｜森林 - 共生\n进入森林，才会明白生命从来不是孤立存在的。\n树影、湿度、风向、光的停留方式，彼此都在影响彼此。好的空间也不该只把自然当作背景，而该让自然真正参与生活。\n因此，庭院不是装点，绿意也不是附着。它们更像建筑的呼吸系统，让风可以穿行，让视线可以停留，让人在高密度城市中，依然感到身体与自然保持着联系。\n时代首府所寻找的，是建筑与生态之间更温和、更持久的相处关系。\n第三境｜瀑布 - 选择\n站在瀑布前，会第一次如此清楚地感受到，声音也有重量。\n世界并不总是安静的。真正珍贵的，不是逃离喧响，而是拥有选择的能力：什么时候打开，什么时候收拢；什么时候与城市相连，什么时候回到自己的秩序里。\n于是，门窗不再只是构件，它们成为生活与外界之间的边界管理者。它过滤噪声，也保留光线；它挡住干扰，也让风景被温和地带入。\n时代首府所珍视的安静，不是封闭，而是让居住者重新拥有对日常节奏的掌控。\n第四境｜朝圣路 - 抵达\n一条路之所以重要，并不只是因为它通向哪里，更在于它怎样让人一步步靠近自己想去的地方。\n回家的过程，也不该只是从外部空间进入内部空间的机械切换。它应该有节奏，有过渡，有由外而内逐渐安静下来的秩序。\n当脚步、灯光、材质、门厅与转折都被认真组织，归家便不再只是结束一天，而像是在喧闹之后，重新回到属于自己的方向。\n时代首府所重视的归家动线，真正要建立的，是一种被认真对待的抵达感。\n第五境｜神山 - 看见自己\n抵达神山，人最终面对的并不是风景，而是自己。\n最好的建筑，也不该始终要求被注视。它应当在恰当的时候退后，让光、风、尺度、材料与日常默默起作用，让人在其中不再不断意识到“设计”，而是自然地安定下来。\n当建筑隐去，生活才真正出现；当空间不再喧哗，人也终于能够看见自己。\n这，正是时代首府所理解的高级：不是表面的昂贵感，而是让居住回到内心秩序，让日常恢复温度。\n终章｜回到图纸\n当旅程结束，答案并没有停留在远方。\n它回到桌上的图纸，回到手中的模型，回到每一个关于地基、庭院、门窗、归家与尺度的具体判断里。\n原来，等待被寻找的，从来不是一个抽象结论，而是建筑怎样在真实生活中，慢慢成为人的内在坐标。\n时代首府想完成的，也正是这样一种唤醒：让建筑不止被看见，更让人在其中，重新感到安稳、归属与久处不厌。\n四、旁白使用提醒\n• 序章与终章可以承担较高的精神高度；中间五境则必须把诗性语言压回可感知的项目价值，避免全片都在“讲道理”。\n• “神山”一境不宜再把情绪拉到过满，结尾最好留白半步，让画面和无声停顿承担最后的分量。\n• 所有涉及居住传播的表达，应持续避开容易产生文化不适的词汇，统一转向“安顿、归属、安静、秩序、久处、被照顾”等语义。\n• 演员的存在是经验容器，不是概念代言人；因此旁白语气必须克制，像一个经历者，而不是一个宣布答案的人。"}, {"filename": "时代首府_V3_概念版执行转化版.docx", "id": "concept-3", "section": "concept", "group": "概念版", "title": "概念版执行转化版", "subtitle": "概念版 V3", "desc": "将概念片从文本逻辑转化为实景拍摄、虚拟影棚、演员、模型与声音的执行工作稿。", "audience": ["剧组", "影棚", "导演组"], "tags": ["概念版", "执行转化", "影棚"], "content": "<p>时代首府 V3《概念版执行转化版》</p>\n<p>将概念片从文本逻辑转化为实景拍摄 + 虚拟影棚 + 演员 + 模型 + 声音的执行工作稿</p>\n<div class=\"table-wrap\"><table><thead><tr><th>文档类型</th><th>导演写作系统 / 概念版工作稿</th></tr></thead><tbody><tr><td>适用对象</td><td>导演、编剧、制片、执行导演、摄影、美术、后期</td></tr><tr><td>用途</td><td>用于概念片旁白重组与执行转化的内部推进</td></tr></tbody></table></div>\n<p class=\"label\"><strong>工作说明：</strong>本稿不追求把概念片写成普通地产广告，也不把诗性语言无限放大。核心目标，是在保留“建筑生命觉醒史”这一高度的前提下，把概念片旁白与执行方法重新压实，让文本、影像、声音、演员与模型协同成立。</p>\n<h2>一、执行总原则</h2>\n<ul>\n<li>概念片不是功能介绍片，因此执行上不能把卖点平铺直叙；必须坚持“自然启示 - 建筑判断 - 人的内在归属”这条递进主线。</li>\n<li>实景负责提供自然的真实重量，虚拟影棚负责完成建筑与意象的时空折叠，模型负责建立“设计进行中”的手感，演员负责承载观看路径，声音负责完成一半以上的身体体验。</li>\n<li>演员不表演“意义”，只经历、停顿、行走、抬头、触摸、收纳模型，不做过度情绪化动作。</li>\n<li>每一境都必须完成一次明确的项目落点：雪山落地基，森林落庭院，瀑布落门窗与安静，朝圣路落归家动线，神山落心域与自我关系。</li>\n</ul>\n<h2>二、五要素分工框架</h2>\n<div class=\"table-wrap\"><table><thead><tr><th>执行要素</th><th>核心功能</th><th>重点内容</th></tr></thead><tbody><tr><td>实景拍摄</td><td>提供自然真实感、地理重量、气候与身体尺度</td><td>雪山、森林、瀑布、道路、远山、真实材质细节</td></tr><tr><td>虚拟影棚</td><td>完成模型与自然、建筑与空间的叠合切换</td><td>模型悬浮、尺度转换、光线过渡、建筑生成</td></tr><tr><td>演员</td><td>承担观看路径与经验容器</td><td>行走、停顿、抚摸模型、开窗、关窗、回到工作台</td></tr><tr><td>模型</td><td>建立“建筑尚在形成中”的触感</td><td>桌面模型、手持模型、山石压图、结构轮廓、细部推演</td></tr><tr><td>声音</td><td>建立身体层面的切换、安静、抵达感</td><td>风声、水声、脚步、纸张、铅笔、门窗、三秒无声</td></tr></tbody></table></div>\n<h2>三、分境执行转化</h2>\n<h3>序章｜启程</h3>\n<p>段落功能：建立“建筑应被唤醒”的总命题，避免直接进入项目说明。</p>\n<p>执行转化：实景：工作台、城市晨昏、留白空镜；影棚：未完成模型与图纸光影；演员：只做观察、翻图、停顿；声音：纸张、铅笔、微弱环境声。</p>\n<p>执行提醒：不要一开场就满信息、满音乐、满表演。</p>\n<h3>第一境｜雪山 - 生根</h3>\n<p>段落功能：把“地基”从工程术语转译成可靠、承托、意志。</p>\n<p>执行转化：实景：雪山风面、岩体、脚下碎石；影棚：模型根部与山体纹理叠合；演员：手持模型，站立而非演感动；声音：风压、低频、布料。</p>\n<p>执行提醒：关键不是拍美景，而是拍“站稳”的身体感。</p>\n<h3>第二境｜森林 - 共生</h3>\n<p>段落功能：把空中庭院与垂直生态从卖点提升为生命关系。</p>\n<p>执行转化：实景：林间湿度、树影、风穿叶面；影棚：模型庭院与真实树影叠合；演员：穿行、抬头、停步；声音：枝叶、鸟鸣、风过。</p>\n<p>执行提醒：避免把庭院拍成单纯景观，要拍出呼吸感。</p>\n<h3>第三境｜瀑布 - 选择</h3>\n<p>段落功能：把门窗、隔音、边界管理转成“选择自己的生活节奏”。</p>\n<p>执行转化：实景：瀑布近距离冲击、水雾；影棚：窗框、室内边界、开合动作；演员：开窗、关窗、感受切换；声音：水声强烈进入后瞬间被切断。</p>\n<p>执行提醒：这一境的成败高度依赖声音设计。</p>\n<h3>第四境｜朝圣路 - 抵达</h3>\n<p>段落功能：把归家动线转成由外而内、逐步安静的秩序与仪式。</p>\n<p>执行转化：实景：路面、脚步、坡度、远方方向感；影棚：门厅、灯光识别、空间转折；演员：步行、停驻、进入门厅；声音：脚步、材质变化、环境声逐步收束。</p>\n<p>执行提醒：最容易拍虚，必须落到真实归家体验，不可过度借神性。</p>\n<h3>第五境｜神山 - 看见自己</h3>\n<p>段落功能：把“心域”落到建筑退后、生活出现、人与自己相处。</p>\n<p>执行转化：实景：远山、留白天空、极简地貌；影棚：完成模型、室内光线、静置空间；演员：坐下、看向窗外、触摸材质；声音：大幅减法，允许无声停顿。</p>\n<p>执行提醒：结尾宜收，不宜喊。</p>\n<p>终章｜回到图纸</p>\n<p>段落功能：完成自然启示到建筑落地的闭环。</p>\n<p>执行转化：实景：回到工作台、城市室内光；影棚：完整模型、山石压图、图纸定稿感；演员：放下模型、收住动作；声音：纸张、呼吸、极轻音乐收束。</p>\n<p>执行提醒：必须让观众感觉答案回到了项目，而非停在远方。</p>\n<h2>四、演员执行口径</h2>\n<ul>\n<li>人物身份更接近“寻找答案的人”，而不是“已经掌握答案的人”。</li>\n<li>动作尽量少：看、走、拿、放、触摸、停顿、开窗、关窗、坐下。动作越少，文本越高级。</li>\n<li>不要出现夸张表情、仰头式表演、故作沉思、明显煽情凝视。</li>\n<li>服装、妆发、肢体语言都应服务于克制、干净、耐看，而不是风格化摆拍。</li>\n</ul>\n<h2>五、声音执行口径</h2>\n<ul>\n<li>风、水、脚步、纸张、门窗、环境安静度的切换，是概念版最重要的叙事工具之一。</li>\n<li>瀑布一境必须做出“世界很响 - 关上边界后忽然安静”的身体落差。</li>\n<li>终章与神山段落要敢于留白，必要时允许无配乐或近乎无配乐。</li>\n<li>声音不是装饰氛围，而是帮助观众真正感到“站稳、呼吸、安静、抵达、看见自己”。</li>\n</ul>\n<h2>六、拍摄与后期协同提醒</h2>\n<ul>\n<li>模型必须尽量实拍，避免全CG替代；概念版的“手感”来自真实对象被使用。</li>\n<li>虚拟影棚镜头不宜过满，尤其不能做成泛CG广告质感；所有叠合都应有明确叙事功能。</li>\n<li>后期不要平均分配诗性语言，应把较高的文字密度集中在序章、转换点与终章。</li>\n<li>项目落点必须在每一境内部被悄悄建立，而不是最后统一解释。</li>\n<li>概念版一旦失去项目归属，就会变成漂亮短片；一旦失去克制，又会变成做作广告。</li>\n</ul>", "text": "时代首府 V3《概念版执行转化版》\n将概念片从文本逻辑转化为实景拍摄 + 虚拟影棚 + 演员 + 模型 + 声音的执行工作稿\n文档类型 | 导演写作系统 / 概念版工作稿\n适用对象 | 导演、编剧、制片、执行导演、摄影、美术、后期\n用途 | 用于概念片旁白重组与执行转化的内部推进\n工作说明：本稿不追求把概念片写成普通地产广告，也不把诗性语言无限放大。核心目标，是在保留“建筑生命觉醒史”这一高度的前提下，把概念片旁白与执行方法重新压实，让文本、影像、声音、演员与模型协同成立。\n一、执行总原则\n• 概念片不是功能介绍片，因此执行上不能把卖点平铺直叙；必须坚持“自然启示 - 建筑判断 - 人的内在归属”这条递进主线。\n• 实景负责提供自然的真实重量，虚拟影棚负责完成建筑与意象的时空折叠，模型负责建立“设计进行中”的手感，演员负责承载观看路径，声音负责完成一半以上的身体体验。\n• 演员不表演“意义”，只经历、停顿、行走、抬头、触摸、收纳模型，不做过度情绪化动作。\n• 每一境都必须完成一次明确的项目落点：雪山落地基，森林落庭院，瀑布落门窗与安静，朝圣路落归家动线，神山落心域与自我关系。\n二、五要素分工框架\n执行要素 | 核心功能 | 重点内容\n实景拍摄 | 提供自然真实感、地理重量、气候与身体尺度 | 雪山、森林、瀑布、道路、远山、真实材质细节\n虚拟影棚 | 完成模型与自然、建筑与空间的叠合切换 | 模型悬浮、尺度转换、光线过渡、建筑生成\n演员 | 承担观看路径与经验容器 | 行走、停顿、抚摸模型、开窗、关窗、回到工作台\n模型 | 建立“建筑尚在形成中”的触感 | 桌面模型、手持模型、山石压图、结构轮廓、细部推演\n声音 | 建立身体层面的切换、安静、抵达感 | 风声、水声、脚步、纸张、铅笔、门窗、三秒无声\n三、分境执行转化\n序章｜启程\n段落功能：建立“建筑应被唤醒”的总命题，避免直接进入项目说明。\n执行转化：实景：工作台、城市晨昏、留白空镜；影棚：未完成模型与图纸光影；演员：只做观察、翻图、停顿；声音：纸张、铅笔、微弱环境声。\n执行提醒：不要一开场就满信息、满音乐、满表演。\n第一境｜雪山 - 生根\n段落功能：把“地基”从工程术语转译成可靠、承托、意志。\n执行转化：实景：雪山风面、岩体、脚下碎石；影棚：模型根部与山体纹理叠合；演员：手持模型，站立而非演感动；声音：风压、低频、布料。\n执行提醒：关键不是拍美景，而是拍“站稳”的身体感。\n第二境｜森林 - 共生\n段落功能：把空中庭院与垂直生态从卖点提升为生命关系。\n执行转化：实景：林间湿度、树影、风穿叶面；影棚：模型庭院与真实树影叠合；演员：穿行、抬头、停步；声音：枝叶、鸟鸣、风过。\n执行提醒：避免把庭院拍成单纯景观，要拍出呼吸感。\n第三境｜瀑布 - 选择\n段落功能：把门窗、隔音、边界管理转成“选择自己的生活节奏”。\n执行转化：实景：瀑布近距离冲击、水雾；影棚：窗框、室内边界、开合动作；演员：开窗、关窗、感受切换；声音：水声强烈进入后瞬间被切断。\n执行提醒：这一境的成败高度依赖声音设计。\n第四境｜朝圣路 - 抵达\n段落功能：把归家动线转成由外而内、逐步安静的秩序与仪式。\n执行转化：实景：路面、脚步、坡度、远方方向感；影棚：门厅、灯光识别、空间转折；演员：步行、停驻、进入门厅；声音：脚步、材质变化、环境声逐步收束。\n执行提醒：最容易拍虚，必须落到真实归家体验，不可过度借神性。\n第五境｜神山 - 看见自己\n段落功能：把“心域”落到建筑退后、生活出现、人与自己相处。\n执行转化：实景：远山、留白天空、极简地貌；影棚：完成模型、室内光线、静置空间；演员：坐下、看向窗外、触摸材质；声音：大幅减法，允许无声停顿。\n执行提醒：结尾宜收，不宜喊。\n终章｜回到图纸\n段落功能：完成自然启示到建筑落地的闭环。\n执行转化：实景：回到工作台、城市室内光；影棚：完整模型、山石压图、图纸定稿感；演员：放下模型、收住动作；声音：纸张、呼吸、极轻音乐收束。\n执行提醒：必须让观众感觉答案回到了项目，而非停在远方。\n四、演员执行口径\n• 人物身份更接近“寻找答案的人”，而不是“已经掌握答案的人”。\n• 动作尽量少：看、走、拿、放、触摸、停顿、开窗、关窗、坐下。动作越少，文本越高级。\n• 不要出现夸张表情、仰头式表演、故作沉思、明显煽情凝视。\n• 服装、妆发、肢体语言都应服务于克制、干净、耐看，而不是风格化摆拍。\n五、声音执行口径\n• 风、水、脚步、纸张、门窗、环境安静度的切换，是概念版最重要的叙事工具之一。\n• 瀑布一境必须做出“世界很响 - 关上边界后忽然安静”的身体落差。\n• 终章与神山段落要敢于留白，必要时允许无配乐或近乎无配乐。\n• 声音不是装饰氛围，而是帮助观众真正感到“站稳、呼吸、安静、抵达、看见自己”。\n六、拍摄与后期协同提醒\n• 模型必须尽量实拍，避免全CG替代；概念版的“手感”来自真实对象被使用。\n• 虚拟影棚镜头不宜过满，尤其不能做成泛CG广告质感；所有叠合都应有明确叙事功能。\n• 后期不要平均分配诗性语言，应把较高的文字密度集中在序章、转换点与终章。\n• 项目落点必须在每一境内部被悄悄建立，而不是最后统一解释。\n• 概念版一旦失去项目归属，就会变成漂亮短片；一旦失去克制，又会变成做作广告。"}, {"filename": "时代首府_V4_概念版后期脚本版.docx", "id": "concept-4", "section": "concept", "group": "概念版", "title": "概念版后期脚本版", "subtitle": "概念版 V4", "desc": "用于导演组、剪辑、声音设计与包装协同的后期工作稿。", "audience": ["后期", "导演组", "声音"], "tags": ["概念版", "后期脚本", "声音"], "content": "<p>时代首府 V4《概念版后期脚本版》</p>\n<p>后期工作稿｜用于导演组、剪辑、声音设计与包装协同</p>\n<div class=\"table-notes\"><div class=\"table-note\">定位说明：这不是信息型地产片的后期脚本，而是一支以“建筑生命觉醒”为母题的概念主片后期工作稿。后期任务不是把卖点剪漂亮，而是把五境结构、模型交互、演员状态、声音秩序和项目落点真正剪成一个完整的精神闭环。</div></div>\n<h2>一、全片后期总原则</h2>\n<p>1）后期不是补救文本，而是完成“自然启示—建筑转译—项目归属—精神落点”的最后闭环。</p>\n<p>2）画面负责建立神性与感知，旁白负责归纳判断，声音负责让观众在身体层面完成切换。</p>\n<p>3）全片要始终避免两种失手：一是剪成空泛文艺片，二是剪成高端地产卖点片。</p>\n<h2>4）诗性语言只在题眼、转境、结尾处提气，不承担大段信息输送。</h2>\n<p>5）演员不是表演意义的人，而是承载观看、触摸、抵达、领悟这些动作的“容器”。</p>\n<h2>二、全片节奏与声音总控</h2>\n<div class=\"table-wrap\"><table><thead><tr><th>段落</th><th>节奏状态</th><th>声音策略</th><th>后期提醒</th></tr></thead><tbody><tr><td>序章</td><td>慢起、留白、建立观看方式</td><td>环境底噪先行，音乐极克制</td><td>不要急于解释项目，不要快切</td></tr><tr><td>雪山</td><td>庄重、压低、建立意志</td><td>低频风声、鞋底与石面摩擦声</td><td>模型转真实必须稳，不可花哨</td></tr><tr><td>森林</td><td>呼吸打开、层次丰富</td><td>叶响、鸟鸣、湿润空气感</td><td>绿色影调要克制，避免旅游片感</td></tr><tr><td>瀑布</td><td>强烈对比、瞬间静音</td><td>先让噪声顶满，再用关窗切静</td><td>这是全片最强感官切换点</td></tr><tr><td>朝圣路</td><td>节奏整饬、脚步渐稳</td><td>呼吸、脚步、铃声或远处风声</td><td>不要神化过度，要落回归家秩序</td></tr><tr><td>神山/尾章</td><td>情绪放大但语言收束</td><td>三秒近无声后再进音乐</td><td>越到结尾越要少说，让观众自己完成意义</td></tr></tbody></table></div>\n<h2>三、序章：空白图纸 / 尚未被回答的问题</h2>\n<p class=\"label\"><strong>建议时长：</strong>00:00—00:35</p>\n<p>画面与结构</p>\n<ul>\n<li>空白图纸、未完成模型、城市晨光、工作台静物，建立“寻找答案”而不是“展示成果”的起点。</li>\n<li>演员只做安静动作：翻图、停笔、看向窗外、拿起模型，不做解释型表演。</li>\n</ul>\n<p class=\"label\"><strong>旁白承担</strong></p>\n<ul>\n<li>旁白功能：提出问题——建筑究竟该把人带向哪里；不出现大段项目信息，只建立命题。</li>\n</ul>\n<p>声音与转场</p>\n<ul>\n<li>声音与转场：以桌面细小声、纸张摩擦、窗外风声开场；转入雪山前，让声音先空一下，再落到实景。</li>\n</ul>\n<p>后期提醒</p>\n<ul>\n<li>必须避免：上来就满配乐、满空镜、满哲理；序章的任务只是立题。</li>\n</ul>\n<h2>四、第一境：雪山 / 生根的意志</h2>\n<p class=\"label\"><strong>建议时长：</strong>00:35—01:25</p>\n<p>画面与结构</p>\n<ul>\n<li>核心功能：把“地基、稳固、向下生长”转译成精神意志，完成第一层价值锚定。</li>\n<li>画面顺序建议：雪线远景—脚下碎石—演员行进—模型压在石面—地基/建筑基础对应镜头。</li>\n</ul>\n<p class=\"label\"><strong>旁白承担</strong></p>\n<ul>\n<li>旁白功能：不是夸项目稳，而是说“真正的建筑，要先学会向下生长”。随后一句点到时代首府与地基、结构、稳定性的关系。</li>\n</ul>\n<p>声音与转场</p>\n<ul>\n<li>声音与转场：风声要有重量；不要把雪山剪得太旅游宣传。转入森林时，用演员抬头、呼吸变化或一片叶声接过去。</li>\n</ul>\n<p>后期提醒</p>\n<ul>\n<li>后期提醒：模型与雪山同框时，模型只是被使用，不是被展示；剪辑上宁可少，不可杂。</li>\n</ul>\n<h2>五、第二境：森林 / 呼吸与共生</h2>\n<p class=\"label\"><strong>建议时长：</strong>01:25—02:20</p>\n<p>画面与结构</p>\n<ul>\n<li>核心功能：把“空中庭院、垂直生态、人与自然共生”从卖点转成生命结构。</li>\n<li>画面顺序建议：林间微光—树冠—湿地与水气—演员穿行—模型庭院细部—项目庭院或绿植空间。</li>\n</ul>\n<p class=\"label\"><strong>旁白承担</strong></p>\n<ul>\n<li>旁白功能：强调建筑不应只占领土地，而应让风、光、树和居住重新成为一个整体；一句回扣时代首府空中庭院与垂直生态。</li>\n</ul>\n<p>声音与转场</p>\n<ul>\n<li>声音与转场：森林段应当“会呼吸”；允许环境声比音乐更前。切入瀑布前，逐渐增加水声、远处轰鸣，制造下一个感官落差。</li>\n</ul>\n<p>后期提醒</p>\n<ul>\n<li>后期提醒：不要把这一境剪成漂亮绿化集锦；必须保住“呼吸”与“共生”的内在逻辑。</li>\n</ul>\n<h2>六、第三境：瀑布 / 过滤世界的能力</h2>\n<p class=\"label\"><strong>建议时长：</strong>02:20—03:15</p>\n<p>画面与结构</p>\n<ul>\n<li>核心功能：这是全片最具身体感的一境，要把“门窗隔音、噪音过滤、居住选择权”做成可被感知的体验。</li>\n<li>画面顺序建议：瀑布巨响—演员接近水幕—环境噪声顶满—室内/窗内切换—静音后的空间细节。</li>\n</ul>\n<p class=\"label\"><strong>旁白承担</strong></p>\n<ul>\n<li>旁白功能：少说一句，重点是“你可以选择住在世界的哪个版本里”；随后再点到项目门窗、隔音与安静感。</li>\n</ul>\n<p>声音与转场</p>\n<ul>\n<li>声音与转场：本境必须把噪音与静音做出断崖式切换；关窗/切入室内那一刻可短暂抽掉音乐，只留极轻室内底噪。</li>\n</ul>\n<p>后期提醒</p>\n<ul>\n<li>后期提醒：这段若做成普通参数表达就废了；必须让观众听见差异，而不是只看见产品。</li>\n</ul>\n<h2>七、第四境：朝圣路 / 回家的秩序感</h2>\n<p class=\"label\"><strong>建议时长：</strong>03:15—04:10</p>\n<p>画面与结构</p>\n<ul>\n<li>核心功能：把“归家动线、门厅、识别、过渡、仪式感”提升到精神秩序层面，但不能借神性借得过满。</li>\n<li>画面顺序建议：脚步—道路—坡道/门厅/归家灯带—影子叠合—识别系统点亮—步伐慢下来。</li>\n</ul>\n<p class=\"label\"><strong>旁白承担</strong></p>\n<ul>\n<li>旁白功能：说“回家不是结束奔波，而是从外部世界进入内心秩序”；随后再回到时代首府归家动线、门厅过渡、灯光识别等真实场景。</li>\n</ul>\n<p>声音与转场</p>\n<ul>\n<li>声音与转场：脚步声是这一境的骨架；可极轻加入远处风声、金属或铃感，但不要做成宗教化设计。</li>\n</ul>\n<p>后期提醒</p>\n<ul>\n<li>后期提醒：这一境最怕虚。必须把仪式感落回生活秩序，而不是悬在神圣感里。</li>\n</ul>\n<h2>八、第五境：神山 / 看见自己</h2>\n<p class=\"label\"><strong>建议时长：</strong>04:10—05:10</p>\n<p>画面与结构</p>\n<ul>\n<li>核心功能：完成全片最高落点——建筑最终要隐去，让人重新看见自己、安顿自己。</li>\n<li>画面顺序建议：神山远望—演员停下—模型与山体叠合—极简空间对应—室内静观、光线、留白。</li>\n</ul>\n<p class=\"label\"><strong>旁白承担</strong></p>\n<ul>\n<li>旁白功能：语言要收，不要再堆高；可以保留“最好的建筑，不是被看见，而是让人看见自己”这一类判断，但前后要留空。</li>\n</ul>\n<p>声音与转场</p>\n<ul>\n<li>声音与转场：允许出现一次接近无声的处理，让观众真正停下来；随后再轻轻把音乐接回。</li>\n</ul>\n<p>后期提醒</p>\n<ul>\n<li>后期提醒：结尾越高级，越不能说满。画面大，语言少，留给观众自行完成最后一跳。</li>\n</ul>\n<h2>九、尾章：回到工作台 / 从自然启示回到项目落地</h2>\n<p class=\"label\"><strong>建议时长：</strong>05:10—05:50</p>\n<p>画面与结构</p>\n<ul>\n<li>核心功能：把前五境的自然启示收束回城市、项目与设计桌面，完成“远游—归来”的闭环。</li>\n<li>画面顺序建议：工作台、完成模型、山石压图、同一盏灯同一扇窗、城市夜色或室内静光。</li>\n</ul>\n<p class=\"label\"><strong>旁白承担</strong></p>\n<ul>\n<li>旁白功能：不要再重新总结五个卖点，只收一句——真正的奢华，不在被看见，而在让生活回到心里。并温和落回时代首府。</li>\n</ul>\n<p>声音与转场</p>\n<ul>\n<li>声音与转场：回到室内微小声音，让全片从宏大自然重新落回一个安静可触的空间。</li>\n</ul>\n<p>后期提醒</p>\n<ul>\n<li>后期提醒：尾章的价值是闭环，不是再起高潮。到这里要“收”，不要“喊”。</li>\n</ul>\n<h2>十、字幕、包装与演员使用原则</h2>\n<p class=\"label\"><strong>字幕原则：</strong>概念版字幕只做题眼、转境、结尾钉句，不承担大段解释；避免全片变成“句子片”。</p>\n<p>包装原则：模型、线稿、地图、微缩与实景叠合可以做，但包装只服务转义，不可抢夺画面主体。</p>\n<p>演员原则：演员只做观察、触摸、停顿、行走、举模型、关窗、回望等动作，不做“领悟式表演”。</p>\n<p>禁忌提醒：避免使用带明显文化忌讳或死亡联想的词；概念高度应转向“安顿、归属、安静、被照顾、回到内心秩序”等方向。</p>\n<h2>十一、最后一句后期纲领</h2>\n<div class=\"table-notes\"><div class=\"table-note\">不要把它剪成“项目多高级”，而要把它剪成“建筑如何被自然重新唤醒，最终回到人的内心”。</div></div>", "text": "时代首府 V4《概念版后期脚本版》\n后期工作稿｜用于导演组、剪辑、声音设计与包装协同\n定位说明：这不是信息型地产片的后期脚本，而是一支以“建筑生命觉醒”为母题的概念主片后期工作稿。后期任务不是把卖点剪漂亮，而是把五境结构、模型交互、演员状态、声音秩序和项目落点真正剪成一个完整的精神闭环。\n一、全片后期总原则\n1）后期不是补救文本，而是完成“自然启示—建筑转译—项目归属—精神落点”的最后闭环。\n2）画面负责建立神性与感知，旁白负责归纳判断，声音负责让观众在身体层面完成切换。\n3）全片要始终避免两种失手：一是剪成空泛文艺片，二是剪成高端地产卖点片。\n4）诗性语言只在题眼、转境、结尾处提气，不承担大段信息输送。\n5）演员不是表演意义的人，而是承载观看、触摸、抵达、领悟这些动作的“容器”。\n二、全片节奏与声音总控\n段落 | 节奏状态 | 声音策略 | 后期提醒\n序章 | 慢起、留白、建立观看方式 | 环境底噪先行，音乐极克制 | 不要急于解释项目，不要快切\n雪山 | 庄重、压低、建立意志 | 低频风声、鞋底与石面摩擦声 | 模型转真实必须稳，不可花哨\n森林 | 呼吸打开、层次丰富 | 叶响、鸟鸣、湿润空气感 | 绿色影调要克制，避免旅游片感\n瀑布 | 强烈对比、瞬间静音 | 先让噪声顶满，再用关窗切静 | 这是全片最强感官切换点\n朝圣路 | 节奏整饬、脚步渐稳 | 呼吸、脚步、铃声或远处风声 | 不要神化过度，要落回归家秩序\n神山/尾章 | 情绪放大但语言收束 | 三秒近无声后再进音乐 | 越到结尾越要少说，让观众自己完成意义\n三、序章：空白图纸 / 尚未被回答的问题\n建议时长：00:00—00:35\n画面与结构\n• 空白图纸、未完成模型、城市晨光、工作台静物，建立“寻找答案”而不是“展示成果”的起点。\n• 演员只做安静动作：翻图、停笔、看向窗外、拿起模型，不做解释型表演。\n旁白承担\n• 旁白功能：提出问题——建筑究竟该把人带向哪里；不出现大段项目信息，只建立命题。\n声音与转场\n• 声音与转场：以桌面细小声、纸张摩擦、窗外风声开场；转入雪山前，让声音先空一下，再落到实景。\n后期提醒\n• 必须避免：上来就满配乐、满空镜、满哲理；序章的任务只是立题。\n四、第一境：雪山 / 生根的意志\n建议时长：00:35—01:25\n画面与结构\n• 核心功能：把“地基、稳固、向下生长”转译成精神意志，完成第一层价值锚定。\n• 画面顺序建议：雪线远景—脚下碎石—演员行进—模型压在石面—地基/建筑基础对应镜头。\n旁白承担\n• 旁白功能：不是夸项目稳，而是说“真正的建筑，要先学会向下生长”。随后一句点到时代首府与地基、结构、稳定性的关系。\n声音与转场\n• 声音与转场：风声要有重量；不要把雪山剪得太旅游宣传。转入森林时，用演员抬头、呼吸变化或一片叶声接过去。\n后期提醒\n• 后期提醒：模型与雪山同框时，模型只是被使用，不是被展示；剪辑上宁可少，不可杂。\n五、第二境：森林 / 呼吸与共生\n建议时长：01:25—02:20\n画面与结构\n• 核心功能：把“空中庭院、垂直生态、人与自然共生”从卖点转成生命结构。\n• 画面顺序建议：林间微光—树冠—湿地与水气—演员穿行—模型庭院细部—项目庭院或绿植空间。\n旁白承担\n• 旁白功能：强调建筑不应只占领土地，而应让风、光、树和居住重新成为一个整体；一句回扣时代首府空中庭院与垂直生态。\n声音与转场\n• 声音与转场：森林段应当“会呼吸”；允许环境声比音乐更前。切入瀑布前，逐渐增加水声、远处轰鸣，制造下一个感官落差。\n后期提醒\n• 后期提醒：不要把这一境剪成漂亮绿化集锦；必须保住“呼吸”与“共生”的内在逻辑。\n六、第三境：瀑布 / 过滤世界的能力\n建议时长：02:20—03:15\n画面与结构\n• 核心功能：这是全片最具身体感的一境，要把“门窗隔音、噪音过滤、居住选择权”做成可被感知的体验。\n• 画面顺序建议：瀑布巨响—演员接近水幕—环境噪声顶满—室内/窗内切换—静音后的空间细节。\n旁白承担\n• 旁白功能：少说一句，重点是“你可以选择住在世界的哪个版本里”；随后再点到项目门窗、隔音与安静感。\n声音与转场\n• 声音与转场：本境必须把噪音与静音做出断崖式切换；关窗/切入室内那一刻可短暂抽掉音乐，只留极轻室内底噪。\n后期提醒\n• 后期提醒：这段若做成普通参数表达就废了；必须让观众听见差异，而不是只看见产品。\n七、第四境：朝圣路 / 回家的秩序感\n建议时长：03:15—04:10\n画面与结构\n• 核心功能：把“归家动线、门厅、识别、过渡、仪式感”提升到精神秩序层面，但不能借神性借得过满。\n• 画面顺序建议：脚步—道路—坡道/门厅/归家灯带—影子叠合—识别系统点亮—步伐慢下来。\n旁白承担\n• 旁白功能：说“回家不是结束奔波，而是从外部世界进入内心秩序”；随后再回到时代首府归家动线、门厅过渡、灯光识别等真实场景。\n声音与转场\n• 声音与转场：脚步声是这一境的骨架；可极轻加入远处风声、金属或铃感，但不要做成宗教化设计。\n后期提醒\n• 后期提醒：这一境最怕虚。必须把仪式感落回生活秩序，而不是悬在神圣感里。\n八、第五境：神山 / 看见自己\n建议时长：04:10—05:10\n画面与结构\n• 核心功能：完成全片最高落点——建筑最终要隐去，让人重新看见自己、安顿自己。\n• 画面顺序建议：神山远望—演员停下—模型与山体叠合—极简空间对应—室内静观、光线、留白。\n旁白承担\n• 旁白功能：语言要收，不要再堆高；可以保留“最好的建筑，不是被看见，而是让人看见自己”这一类判断，但前后要留空。\n声音与转场\n• 声音与转场：允许出现一次接近无声的处理，让观众真正停下来；随后再轻轻把音乐接回。\n后期提醒\n• 后期提醒：结尾越高级，越不能说满。画面大，语言少，留给观众自行完成最后一跳。\n九、尾章：回到工作台 / 从自然启示回到项目落地\n建议时长：05:10—05:50\n画面与结构\n• 核心功能：把前五境的自然启示收束回城市、项目与设计桌面，完成“远游—归来”的闭环。\n• 画面顺序建议：工作台、完成模型、山石压图、同一盏灯同一扇窗、城市夜色或室内静光。\n旁白承担\n• 旁白功能：不要再重新总结五个卖点，只收一句——真正的奢华，不在被看见，而在让生活回到心里。并温和落回时代首府。\n声音与转场\n• 声音与转场：回到室内微小声音，让全片从宏大自然重新落回一个安静可触的空间。\n后期提醒\n• 后期提醒：尾章的价值是闭环，不是再起高潮。到这里要“收”，不要“喊”。\n十、字幕、包装与演员使用原则\n字幕原则：概念版字幕只做题眼、转境、结尾钉句，不承担大段解释；避免全片变成“句子片”。\n包装原则：模型、线稿、地图、微缩与实景叠合可以做，但包装只服务转义，不可抢夺画面主体。\n演员原则：演员只做观察、触摸、停顿、行走、举模型、关窗、回望等动作，不做“领悟式表演”。\n禁忌提醒：避免使用带明显文化忌讳或死亡联想的词；概念高度应转向“安顿、归属、安静、被照顾、回到内心秩序”等方向。\n十一、最后一句后期纲领\n不要把它剪成“项目多高级”，而要把它剪成“建筑如何被自然重新唤醒，最终回到人的内心”。"}, {"filename": "时代首府_V4.1_概念版后期脚本版_分镜头表格式工作稿.docx", "id": "concept-5", "section": "concept", "group": "概念版", "title": "概念版后期脚本版·分镜头表格式工作稿", "subtitle": "概念版 V4.1", "desc": "适合制片、摄影、美术、虚拟影棚、演员、剪辑与声音团队共同查看的表格式工作稿。", "audience": ["剧组", "影棚", "后期"], "tags": ["概念版", "分镜表", "工作稿"], "content": "<p>时代首府</p>\n<h2>V4.1《概念版后期脚本版 - 分镜头表格式工作稿》</h2>\n<p>适用：导演 / 制片 / 摄影 / 美术 / 虚拟影棚 / 演员 / 剪辑 / 声音 / 包装</p>\n<div class=\"table-notes\"><div class=\"table-note\">工作定位：本稿用于概念版后期统筹与跨工种协同，不替代导演分镜图，也不替代最终配音定稿。\n总原则：概念高度必须服务于项目归属。每一境都要完成“自然启示 -&gt; 建筑回应 -&gt; 时代首府价值落点”的闭环。\n执行关键：演员克制、模型真实、影棚可控、声音先行、转场精确。</div></div>\n<h2>一、全片总控表</h2>\n<div class=\"table-wrap\"><table><thead><tr><th>模块</th><th>目标</th><th>执行要点</th></tr></thead><tbody><tr><td>整体气质</td><td>高位、克制、神性但不悬空</td><td>画面要留呼吸感，语言要有留白，演员只承担寻找状态，不承担“哲理表演”。</td></tr><tr><td>项目归属</td><td>每一境都回到时代首府真实价值</td><td>雪山-地基与意志；森林-庭院与共生；瀑布-门窗与安静选择；朝圣路-归家动线；神山-心域与归属。</td></tr><tr><td>实景职责</td><td>真实自然负责“启示”</td><td>雪山、森林、瀑布、道路、神山等自然实景负责建立精神母体，不直接替代项目卖点。</td></tr><tr><td>影棚职责</td><td>建筑回应自然的转换层</td><td>模型、建筑界面、门厅仪式感、光影和空间秩序在影棚完成，必须材质可信、光向统一。</td></tr><tr><td>声音职责</td><td>结构级工作，不是配饰</td><td>自然声、静默、门窗切换、脚步、风、水、纸张、木头与石材触感声都要前置设计。</td></tr><tr><td>剪辑职责</td><td>匹配剪辑 + 留白 + 递进</td><td>概念片不能一路堆满。每一境都要先让观众进入，再给启示，最后落回项目。</td></tr></tbody></table></div>\n<h2>二、分镜头表格式工作稿</h2>\n<h3>序章 / 空白图纸</h3>\n<div class=\"table-wrap\"><table><tbody><tr><td>建议时长</td><td>0:00-0:50</td><td>核心控制</td><td>实景 + 影棚 + 模型 + 声音协同</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><thead><tr><th>核心画面/镜头</th><th>空白桌面、未完成模型、工作室夜灯、纸张、手绘、城市外部极简空镜。\n不要急着出现太多建筑成品，先让观众进入“尚未回答的问题”。</th></tr></thead><tbody><tr><td>旁白功能</td><td>提出命题：建筑为什么被建造，家为什么值得被重新理解。\n语言只负责开门，不负责讲完。</td></tr><tr><td>演员动作</td><td>演员进入工作台，停、看、翻图纸、触摸模型。\n不表演沉思，只呈现寻找状态。</td></tr><tr><td>虚拟影棚/模型</td><td>模型可为未完成状态；影棚只提供极简可控环境，不抢自然实景。</td></tr><tr><td>声音/音乐</td><td>纸张声、铅笔声、室内微电流感环境声；音乐极轻。</td></tr><tr><td>字幕/包装</td><td>片名、副题、极少量题眼字幕。</td></tr><tr><td>转场与执行提醒</td><td>从“未完成”进入全片。禁止一开场就满格史诗。</td></tr></tbody></table></div>\n<h3>第一境 / 雪山 - 生根</h3>\n<div class=\"table-wrap\"><table><tbody><tr><td>建议时长</td><td>0:50-1:50</td><td>核心控制</td><td>实景 + 影棚 + 模型 + 声音协同</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><thead><tr><th>核心画面/镜头</th><th>真实雪山、岩层、冰裂、地表纹理；随后匹配到模型基座、结构剖面、建筑起势。\n镜头应强调“站稳”“生长”“向上而不飘”。</th></tr></thead><tbody><tr><td>旁白功能</td><td>把地基从工程术语提升为“意志与根性”。\n但必须落回时代首府的基础稳固与长期主义。</td></tr><tr><td>演员动作</td><td>面对雪山停驻；回到影棚后将模型基座安放在桌面或图纸上。</td></tr><tr><td>虚拟影棚/模型</td><td>模型基座、结构起势、少量建筑轮廓在影棚中回应雪山线条。</td></tr><tr><td>声音/音乐</td><td>风声为主，音乐延后进入；石头摩擦与低频可轻度加入。</td></tr><tr><td>字幕/包装</td><td>只点“生根”“稳固”“意志”等短词，不上参数。</td></tr><tr><td>转场与执行提醒</td><td>禁止把雪山仅当大景奇观。雪山必须与“地基/站稳”建立明确因果。</td></tr></tbody></table></div>\n<h3>第二境 / 森林 - 共生</h3>\n<div class=\"table-wrap\"><table><tbody><tr><td>建议时长</td><td>1:50-2:45</td><td>核心控制</td><td>实景 + 影棚 + 模型 + 声音协同</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><thead><tr><th>核心画面/镜头</th><th>林间风、树冠、光斑、树皮、呼吸感镜头；再转入庭院、绿意、垂直界面、空中庭院的回应。</th></tr></thead><tbody><tr><td>旁白功能</td><td>讲“建筑不是把自然赶走，而是学会与自然相处”。\n落到项目的庭院系统、垂直生态与呼吸感。</td></tr><tr><td>演员动作</td><td>演员穿行林间，触碰树皮、抬头看光；回到影棚中调整模型庭院部分。</td></tr><tr><td>虚拟影棚/模型</td><td>虚拟影棚承担建筑立面与绿意关系、空中庭院层层递进、光影模拟。</td></tr><tr><td>声音/音乐</td><td>风穿林、叶片摩擦、远处鸟鸣；音乐略打开但不煽。</td></tr><tr><td>字幕/包装</td><td>“共生”“呼吸”“庭院不是装饰”等短语。</td></tr><tr><td>转场与执行提醒</td><td>森林不是景观素材库，而是“空中庭院为何成立”的精神前身。</td></tr></tbody></table></div>\n<h3>第三境 / 瀑布 - 选择安静</h3>\n<div class=\"table-wrap\"><table><tbody><tr><td>建议时长</td><td>2:45-3:40</td><td>核心控制</td><td>实景 + 影棚 + 模型 + 声音协同</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><thead><tr><th>核心画面/镜头</th><th>瀑布近景、巨响、雾气、水滴拍打；匹配到门窗、室内外界面、关窗动作、静音空间。</th></tr></thead><tbody><tr><td>旁白功能</td><td>从“世界很响”转入“居住者应该拥有选择自己所处版本的权利”。\n落到降噪门窗、过滤噪音和内外切换。</td></tr><tr><td>演员动作</td><td>站在瀑布前承受轰鸣；回到影棚或样板空间做一个关窗动作。</td></tr><tr><td>虚拟影棚/模型</td><td>影棚中必须精确完成门窗界面与内外光线关系；可做噪声切换对照。</td></tr><tr><td>声音/音乐</td><td>这是全片关键声音段：窗外轰鸣 -&gt; 关窗 -&gt; 瞬时静默/室内细微声。</td></tr><tr><td>字幕/包装</td><td>少量点题，如“选择”“安静”“过滤世界的噪声”。</td></tr><tr><td>转场与执行提醒</td><td>这一境能否成立，主要不靠台词，靠声音切换和动作完成。</td></tr></tbody></table></div>\n<h3>第四境 / 朝圣路 - 归家仪式</h3>\n<div class=\"table-wrap\"><table><tbody><tr><td>建议时长</td><td>3:40-4:35</td><td>核心控制</td><td>实景 + 影棚 + 模型 + 声音协同</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><thead><tr><th>核心画面/镜头</th><th>道路、脚步、远近变化、路感细节；匹配归家动线、门厅、步行序列、识别灯、过渡空间。</th></tr></thead><tbody><tr><td>旁白功能</td><td>把“归家”讲成一种秩序、一种方向感，而不是神性借用。\n避免借信仰抬项目，要落回门厅秩序、动线体验、归家仪式。</td></tr><tr><td>演员动作</td><td>只走路、停顿、抬眼，不做夸张情绪。</td></tr><tr><td>虚拟影棚/模型</td><td>影棚承担门厅光线、识别灯、步行动线和建筑秩序感的可控呈现。</td></tr><tr><td>声音/音乐</td><td>脚步声必须清晰；音乐减法，让步伐与空间回应建立节奏。</td></tr><tr><td>字幕/包装</td><td>尽量少；可用“归家不是到达，是一步步被接住”。</td></tr><tr><td>转场与执行提醒</td><td>这是最危险的一境。控制分寸，避免宗教感过满。</td></tr></tbody></table></div>\n<h3>第五境 / 神山 - 心域</h3>\n<div class=\"table-wrap\"><table><tbody><tr><td>建议时长</td><td>4:35-5:35</td><td>核心控制</td><td>实景 + 影棚 + 模型 + 声音协同</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><thead><tr><th>核心画面/镜头</th><th>神山远望、云层、静止感；再转到建筑内部更安定、更收束的空间秩序。\n强调“建筑逐渐隐去，人的感受留下”。</th></tr></thead><tbody><tr><td>旁白功能</td><td>完成全片最高点：最好的建筑不是炫耀存在，而是让人安顿下来。\n必须对应时代首府的心域感、归属感和最终的家之回答。</td></tr><tr><td>演员动作</td><td>面对神山不需要表演震撼，只需要站定、放下、看见。</td></tr><tr><td>虚拟影棚/模型</td><td>模型与神山叠合需极准；影棚空间应更简、更静、更克制。</td></tr><tr><td>声音/音乐</td><td>建议出现一次完整的静默窗口或极轻音乐，让观众自己进入。</td></tr><tr><td>字幕/包装</td><td>只保留终极题眼式短句，不可堆满。</td></tr><tr><td>转场与执行提醒</td><td>高度够了就收，别再往上喊。真正高级的是“留白后的抵达”。</td></tr></tbody></table></div>\n<p>尾章 / 回到工作室</p>\n<div class=\"table-wrap\"><table><tbody><tr><td>建议时长</td><td>5:35-6:20</td><td>核心控制</td><td>实景 + 影棚 + 模型 + 声音协同</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><thead><tr><th>核心画面/镜头</th><th>回到同一张桌子、同一盏灯、同一扇窗；模型已完成，山石压图，草图变成建筑。</th></tr></thead><tbody><tr><td>旁白功能</td><td>把远行所得回到项目：时代首府不是被想象出来，而是被一次次寻找、校正、回应出来。</td></tr><tr><td>演员动作</td><td>把模型放回桌上，轻收手势，坐回或站回工作位。</td></tr><tr><td>虚拟影棚/模型</td><td>只保留极少量影棚控制，让工作室与前文形成结构闭环。</td></tr><tr><td>声音/音乐</td><td>回到纸张、木头、安静室内声；音乐收束。</td></tr><tr><td>字幕/包装</td><td>品牌落版、项目名称；收尾字幕必须克制。</td></tr><tr><td>转场与执行提醒</td><td>尾章不是总结卖点，而是让观众意识到：答案已经落回建筑本身。</td></tr></tbody></table></div>\n<h2>三、后期总检查清单</h2>\n<p>是否每一境都完成了“自然启示 -&gt; 建筑回应 -&gt; 项目落点”的闭环。</p>\n<p>演员是否始终保持“经历者”而非“意义表演者”的状态。</p>\n<p>模型、虚拟影棚与实景之间的光向、透视、材质、比例是否统一。</p>\n<p>瀑布关窗段、神山静默段、尾章闭环段是否真正成为全片支点。</p>\n<p class=\"label\"><strong>字幕是否过多、旁白是否过满、音乐是否过顶。</strong></p>\n<p>是否避开不适合中文居住传播语境的词汇与意象误用。</p>", "text": "时代首府\nV4.1《概念版后期脚本版 - 分镜头表格式工作稿》\n适用：导演 / 制片 / 摄影 / 美术 / 虚拟影棚 / 演员 / 剪辑 / 声音 / 包装\n工作定位：本稿用于概念版后期统筹与跨工种协同，不替代导演分镜图，也不替代最终配音定稿。\n总原则：概念高度必须服务于项目归属。每一境都要完成“自然启示 -> 建筑回应 -> 时代首府价值落点”的闭环。\n执行关键：演员克制、模型真实、影棚可控、声音先行、转场精确。\n一、全片总控表\n模块 | 目标 | 执行要点\n整体气质 | 高位、克制、神性但不悬空 | 画面要留呼吸感，语言要有留白，演员只承担寻找状态，不承担“哲理表演”。\n项目归属 | 每一境都回到时代首府真实价值 | 雪山-地基与意志；森林-庭院与共生；瀑布-门窗与安静选择；朝圣路-归家动线；神山-心域与归属。\n实景职责 | 真实自然负责“启示” | 雪山、森林、瀑布、道路、神山等自然实景负责建立精神母体，不直接替代项目卖点。\n影棚职责 | 建筑回应自然的转换层 | 模型、建筑界面、门厅仪式感、光影和空间秩序在影棚完成，必须材质可信、光向统一。\n声音职责 | 结构级工作，不是配饰 | 自然声、静默、门窗切换、脚步、风、水、纸张、木头与石材触感声都要前置设计。\n剪辑职责 | 匹配剪辑 + 留白 + 递进 | 概念片不能一路堆满。每一境都要先让观众进入，再给启示，最后落回项目。\n二、分镜头表格式工作稿\n序章 / 空白图纸\n建议时长 | 0:00-0:50 | 核心控制 | 实景 + 影棚 + 模型 + 声音协同\n核心画面/镜头 | 空白桌面、未完成模型、工作室夜灯、纸张、手绘、城市外部极简空镜。\n不要急着出现太多建筑成品，先让观众进入“尚未回答的问题”。\n旁白功能 | 提出命题：建筑为什么被建造，家为什么值得被重新理解。\n语言只负责开门，不负责讲完。\n演员动作 | 演员进入工作台，停、看、翻图纸、触摸模型。\n不表演沉思，只呈现寻找状态。\n虚拟影棚/模型 | 模型可为未完成状态；影棚只提供极简可控环境，不抢自然实景。\n声音/音乐 | 纸张声、铅笔声、室内微电流感环境声；音乐极轻。\n字幕/包装 | 片名、副题、极少量题眼字幕。\n转场与执行提醒 | 从“未完成”进入全片。禁止一开场就满格史诗。\n第一境 / 雪山 - 生根\n建议时长 | 0:50-1:50 | 核心控制 | 实景 + 影棚 + 模型 + 声音协同\n核心画面/镜头 | 真实雪山、岩层、冰裂、地表纹理；随后匹配到模型基座、结构剖面、建筑起势。\n镜头应强调“站稳”“生长”“向上而不飘”。\n旁白功能 | 把地基从工程术语提升为“意志与根性”。\n但必须落回时代首府的基础稳固与长期主义。\n演员动作 | 面对雪山停驻；回到影棚后将模型基座安放在桌面或图纸上。\n虚拟影棚/模型 | 模型基座、结构起势、少量建筑轮廓在影棚中回应雪山线条。\n声音/音乐 | 风声为主，音乐延后进入；石头摩擦与低频可轻度加入。\n字幕/包装 | 只点“生根”“稳固”“意志”等短词，不上参数。\n转场与执行提醒 | 禁止把雪山仅当大景奇观。雪山必须与“地基/站稳”建立明确因果。\n第二境 / 森林 - 共生\n建议时长 | 1:50-2:45 | 核心控制 | 实景 + 影棚 + 模型 + 声音协同\n核心画面/镜头 | 林间风、树冠、光斑、树皮、呼吸感镜头；再转入庭院、绿意、垂直界面、空中庭院的回应。\n旁白功能 | 讲“建筑不是把自然赶走，而是学会与自然相处”。\n落到项目的庭院系统、垂直生态与呼吸感。\n演员动作 | 演员穿行林间，触碰树皮、抬头看光；回到影棚中调整模型庭院部分。\n虚拟影棚/模型 | 虚拟影棚承担建筑立面与绿意关系、空中庭院层层递进、光影模拟。\n声音/音乐 | 风穿林、叶片摩擦、远处鸟鸣；音乐略打开但不煽。\n字幕/包装 | “共生”“呼吸”“庭院不是装饰”等短语。\n转场与执行提醒 | 森林不是景观素材库，而是“空中庭院为何成立”的精神前身。\n第三境 / 瀑布 - 选择安静\n建议时长 | 2:45-3:40 | 核心控制 | 实景 + 影棚 + 模型 + 声音协同\n核心画面/镜头 | 瀑布近景、巨响、雾气、水滴拍打；匹配到门窗、室内外界面、关窗动作、静音空间。\n旁白功能 | 从“世界很响”转入“居住者应该拥有选择自己所处版本的权利”。\n落到降噪门窗、过滤噪音和内外切换。\n演员动作 | 站在瀑布前承受轰鸣；回到影棚或样板空间做一个关窗动作。\n虚拟影棚/模型 | 影棚中必须精确完成门窗界面与内外光线关系；可做噪声切换对照。\n声音/音乐 | 这是全片关键声音段：窗外轰鸣 -> 关窗 -> 瞬时静默/室内细微声。\n字幕/包装 | 少量点题，如“选择”“安静”“过滤世界的噪声”。\n转场与执行提醒 | 这一境能否成立，主要不靠台词，靠声音切换和动作完成。\n第四境 / 朝圣路 - 归家仪式\n建议时长 | 3:40-4:35 | 核心控制 | 实景 + 影棚 + 模型 + 声音协同\n核心画面/镜头 | 道路、脚步、远近变化、路感细节；匹配归家动线、门厅、步行序列、识别灯、过渡空间。\n旁白功能 | 把“归家”讲成一种秩序、一种方向感，而不是神性借用。\n避免借信仰抬项目，要落回门厅秩序、动线体验、归家仪式。\n演员动作 | 只走路、停顿、抬眼，不做夸张情绪。\n虚拟影棚/模型 | 影棚承担门厅光线、识别灯、步行动线和建筑秩序感的可控呈现。\n声音/音乐 | 脚步声必须清晰；音乐减法，让步伐与空间回应建立节奏。\n字幕/包装 | 尽量少；可用“归家不是到达，是一步步被接住”。\n转场与执行提醒 | 这是最危险的一境。控制分寸，避免宗教感过满。\n第五境 / 神山 - 心域\n建议时长 | 4:35-5:35 | 核心控制 | 实景 + 影棚 + 模型 + 声音协同\n核心画面/镜头 | 神山远望、云层、静止感；再转到建筑内部更安定、更收束的空间秩序。\n强调“建筑逐渐隐去，人的感受留下”。\n旁白功能 | 完成全片最高点：最好的建筑不是炫耀存在，而是让人安顿下来。\n必须对应时代首府的心域感、归属感和最终的家之回答。\n演员动作 | 面对神山不需要表演震撼，只需要站定、放下、看见。\n虚拟影棚/模型 | 模型与神山叠合需极准；影棚空间应更简、更静、更克制。\n声音/音乐 | 建议出现一次完整的静默窗口或极轻音乐，让观众自己进入。\n字幕/包装 | 只保留终极题眼式短句，不可堆满。\n转场与执行提醒 | 高度够了就收，别再往上喊。真正高级的是“留白后的抵达”。\n尾章 / 回到工作室\n建议时长 | 5:35-6:20 | 核心控制 | 实景 + 影棚 + 模型 + 声音协同\n核心画面/镜头 | 回到同一张桌子、同一盏灯、同一扇窗；模型已完成，山石压图，草图变成建筑。\n旁白功能 | 把远行所得回到项目：时代首府不是被想象出来，而是被一次次寻找、校正、回应出来。\n演员动作 | 把模型放回桌上，轻收手势，坐回或站回工作位。\n虚拟影棚/模型 | 只保留极少量影棚控制，让工作室与前文形成结构闭环。\n声音/音乐 | 回到纸张、木头、安静室内声；音乐收束。\n字幕/包装 | 品牌落版、项目名称；收尾字幕必须克制。\n转场与执行提醒 | 尾章不是总结卖点，而是让观众意识到：答案已经落回建筑本身。\n三、后期总检查清单\n是否每一境都完成了“自然启示 -> 建筑回应 -> 项目落点”的闭环。\n演员是否始终保持“经历者”而非“意义表演者”的状态。\n模型、虚拟影棚与实景之间的光向、透视、材质、比例是否统一。\n瀑布关窗段、神山静默段、尾章闭环段是否真正成为全片支点。\n字幕是否过多、旁白是否过满、音乐是否过顶。\n是否避开不适合中文居住传播语境的词汇与意象误用。"}, {"filename": "时代首府_第一集品牌电影分解.docx", "id": "concept-6", "section": "concept", "group": "概念版", "title": "第一集品牌电影分解", "subtitle": "概念版分解", "desc": "从母题、结构、五境系统与执行风险角度拆解概念版，是理解这条片调性上限的关键文档。", "audience": ["导演组", "编剧", "甲方"], "tags": ["概念版", "分析", "分解"], "content": "<p>这不是一支“概念宣传片”那么简单，它已经接近一部高度风格化的品牌电影序章。</p>\n<p>它的上限非常高，确实是三支片里立意、调性、形式野心最大的一版；但它的风险也最大，因为它不是靠信息成立，而是靠 母题统一、五境对应、第一人称朝圣结构、声音设计、模型交互、实景与虚拟影棚的融合精度 来成立。脚本自己已经把它定义成“关于建筑生命觉醒史的思想短片”，并明确提出“观众不会被推销，而会被唤醒”，同时建立了雪山、森林、瀑布、318朝圣路、神山与项目五个核心价值的一一对应。</p>\n<p>所以，这稿子不能按常规地产广告逻辑去看。</p>\n<p>要看的核心是四件事：</p>\n<p>母题够不够稳，意象系统有没有内在闭环，诗性是否真的落到项目价值，执行方式能不能把文本野心拍出来。</p>\n<h2>一、核心问题</h2>\n<h2>1. 母题非常强，而且是三版里最完整的一版</h2>\n<p>这版真正的母题，不是“时代首府很好”，也不是“项目有五大卖点”，而是：</p>\n<p>建筑不只是被建造出来的物，它应该被唤醒，最终成为人的内在归属与精神坐标。</p>\n<p>这个母题在总纲和序章里其实已经定得很准：</p>\n<p>这不是常规地产宣传片，而是“建筑生命觉醒史”的思想短片。</p>\n<p>设计师启程去寻找“建筑的原初答案”。</p>\n<p>尾章落点是“最好的建筑，不是被看见，而是让人看见自己”。</p>\n<p>这说明它不是卖点拼盘，而是一条完整的精神路径：</p>\n<p>从建造问题出发，经过自然启示，回到“家”的精神意义。</p>\n<p>这是它最厉害的地方。</p>\n<p>也是它比政府版、业主版更高阶的地方。</p>\n<h2>2. 结构高度统一，五境系统不是拼贴，而是完整的哲学链条</h2>\n<p>这稿子最难得的，不是写得美，而是结构真的统一。</p>\n<h2>五境对应关系不是随便找几个景观来比喻，而是有内在递进的：</h2>\n<p>雪山：地基 / 生根 / 意志</p>\n<p>森林：庭院 / 呼吸 / 共生</p>\n<p>瀑布：门窗 / 噪音过滤 / 选择</p>\n<p>朝圣路：归家动线 / 仪式 / 方向</p>\n<p>神山：终极心域 / 建筑隐去 / 看见自己</p>\n<p>这不是横向并列，而是纵向推进。</p>\n<p>它其实走的是一条非常完整的精神曲线：</p>\n<p>站稳 → 呼吸 → 安静 → 抵达 → 看见自己</p>\n<p>这就是这版能成立的关键。</p>\n<p>也就是说，这稿子最大的优点不是句子，而是架构非常高级，而且闭环意识很强。片头的空白图纸与未完成模型，尾章回到同一张桌子、同一盏灯、同一扇窗，但“模型已完成、山石压图”，这个叙事闭环是成立的。</p>\n<h2>3. 这版最大的优势，是“项目价值被翻译成了精神体验”</h2>\n<p>政府版把价值翻译成标准与城市贡献。</p>\n<p>业主版把价值翻译成偏执与生活感。</p>\n<p>而概念版做的是第三层翻译：</p>\n<p>把产品价值翻译成可感知、可记忆、可沉浸的精神体验。</p>\n<p>比如最强的几个点：</p>\n<p>地基不是工程术语，而是“从大地深处生长出来的意志”。</p>\n<p>空中庭院不是绿化卖点，而是“建筑的肺”。</p>\n<p>降噪门窗不是参数，而是“你可以决定住在世界的哪个版本里”。</p>\n<p>归家动线不是交通组织，而是“回家的仪式”。</p>\n<p>家不是物理空间，而是“精神坐标”。</p>\n<p>这就解释了为什么你说它是你最看重的一版。</p>\n<p>因为它不只是讲项目，而是在争夺项目的精神解释权。</p>\n<h2>4. 最大风险不是“太文艺”，而是“太完整”</h2>\n<p>这版稿子已经完整到接近“片子在纸上已经成立了”。</p>\n<p>这既是优点，也是风险。</p>\n<p>风险在于：</p>\n<p>文本成立，不等于影像成立。</p>\n<p>尤其你已经明确执行方式是：</p>\n<p>实景拍摄 + 虚拟影棚 + 演员</p>\n<p>而这版真正的难点，恰恰都在执行层：</p>\n<p>微缩模型与真实自然的时空折叠，能不能拍得不假</p>\n<p>设计师第一人称，能不能演得不端着</p>\n<p>自然奇观与建筑卖点的对应，能不能不显得“硬贴”</p>\n<p>声音设计，能不能真的做到身体层面的切换</p>\n<p>全片诗性语言，能不能在成片里不发飘</p>\n<p>脚本自己其实已经知道这一点，所以才会把“声音决定本集50%成败”“怒江一幕是全片最重要单一动作”“冈仁波齐模型叠合三秒须完全无声”等执行要求写得这么重。</p>\n<p>也就是说，这稿子最大的问题不是立意，而是：</p>\n<p>它对执行精度要求极高，稍微拍虚一点，就会从上乘掉成做作。</p>\n<h2>二、次要问题</h2>\n<h2>1. 第一人称设计师视角很对，但“人物身份”仍略抽象</h2>\n<p>这版现在采用设计师第一人称朝圣之旅，这是非常聪明的选择。</p>\n<p>因为它避免了企业口吻，也避免了纯上帝视角。</p>\n<p>但现在的问题是：</p>\n<p>这个“我”更像一个思想载体，而不是一个真实的人。</p>\n<p>比如序章、五境、终章里的“我”，一直在看、在想、在领悟、在举模型。</p>\n<p>这当然符合概念片气质。</p>\n<p>但如果演员处理不好，就会很容易变成：</p>\n<p>太知道自己在“表演意义”</p>\n<p>太像广告里的“哲人男主”</p>\n<p>太像概念的代言人，而不是经历者</p>\n<p>所以这版后续最关键的一件事，是别把这个人物拍成“神秘设计师”，而要拍成一个在寻找答案的人。</p>\n<h2>2. 第四境“朝圣路”是最危险也最容易失手的一章</h2>\n<p>前面三境都比较牢：</p>\n<p>雪山有地基和意志，成立</p>\n<p>森林有共生和空中庭院，成立</p>\n<p>瀑布有噪音与选择，成立，而且很强</p>\n<p>但第四境“朝圣路 = 归家动线 = 仪式”，概念很好，却最容易拍虚。</p>\n<p>因为这里一旦处理不好，就会出现两个风险：</p>\n<p>第一，借用了朝圣意象，却没有真正转换成项目内部逻辑。</p>\n<p>第二，朝圣者是真实的信仰对象，而项目归家动线是居住体验对象，两者之间如果连接得不够精细，会显得过于“借神性抬项目”。</p>\n<p>脚本里其实已经意识到这个问题，所以用了“影子叠合”“识别灯亮起←→脚步落地”的匹配剪辑来处理。</p>\n<p>思路是对的，但这仍然是全片最需要谨慎把握分寸的一章。</p>\n<h2>3. 终章非常强，但也最怕“过满”</h2>\n<p>终章的文本是极强的。</p>\n<p>尤其这几句：</p>\n<p>“等待被寻找的从来不是答案”</p>\n<p>“最好的建筑，不是被看见，而是让人看见自己”</p>\n<p>“真正的奢华，是建筑隐去，生活回到心的故乡”</p>\n<p>这些句子本身都成立。</p>\n<p>但问题在于，终章前面已经经历了四境累积，如果这里再全力抬高，就很容易“满”。</p>\n<p>所以终章最怕的不是不够，而是太够。</p>\n<p>真正高级的处理，应该是画面大，情绪收，语言少一寸，留给观众多一寸。</p>\n<h2>4. 文本里少数词句仍有文化语义风险</h2>\n<p>你前面已经明确提醒了中文语境里的忌讳词，这个提醒非常重要。</p>\n<p>而这份概念稿里，第四境增补旁白里就有一句：</p>\n<p>“回家的路，不应该是死去的时间——”</p>\n<p>这个表达在创作逻辑上没问题，但在中文居住传播语境里，确实不适合直接保留。</p>\n<p>这类词在概念片里也要提前处理，不然会破气。</p>\n<h2>三、可保留部分</h2>\n<p>这份稿子里有很多东西不是“可参考”，而是必须保护住。</p>\n<h2>1. 创作总纲必须保留</h2>\n<p>“建筑生命觉醒史”“观众不会被推销，而会被唤醒”这两句，就是这版的根。</p>\n<p>这个高度不能降。</p>\n<h2>2. 五境对应系统必须保留</h2>\n<p>这不是包装，这是结构。</p>\n<h2>一旦打散，整片就会掉成普通高端概念片。</h2>\n<h2>3. “真实自然 + 微缩模型”的方法必须保留</h2>\n<p>这是这版最独特的视觉方法。</p>\n<p>不是可有可无，而是它的形式识别度所在。脚本明确把它定义为“真实自然与微缩模型的时空折叠”，并在雪山、森林、瀑布、神山等段落给出模型交互设计。</p>\n<h2>4. 声音策略必须保留</h2>\n<p>尤其怒江关窗和冈仁波齐三秒无声，这不是装饰，是全片结构支点。</p>\n<h2>5. 尾章回到城市工作室的闭环必须保留</h2>\n<p>这是全片从“思想远游”回到“设计落地”的关键。</p>\n<p>没有这个闭环，它就会只是一场漂亮旅行。</p>\n<h2>四、必须修改或重点警惕的部分</h2>\n<h2>1. 必须先把“概念高度”和“项目归属”绑定得更牢</h2>\n<p>这版现在最容易被夸的地方，是格调高。</p>\n<p>但它也最容易被问：</p>\n<p>这和时代首府到底是什么关系？</p>\n<p>现在稿子里已经在做对应，但后续继续打磨时必须时刻检查：</p>\n<p>雪山这一境是否真的落到“地基与稳固”</p>\n<p>森林是否真的落到“空中庭院与垂直生态”</p>\n<p>瀑布是否真的落到“降噪门窗与选择权”</p>\n<p>朝圣路是否真的落到“归家动线”</p>\n<p>神山是否真的落到“心域”</p>\n<p>也就是说，这版不能只当艺术短片，它必须始终有项目归属。</p>\n<h2>2. 必须把“演员”处理成容器，而不是表演者</h2>\n<p>因为你要用演员。</p>\n<p>这是这版极关键也极危险的部分。</p>\n<p>如果演员演得太满，这片就毁。</p>\n<p>这个人物必须是：</p>\n<p>克制的</p>\n<p>真实感偏纪实的</p>\n<p>更像“在经历”，不是“在表演领悟”</p>\n<p>对模型的使用像脚本里说的那样，“不表演，只使用”</p>\n<h2>3. 必须重新审视第四境的文化尺度</h2>\n<p>朝圣意象很高级，但也最容易失衡。</p>\n<p>这里后续打磨时要特别看：</p>\n<p>是否借得太满</p>\n<p>是否会让人觉得把信仰转译得过重</p>\n<p>是否需要让“仪式感”更多落到“归家秩序、门厅过渡、识别灯、木香、步行节奏”等居住真实体验上</p>\n<h2>4. 必须统一语言中的禁忌词处理</h2>\n<p>除了你已经指出的“盒子 / 灵魂 / 苦行僧 / 修道院化”方向，概念稿里也要顺手筛一轮。</p>\n<p>因为概念片最容易沉迷语言，如果不提前清理，后续越写越危险。</p>\n<h2>五、推荐修改路径</h2>\n<p>我建议这份概念版不要急着改句子，先按下面顺序走。</p>\n<p>第一步：先定它是“概念主片”，不是功能介绍片</p>\n<p>这一步很重要。</p>\n<p>因为一旦把它拉回“卖点片”，就会废掉最珍贵的东西。</p>\n<p>第二步：先做“结构提纯”</p>\n<p>重点不是删文字，而是重新校正每一境的职责：</p>\n<h3>序章：提出“建筑应被唤醒”的问题</h3>\n<p>雪山：立住“生根”的底层意志</p>\n<p>森林：立住“共生”的生命逻辑</p>\n<p>瀑布：立住“选择”的感官权利</p>\n<p>朝圣路：立住“归家”的仪式维度</p>\n<p>神山：立住“建筑隐去、看见自己”的终极落点</p>\n<p>尾章：完成从自然启示到城市设计的闭环</p>\n<p>第三步：同步做执行校正</p>\n<p>这版不能只在文字上打磨。</p>\n<p>要同时判断：</p>\n<p>哪些必须实景拍</p>\n<p>哪些必须虚拟影棚完成</p>\n<p>哪些必须模型实拍而不是纯CG</p>\n<p>哪些地方演员只做动作不做情绪</p>\n<p>哪些地方声音比画面更重要</p>\n<p>第四步：最后再做旁白语言校正</p>\n<p>因为这版最怕过度修辞。</p>\n<p>先把结构和执行稳住，再修语言，效率最高。</p>", "text": "这不是一支“概念宣传片”那么简单，它已经接近一部高度风格化的品牌电影序章。\n它的上限非常高，确实是三支片里立意、调性、形式野心最大的一版；但它的风险也最大，因为它不是靠信息成立，而是靠 母题统一、五境对应、第一人称朝圣结构、声音设计、模型交互、实景与虚拟影棚的融合精度 来成立。脚本自己已经把它定义成“关于建筑生命觉醒史的思想短片”，并明确提出“观众不会被推销，而会被唤醒”，同时建立了雪山、森林、瀑布、318朝圣路、神山与项目五个核心价值的一一对应。\n所以，这稿子不能按常规地产广告逻辑去看。\n要看的核心是四件事：\n母题够不够稳，意象系统有没有内在闭环，诗性是否真的落到项目价值，执行方式能不能把文本野心拍出来。\n一、核心问题\n1. 母题非常强，而且是三版里最完整的一版\n这版真正的母题，不是“时代首府很好”，也不是“项目有五大卖点”，而是：\n建筑不只是被建造出来的物，它应该被唤醒，最终成为人的内在归属与精神坐标。\n这个母题在总纲和序章里其实已经定得很准：\n这不是常规地产宣传片，而是“建筑生命觉醒史”的思想短片。\n设计师启程去寻找“建筑的原初答案”。\n尾章落点是“最好的建筑，不是被看见，而是让人看见自己”。\n这说明它不是卖点拼盘，而是一条完整的精神路径：\n从建造问题出发，经过自然启示，回到“家”的精神意义。\n这是它最厉害的地方。\n也是它比政府版、业主版更高阶的地方。\n2. 结构高度统一，五境系统不是拼贴，而是完整的哲学链条\n这稿子最难得的，不是写得美，而是结构真的统一。\n五境对应关系不是随便找几个景观来比喻，而是有内在递进的：\n雪山：地基 / 生根 / 意志\n森林：庭院 / 呼吸 / 共生\n瀑布：门窗 / 噪音过滤 / 选择\n朝圣路：归家动线 / 仪式 / 方向\n神山：终极心域 / 建筑隐去 / 看见自己\n这不是横向并列，而是纵向推进。\n它其实走的是一条非常完整的精神曲线：\n站稳 → 呼吸 → 安静 → 抵达 → 看见自己\n这就是这版能成立的关键。\n也就是说，这稿子最大的优点不是句子，而是架构非常高级，而且闭环意识很强。片头的空白图纸与未完成模型，尾章回到同一张桌子、同一盏灯、同一扇窗，但“模型已完成、山石压图”，这个叙事闭环是成立的。\n3. 这版最大的优势，是“项目价值被翻译成了精神体验”\n政府版把价值翻译成标准与城市贡献。\n业主版把价值翻译成偏执与生活感。\n而概念版做的是第三层翻译：\n把产品价值翻译成可感知、可记忆、可沉浸的精神体验。\n比如最强的几个点：\n地基不是工程术语，而是“从大地深处生长出来的意志”。\n空中庭院不是绿化卖点，而是“建筑的肺”。\n降噪门窗不是参数，而是“你可以决定住在世界的哪个版本里”。\n归家动线不是交通组织，而是“回家的仪式”。\n家不是物理空间，而是“精神坐标”。\n这就解释了为什么你说它是你最看重的一版。\n因为它不只是讲项目，而是在争夺项目的精神解释权。\n4. 最大风险不是“太文艺”，而是“太完整”\n这版稿子已经完整到接近“片子在纸上已经成立了”。\n这既是优点，也是风险。\n风险在于：\n文本成立，不等于影像成立。\n尤其你已经明确执行方式是：\n实景拍摄 + 虚拟影棚 + 演员\n而这版真正的难点，恰恰都在执行层：\n微缩模型与真实自然的时空折叠，能不能拍得不假\n设计师第一人称，能不能演得不端着\n自然奇观与建筑卖点的对应，能不能不显得“硬贴”\n声音设计，能不能真的做到身体层面的切换\n全片诗性语言，能不能在成片里不发飘\n脚本自己其实已经知道这一点，所以才会把“声音决定本集50%成败”“怒江一幕是全片最重要单一动作”“冈仁波齐模型叠合三秒须完全无声”等执行要求写得这么重。\n也就是说，这稿子最大的问题不是立意，而是：\n它对执行精度要求极高，稍微拍虚一点，就会从上乘掉成做作。\n二、次要问题\n1. 第一人称设计师视角很对，但“人物身份”仍略抽象\n这版现在采用设计师第一人称朝圣之旅，这是非常聪明的选择。\n因为它避免了企业口吻，也避免了纯上帝视角。\n但现在的问题是：\n这个“我”更像一个思想载体，而不是一个真实的人。\n比如序章、五境、终章里的“我”，一直在看、在想、在领悟、在举模型。\n这当然符合概念片气质。\n但如果演员处理不好，就会很容易变成：\n太知道自己在“表演意义”\n太像广告里的“哲人男主”\n太像概念的代言人，而不是经历者\n所以这版后续最关键的一件事，是别把这个人物拍成“神秘设计师”，而要拍成一个在寻找答案的人。\n2. 第四境“朝圣路”是最危险也最容易失手的一章\n前面三境都比较牢：\n雪山有地基和意志，成立\n森林有共生和空中庭院，成立\n瀑布有噪音与选择，成立，而且很强\n但第四境“朝圣路 = 归家动线 = 仪式”，概念很好，却最容易拍虚。\n因为这里一旦处理不好，就会出现两个风险：\n第一，借用了朝圣意象，却没有真正转换成项目内部逻辑。\n第二，朝圣者是真实的信仰对象，而项目归家动线是居住体验对象，两者之间如果连接得不够精细，会显得过于“借神性抬项目”。\n脚本里其实已经意识到这个问题，所以用了“影子叠合”“识别灯亮起←→脚步落地”的匹配剪辑来处理。\n思路是对的，但这仍然是全片最需要谨慎把握分寸的一章。\n3. 终章非常强，但也最怕“过满”\n终章的文本是极强的。\n尤其这几句：\n“等待被寻找的从来不是答案”\n“最好的建筑，不是被看见，而是让人看见自己”\n“真正的奢华，是建筑隐去，生活回到心的故乡”\n这些句子本身都成立。\n但问题在于，终章前面已经经历了四境累积，如果这里再全力抬高，就很容易“满”。\n所以终章最怕的不是不够，而是太够。\n真正高级的处理，应该是画面大，情绪收，语言少一寸，留给观众多一寸。\n4. 文本里少数词句仍有文化语义风险\n你前面已经明确提醒了中文语境里的忌讳词，这个提醒非常重要。\n而这份概念稿里，第四境增补旁白里就有一句：\n“回家的路，不应该是死去的时间——”\n这个表达在创作逻辑上没问题，但在中文居住传播语境里，确实不适合直接保留。\n这类词在概念片里也要提前处理，不然会破气。\n三、可保留部分\n这份稿子里有很多东西不是“可参考”，而是必须保护住。\n1. 创作总纲必须保留\n“建筑生命觉醒史”“观众不会被推销，而会被唤醒”这两句，就是这版的根。\n这个高度不能降。\n2. 五境对应系统必须保留\n这不是包装，这是结构。\n一旦打散，整片就会掉成普通高端概念片。\n3. “真实自然 + 微缩模型”的方法必须保留\n这是这版最独特的视觉方法。\n不是可有可无，而是它的形式识别度所在。脚本明确把它定义为“真实自然与微缩模型的时空折叠”，并在雪山、森林、瀑布、神山等段落给出模型交互设计。\n4. 声音策略必须保留\n尤其怒江关窗和冈仁波齐三秒无声，这不是装饰，是全片结构支点。\n5. 尾章回到城市工作室的闭环必须保留\n这是全片从“思想远游”回到“设计落地”的关键。\n没有这个闭环，它就会只是一场漂亮旅行。\n四、必须修改或重点警惕的部分\n1. 必须先把“概念高度”和“项目归属”绑定得更牢\n这版现在最容易被夸的地方，是格调高。\n但它也最容易被问：\n这和时代首府到底是什么关系？\n现在稿子里已经在做对应，但后续继续打磨时必须时刻检查：\n雪山这一境是否真的落到“地基与稳固”\n森林是否真的落到“空中庭院与垂直生态”\n瀑布是否真的落到“降噪门窗与选择权”\n朝圣路是否真的落到“归家动线”\n神山是否真的落到“心域”\n也就是说，这版不能只当艺术短片，它必须始终有项目归属。\n2. 必须把“演员”处理成容器，而不是表演者\n因为你要用演员。\n这是这版极关键也极危险的部分。\n如果演员演得太满，这片就毁。\n这个人物必须是：\n克制的\n真实感偏纪实的\n更像“在经历”，不是“在表演领悟”\n对模型的使用像脚本里说的那样，“不表演，只使用”\n3. 必须重新审视第四境的文化尺度\n朝圣意象很高级，但也最容易失衡。\n这里后续打磨时要特别看：\n是否借得太满\n是否会让人觉得把信仰转译得过重\n是否需要让“仪式感”更多落到“归家秩序、门厅过渡、识别灯、木香、步行节奏”等居住真实体验上\n4. 必须统一语言中的禁忌词处理\n除了你已经指出的“盒子 / 灵魂 / 苦行僧 / 修道院化”方向，概念稿里也要顺手筛一轮。\n因为概念片最容易沉迷语言，如果不提前清理，后续越写越危险。\n五、推荐修改路径\n我建议这份概念版不要急着改句子，先按下面顺序走。\n第一步：先定它是“概念主片”，不是功能介绍片\n这一步很重要。\n因为一旦把它拉回“卖点片”，就会废掉最珍贵的东西。\n第二步：先做“结构提纯”\n重点不是删文字，而是重新校正每一境的职责：\n序章：提出“建筑应被唤醒”的问题\n雪山：立住“生根”的底层意志\n森林：立住“共生”的生命逻辑\n瀑布：立住“选择”的感官权利\n朝圣路：立住“归家”的仪式维度\n神山：立住“建筑隐去、看见自己”的终极落点\n尾章：完成从自然启示到城市设计的闭环\n第三步：同步做执行校正\n这版不能只在文字上打磨。\n要同时判断：\n哪些必须实景拍\n哪些必须虚拟影棚完成\n哪些必须模型实拍而不是纯CG\n哪些地方演员只做动作不做情绪\n哪些地方声音比画面更重要\n第四步：最后再做旁白语言校正\n因为这版最怕过度修辞。\n先把结构和执行稳住，再修语言，效率最高。"}, {"filename": "时代首府_第一集_完整执行脚本_终稿.docx", "id": "concept-7", "section": "concept", "group": "概念版", "title": "第一集完整执行脚本·终稿", "subtitle": "概念版终稿", "desc": "包含原版解说词、增补旁白、分镜机位表、色彩声音备注与模型互动指示的完整执行脚本。", "audience": ["剧组", "导演组", "摄影", "后期"], "tags": ["概念版", "完整执行脚本", "终稿"], "content": "<p>浩宇·时代首府  /  系列影片  第一集</p>\n<p>生 长 的 序 章</p>\n<p>从 自 然 到 心 域</p>\n<p>导演完整执行脚本  ·  终稿</p>\n<p>含原版解说词 · 增补旁白 · 分镜机位表 · 色彩声音备注 · 模型互动指示 · 社交裂变版</p>\n<h2>2026  ·  机密  ·  导演终稿</h2>\n<p>创作总纲</p>\n<p>核心命题</p>\n<p>这不是一支常规地产宣传片，而是一部关于「建筑生命觉醒史」的思想短片。以建筑师第一人称朝圣之旅为载体，将时代首府五大核心价值与自然界五种极致意象精准对位。观众不会被推销，而会被唤醒。</p>\n<h2>五境对应关系</h2>\n<div class=\"table-wrap\"><table><tbody><tr><td>雪山（子梅垭口）</td><td>= 建筑地基  ·  向大地交出诚意的稳固意志</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>森林（波密）</td><td>= 空中庭院  ·  会呼吸的垂直生态与共生网络</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>瀑布（怒江）</td><td>= 降噪门窗  ·  拥有过滤世界喧嚣、选择声音的权利</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>318朝圣路</td><td>= 归家动线  ·  从漂泊到归属的精神仪式</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>神山（冈仁波齐）</td><td>= 终极心域  ·  家不是物理空间，而是精神坐标</td></tr></tbody></table></div>\n<h2>三大执行策略</h2>\n<p>策略一  叙事：「卖点堆砌」→「哲学公路片」。放弃所有常规地产说辞，采用设计师第一人称视角，将产品卖点与自然意象一一对应。</p>\n<p>策略二  视觉：极致「宏观与微观交互」。核心视觉奇观是「真实自然与微缩模型的时空折叠」——在宏大的瀑布前，设计师关上一扇小窗，整个世界的画面与声音瞬间改变。</p>\n<p>策略三  听觉：声音决定本集50%成败。专项录音师采集ASMR自然声。怒江一幕须在录音棚处理出极致降噪对比感——从雷霆万钧轰鸣，瞬间切换至极度寂静的鸟鸣，以声音直击人心。</p>\n<p class=\"label\"><strong>旁白总原则  ·  「哲思大白话」</strong></p>\n<p>每句话须通过「讲给普通人听，他能懂」的测试，同时须有「普通人第一次听到会停顿一下」的密度。每句15-22字。禁止形容词堆砌。用具体感官细节带出哲学结论。</p>\n<p>色彩演进：城市灰蓝 → 冰川纯白 → 雨林翠绿 → 银白水雾 → 琥珀土金 → 神圣金光</p>\n<p>— 序  章 —</p>\n<p>出  发</p>\n<div class=\"table-notes\"><div class=\"table-note\">内景  城市深夜 · 设计工作室  ·  冷场开场\n建立第一人称视角 · 锚定「那个问题」</div></div>\n<p>画面描述</p>\n<div class=\"table-wrap\"><table><tbody><tr><td>画面 A</td><td>极致特写。制图桌，台灯是画面唯一光源。散落的蓝图，一摞参考书，一个未完成的建筑模型（尾章将被完成，构成叙事闭环）。设计师合上厚重的建筑史，收起空白图纸。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>画面 B</td><td>镜头向左漂移，透过落地玻璃，城市在沉闷的靛蓝与灰色中跳动。特写：一张空白图纸被卷起。起身，背包，离开。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>转  场</td><td>航拍。越野车翻越折多山垭口，驶离喧嚣的城市。身后，城市网格逐渐收缩。画框打开。世界，开始了。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>色彩指示</td><td>城市：去饱和，钨丝靛蓝，压迫感。折多山：蓝调渐渐被高原冷白取代，饱和度开始「呼吸」。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>声音指示</td><td>城市低频嗡鸣如耳鸣底噪。完全寂静。大提琴单音极轻入场——无旋律，只有存在感。</td></tr></tbody></table></div>\n<p class=\"label\"><strong>旁白  ·  画外音（深沉、内省）</strong></p>\n<div class=\"table-notes\"><div class=\"table-note\">城市深夜的灯光闪烁，我的案头摊开一卷空白图纸。\n有人说，未来的住宅是技术的成果，是功能的更新……\n但我始终相信：居所，是人类精神的延伸。\n它不应被建造，而应被「唤醒」。\n于是我启程，去寻找建筑的原初答案。</div></div>\n<h3>序章  ·  分镜机位执行表</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>镜号</th><th>景别/运动</th><th>焦段</th><th>机位角度</th><th>画面内容</th><th>时长</th><th>对应旁白</th><th>调色</th><th>声音</th></tr></thead><tbody><tr><td>S-01</td><td>ECU 极特写</td><td>85mm 定焦</td><td>桌面俯角</td><td>制图桌全景→合书动作，台灯光圈控制左三分</td><td>8&quot;</td><td>「应被唤醒」</td><td>钨丝蓝·低饱和</td><td>城市底噪·耳鸣感</td></tr><tr><td>S-02</td><td>CU 特写</td><td>50mm 定焦</td><td>平视·书桌</td><td>空白图纸卷起·背包离开，未完成模型留桌面</td><td>6&quot;</td><td>「去寻找答案」</td><td>同S-01</td><td>纸张摩擦声</td></tr><tr><td>S-03</td><td>航拍推进</td><td>无人机16mm</td><td>正俯→斜俯</td><td>折多山垭口·越野车翻越·城市消失视野</td><td>12&quot;</td><td>（无旁白）</td><td>蓝调→冷白渐变</td><td>大提琴单音入</td></tr><tr><td>S-04</td><td>航拍后拉</td><td>无人机16mm</td><td>斜俯·升高</td><td>城市网格收缩·高原无边展开</td><td>8&quot;</td><td>（无旁白）</td><td>冷白·高光略曝</td><td>音乐逐渐清晰</td></tr></tbody></table></div>\n<p>— 第一境  ·  意志的诞生 —</p>\n<p>雪  山</p>\n<div class=\"table-notes\"><div class=\"table-note\">外景  子梅垭口 · 贡嘎雪山  ·  破晓·狂风\n建筑哲理：地基是从大地深处生长出来的意志</div></div>\n<p>画面描述</p>\n<div class=\"table-wrap\"><table><tbody><tr><td>仰拍实景</td><td>贡嘎雪山狂风大作，冰川裂缝透出深蓝光泽。建筑师独行于子梅垭口山脊，风横扫画面，蛮横，有毁灭感。7556米山体撑满天际，山脚岩层向下延伸，两亿年的压缩，静立不动。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>影棚交互⭐</td><td>【道具：地基剖面模型 1:50，岩层纹路模拟】设计师在黑暗中手抚建筑地基模型，镜头在「手压冰岩」与「手触模型基座」之间交叉剪辑，岩层纹路与模型剖面叠化（透明度约12%）。山即工程，工程即山。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>声音指示</td><td>风声全频·生理层面制造压迫。风声之下：岩石受压次声波，几乎察觉不到，但身体能感受到。旁白结束后风声渐被弦乐接管，不可硬切。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>色彩指示</td><td>高调纯白，冰川局部过曝，零暖调。阴影区蓝紫色，有深邃感。如同「光从山里面透出来」。</td></tr></tbody></table></div>\n<p class=\"label\"><strong>旁白  ·  画外音（深沉、内省）</strong></p>\n<div class=\"table-notes\"><div class=\"table-note\">在子梅垭口，风几乎要把世界撕裂。\n贡嘎雪山立在风暴之后，那是地球亿万年的心跳。\n我将手按在冰冷的岩层上，感到一种沉默的力量。\n建筑的第一课，不是站立，而是生根。\n地基，是从大地深处生长出来的意志。</div></div>\n<p>建筑的第一课，不是站立——是生根。</p>\n<h3>第一境  ·  分镜机位执行表</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>镜号</th><th>景别/运动</th><th>焦段</th><th>机位角度</th><th>画面内容</th><th>时长</th><th>对应旁白</th><th>调色</th><th>声音</th></tr></thead><tbody><tr><td>M-01</td><td>WS 大远景</td><td>400mm 长焦</td><td>山脊侧面·人物渺小</td><td>子梅垭口全景·建筑师独行·贡嘎撑满天际</td><td>12&quot;</td><td>「亿万年的心跳」</td><td>冷白过曝·蓝紫阴影</td><td>风声全频推顶</td></tr><tr><td>M-02</td><td>MS 中景</td><td>85mm 定焦</td><td>正面·逆风站立</td><td>建筑师逆风而立，衣物猎猎作响</td><td>6&quot;</td><td>「沉默的力量」</td><td>同M-01</td><td>风声强推</td></tr><tr><td>M-03</td><td>ECU 极特写</td><td>微距100mm</td><td>水平·手部平视</td><td>手压冰岩·岩层纹路·皮革手套接触点细节</td><td>6&quot;</td><td>「感到一种力量」</td><td>蓝白冷调·高对比</td><td>次声波突出·风声减</td></tr><tr><td>M-04</td><td>叠化·模型</td><td>85mm+后期</td><td>与M-03同视角</td><td>岩层→地基模型交叉叠化（12%透明）</td><td>10&quot;</td><td>「生长出来的意志」</td><td>幽灵叠加·透明</td><td>静场·弦乐轻入</td></tr><tr><td>M-05</td><td>仰拍慢摇</td><td>广角24mm</td><td>仰角45°</td><td>仰拍山顶·金光破云·冰川边缘</td><td>6&quot;</td><td>（无旁白）</td><td>金色顶光·圣光感</td><td>弦乐渐强</td></tr></tbody></table></div>\n<p>— 第二境  ·  共生的算法 —</p>\n<p>森  林</p>\n<div class=\"table-notes\"><div class=\"table-note\">外景  波密原始森林  ·  清晨·迷路中\n建筑哲理：建筑必须参与生命，成为呼吸的一部分</div></div>\n<p>画面描述</p>\n<div class=\"table-wrap\"><table><tbody><tr><td>微距实景</td><td>阳光穿透树冠，藤蔓交错成空中的网。微距：一滴雨珠悬在苔藓叶片上，折射出头顶树冠。拉开——活的大教堂。气根、附生兰花、层叠蕨类构成垂直城市。建筑师迷路入镜，渺小如尘。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>动效交互⭐</td><td>【道具：空中庭院立面模型 1:50，绿植可附着】设计师在森林中托起「垂直森林」立面模型，绿意在模型上如延时摄影般蔓延生长。延时叠化：枝叶模型→建筑立面空中庭院，同一逻辑，不同材料。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>声音指示</td><td>纯粹森林原声：多层次鸟鸣、远处流水、古树吱呀。全程无背景音乐——森林本身是乐谱。随模型互动，轻盈弦乐极轻浮入。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>色彩指示</td><td>深绿为主，阴影中保留细节，湿度可见（轻微雾气处理）。避免广告荧光绿，要有深邃的生命质感。</td></tr></tbody></table></div>\n<p class=\"label\"><strong>旁白  ·  画外音（深沉、内省）</strong></p>\n<div class=\"table-notes\"><div class=\"table-note\">在波密的深林，我迷失方向，却第一次看见生命的秩序。\n森林告诉我：建筑不应孤立存在，\n它必须参与生命，成为呼吸的一部分。\n每一片绿意都是器官，每一个家都是社区的肺叶。</div></div>\n<p>增补旁白  ·  深化「共生」感悟</p>\n<div class=\"table-notes\"><div class=\"table-note\">根系在地下交织，树冠相互咬合，藤蔓在五十米外的物种间传递水分。\n这不是一片树的集合——这是地球上最精密的城市，\n没有建筑师，没有审批，没有总规划，但每一处都恰到好处。\n空中庭院，不该是阳台上的一盆植物。\n它应该是建筑的肺——是这栋楼活着的证明。</div></div>\n<p>森林告诉我：建筑必须参与生命，成为呼吸的一部分。</p>\n<h3>第二境  ·  分镜机位执行表</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>镜号</th><th>景别/运动</th><th>焦段</th><th>机位角度</th><th>画面内容</th><th>时长</th><th>对应旁白</th><th>调色</th><th>声音</th></tr></thead><tbody><tr><td>F-01</td><td>微距ECU</td><td>微距100mm</td><td>水平·叶面视角</td><td>苔藓雨珠·折射树冠</td><td>5&quot;</td><td>（无旁白·氛围）</td><td>深绿·湿润感</td><td>雨水滴落声</td></tr><tr><td>F-02</td><td>WS 大远景</td><td>广角24mm</td><td>仰角·建筑师入镜</td><td>建筑师迷路仰望树冠，人物渺小</td><td>10&quot;</td><td>「第一次看见秩序」</td><td>蓝绿深邃·光影</td><td>鸟鸣·古树声</td></tr><tr><td>F-03</td><td>CU 特写</td><td>50mm 定焦</td><td>平视·细节</td><td>树根交织·藤蔓网络·气根细节</td><td>10&quot;</td><td>「参与生命」</td><td>暗绿·高对比</td><td>森林低频</td></tr><tr><td>F-04</td><td>模型互动</td><td>85mm 定焦</td><td>平视·手持模型</td><td>设计师托起垂直森林立面模型·绿意蔓延</td><td>14&quot;</td><td>「社区的肺叶」</td><td>绿意暖光出现</td><td>轻弦乐渐入</td></tr><tr><td>F-05</td><td>延时叠化</td><td>广角16mm+后期</td><td>仰角·树冠视角</td><td>树冠→建筑立面绿化延时叠化</td><td>10&quot;</td><td>「活着的证明」</td><td>绿白对比·延时感</td><td>弦乐清晰</td></tr></tbody></table></div>\n<p>— 第三境  ·  静的边界 —</p>\n<p>瀑  布</p>\n<div class=\"table-notes\"><div class=\"table-note\">外景  怒江大峡谷 · 瀑布  ·  正午·最大冲击力\n建筑哲理：真正的静，不是无声，而是选择听见什么</div></div>\n<p>画面描述</p>\n<div class=\"table-wrap\"><table><tbody><tr><td>中景实景</td><td>怒江瀑布雷霆万钧，水雾扑面，声音震耳欲聋。建筑师立于水流中央巨石，水雾将他笼罩，他无法思考。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>特写交互⭐⭐⭐</td><td>【全片最重要单一动作 / 道具：窗户单元模型 1:20，功能性插销】设计师缓缓合上一个精密的微缩窗户模型。瞬间，瀑布轰鸣切断，转为绝对的寂静。一帧切至全黑。我们听见他的呼吸，三百米外的一只鸟。世界没有改变，只有进入它的方式，改变了。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>后期声音⚠️</td><td>混音师最高难度工作序列：①轰鸣推到生理临界（约93dB体感）；②关窗帧砖墙限制器硬切至-40dB；③静场3秒仅留极轻底噪；④第3秒出现一声鸟鸣；⑤轻弦乐极轻入。观众须在身体层面感受这个切换，而非仅仅感觉「安静了一些」。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>色彩指示</td><td>瀑布全程银白混沌，零暖调，近黑白。关窗后画面微微回暖（+200色温），象征「选择」带来的温度。</td></tr></tbody></table></div>\n<p class=\"label\"><strong>旁白  ·  画外音（深沉、内省）</strong></p>\n<div class=\"table-notes\"><div class=\"table-note\">怒江瀑布在巨石间轰鸣。\n我合上模型的一扇小窗，世界的噪声被轻轻过滤。\n那一刻我明白：真正的静，不是无声，而是选择听见什么。\n家，是人与世界之间的调节阀。\n在世界的奔腾中，为自己留一处静水深流。</div></div>\n<p>增补旁白  ·  强化「选择权」的主题</p>\n<div class=\"table-notes\"><div class=\"table-note\">我听见了自己的心跳。一只鸟。水下石头移动的声音。\n世界没有改变，只是我与世界的关系，变了。\n真正好的门窗，不是把世界关在外面，\n而是让你决定，你要住在世界的哪个版本里。</div></div>\n<p>真正的静，不是无声——而是选择听见什么。</p>\n<h3>第三境  ·  分镜机位执行表</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>镜号</th><th>景别/运动</th><th>焦段</th><th>机位角度</th><th>画面内容</th><th>时长</th><th>对应旁白</th><th>调色</th><th>声音</th></tr></thead><tbody><tr><td>W-01</td><td>WS 大远景</td><td>广角16mm</td><td>正面·峡谷仰视</td><td>怒江峡谷全景·瀑布喷涌</td><td>8&quot;</td><td>（无旁白·轰炸）</td><td>银白混沌·零暖调</td><td>轰鸣全频推顶</td></tr><tr><td>W-02</td><td>MS 中景</td><td>50mm 定焦</td><td>正面·巨石立身</td><td>水雾笼罩·建筑师无法思考</td><td>6&quot;</td><td>「巨石间轰鸣」</td><td>同W-01</td><td>同上</td></tr><tr><td>W-03</td><td>CU 特写</td><td>85mm 定焦</td><td>平视·手持模型</td><td>微型窗户模型·对准瀑布举起</td><td>5&quot;</td><td>「合上小窗」</td><td>瀑布虚化背景</td><td>轰鸣保持</td></tr><tr><td>W-04</td><td>⭐核心</td><td>85mm 高速</td><td>ECU·关窗手部</td><td>关窗动作·一帧切黑→静场3秒→鸟鸣</td><td>14&quot;</td><td>「选择听见什么」</td><td>黑帧→微回暖</td><td>硬切-40dB·鸟鸣</td></tr><tr><td>W-05</td><td>CU 匹配</td><td>85mm微距</td><td>平视·窗系统正面</td><td>建筑实际窗系统关合特写</td><td>6&quot;</td><td>「静水深流」</td><td>暖调·清晰质感</td><td>鸟鸣→轻弦乐</td></tr></tbody></table></div>\n<p>— 第四境  ·  精神的方向 —</p>\n<p>朝  圣  路</p>\n<div class=\"table-notes\"><div class=\"table-note\">外景/内景  318国道 · 朝圣者 · 途中客栈  ·  黄昏至夜晚\n建筑哲理：归家与朝圣，本是一条道路的两端</div></div>\n<p>画面描述</p>\n<div class=\"table-wrap\"><table><tbody><tr><td>主观/特写</td><td>318国道上朝圣者沾满尘土的额头。一步一叩，将身体化为向信仰的度量衡。夕阳下，设计师的影子与朝圣者的影子交叠前行。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>客栈夜景</td><td>途中客栈，火堆，酥油茶在陌生人之间传递。朝圣者老茧累累的双手握住茶碗。火光映照每张面孔。设计师坐在对面，沉默，半神游。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>关联互文⭐</td><td>【匹配剪辑】建筑大堂入口识别灯亮起←→朝圣者双脚踏上新地。相同的「抵达感」，不同的形式。两个动作须在节奏上完全对齐。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>声音指示</td><td>火焰噼啪声。远处风声。朝圣者低声祈祷，轻到辨不清内容——私密感，不侵扰。旁白结束前弦乐极轻浮入，迎接第五境高潮。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>色彩指示</td><td>琥珀暖调，夕阳拉长影子，轻微胶片颗粒感。客栈夜景：火光橙暖，画面收紧，亲密感优先于清晰度。</td></tr></tbody></table></div>\n<p class=\"label\"><strong>旁白  ·  画外音（深沉、内省）</strong></p>\n<div class=\"table-notes\"><div class=\"table-note\">朝圣者一步一叩，将身体化为向信仰的度量衡。\n我与他们同行，影子在夕阳下交叠。\n那一刻我知道：归家与朝圣，本是一条道路的两端。\n归家，是日常的仪式，是心的方向被重新点亮。</div></div>\n<p>增补旁白  ·  深化「仪式感」</p>\n<div class=\"table-notes\"><div class=\"table-note\">回家的路，不应该是死去的时间——\n它应该是门槛，是让你重新成为那个，你家所期待的那个人的空间。\n每一条入户小径，每一次识别灯亮起，电梯厅里那熟悉的木香——\n这些不是建筑，是仪式。</div></div>\n<p>归家与朝圣，本是一条道路的两端。</p>\n<h3>第四境  ·  分镜机位执行表</h3>\n<div class=\"table-wrap\"><table><thead><tr><th>镜号</th><th>景别/运动</th><th>焦段</th><th>机位角度</th><th>画面内容</th><th>时长</th><th>对应旁白</th><th>调色</th><th>声音</th></tr></thead><tbody><tr><td>P-01</td><td>LS 长焦远景</td><td>400mm 压缩</td><td>侧面·路面平视</td><td>318公路消失点·朝圣者节律磕头</td><td>10&quot;</td><td>「度量衡」</td><td>琥珀暖调·扬尘</td><td>风声·脚步·磕头声</td></tr><tr><td>P-02</td><td>CU 特写</td><td>85mm 定焦</td><td>低角度·地面仰视</td><td>额头伏地·沾满尘土·老茧细节</td><td>6&quot;</td><td>「将身体化为」</td><td>暖橙·高对比</td><td>土地接触低沉声</td></tr><tr><td>P-03</td><td>MS 中景→推</td><td>50mm 定焦</td><td>侧面·夕阳逆光</td><td>两道影子叠合·逆光剪影</td><td>10&quot;</td><td>「影子在夕阳下」</td><td>黄金逆光·剪影</td><td>配乐轻入</td></tr><tr><td>P-04</td><td>CU 手持</td><td>35mm 定焦</td><td>平视·火光</td><td>茶碗·老茧手·火光映脸</td><td>12&quot;</td><td>「心的方向」</td><td>火光橙暖·暗部深</td><td>火声·祈祷·弦乐</td></tr><tr><td>P-05</td><td>匹配剪辑</td><td>85mm 定焦</td><td>低角→平视</td><td>大堂识别灯←→朝圣者落脚·节奏对齐</td><td>8&quot;</td><td>（互文·无旁白）</td><td>冷暖衔接</td><td>过渡音效</td></tr></tbody></table></div>\n<p>— 终  章  ·  心域的坐标 —</p>\n<p>神  山  ·  冈仁波齐</p>\n<div class=\"table-notes\"><div class=\"table-note\">外景  冈仁波齐峰下  ·  黄金时刻·全片情感高潮\n建筑哲理：最好的建筑，不是被看见，而是让人看见自己</div></div>\n<p>画面描述</p>\n<div class=\"table-wrap\"><table><tbody><tr><td>仰拍山顶</td><td>从大地开始：尘土，经幡在风中飘动。仰拍慢推，缓缓向上。冈仁波齐雪肩，山顶6638米，暮色中的金光。云与石。定格。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>设计师伫立</td><td>设计师站在山下，没有尝试攀登，没有掏出笔记本，只是站着，仰望。他的手，无意识地缓缓移向胸口。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>移轴摄影⭐⭐⭐</td><td>【全片最重要视觉 / 道具：时代首府完整建筑体模型 1:100】移轴摄影。时代首府的建筑实体模型，缓缓与远处的冈仁波齐金色山顶重合，由虚转实。三秒钟，两者是同一个形状、同一种高度、同一件事物。然后——他缓缓放下模型。山，依然在那里。这三秒须完全无声。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>最终画面</td><td>慢速焦点转移：从设计师面孔拉向远处转经人群——在无限宏大中，生命是移动的光点。生命在延续，仪式在延续。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>声音指示</td><td>模型叠合3秒：完全无声（零底噪），用无声制造高潮。随建筑师放下模型→室内乐全编制入场（弦乐+圆号）。克制，不冲浪。音符之间的空白，与音符本身同等重要。</td></tr></tbody></table></div>\n<p class=\"label\"><strong>旁白  ·  画外音（深沉、内省）</strong></p>\n<div class=\"table-notes\"><div class=\"table-note\">我把建筑模型举向金色山顶。\n我翻越群山，最终发现，等待被寻找的从来不是答案——\n而是人类对安宁、共生、归属的永恒渴望。\n最好的建筑，不是被看见，而是让人看见自己。\n真正的奢华，是建筑隐去，生活回到心的故乡。</div></div>\n<p>增补旁白  ·  尾章三段结构（闭合叙事环）</p>\n<div class=\"table-notes\"><div class=\"table-note\">——  锚点段\n翻越了那么多山，我没有带回一块岩石，也没有带回一套理论。\n我带回的，是一个问题的答案——\n那个问题，是我在城市里问了很多年，却一直没有勇气停下来听的那个：\n我真正需要的家，长什么样？</div></div>\n<div class=\"table-notes\"><div class=\"table-note\">——  五境回响\n雪山教我的，是扎根——不是占据土地，而是与土地共呼吸。\n森林教我的，是共生——不是拥有绿意，而是让绿意成为生活本身的肺。\n瀑布教我的，是选择——真正的安静，不是隔绝世界，而是只让值得的声音进来。\n那条路教我的，是仪式——每一次推开家门，都是一次对自己的重新确认。</div></div>\n<div class=\"table-notes\"><div class=\"table-note\">——  收束段（衔接落版「心域自成」）\n而神山教我的，是最后一件事，也是最难的一件事：\n真正好的建筑，不该被记住。\n它只是悄悄退后一步——\n让住在里面的你，越来越清晰地，看见自己。</div></div>\n<p>最好的建筑，不是被看见——而是让人看见自己。</p>\n<p>真正的奢华，是建筑隐去，生活回到心的故乡。</p>\n<p>终章  ·  分镜机位执行表</p>\n<div class=\"table-wrap\"><table><thead><tr><th>镜号</th><th>景别/运动</th><th>焦段</th><th>机位角度</th><th>画面内容</th><th>时长</th><th>对应旁白</th><th>调色</th><th>声音</th></tr></thead><tbody><tr><td>K-01</td><td>仰拍慢推</td><td>广角16mm→50mm</td><td>正仰角·底部起推</td><td>经幡→雪肩→山顶金光，15秒慢推完成</td><td>15&quot;</td><td>「永恒的渴望」</td><td>金光·近过曝</td><td>弦乐极轻准备</td></tr><tr><td>K-02</td><td>MS 中景</td><td>85mm 定焦</td><td>正面·逆光</td><td>设计师伫立仰望，手缓移胸口</td><td>8&quot;</td><td>「翻越群山」</td><td>逆光·剪影</td><td>接近无声</td></tr><tr><td>K-03</td><td>⭐移轴核心</td><td>移轴镜头90mm</td><td>正面·平视</td><td>建筑模型↔冈仁波齐金顶叠合·3秒无声停留</td><td>14&quot;</td><td>「让人看见自己」</td><td>金光过曝·微缩感</td><td>完全无声3秒</td></tr><tr><td>K-04</td><td>MS 中景</td><td>85mm 定焦</td><td>侧面·跟随</td><td>设计师放下模型·仰望山依然在</td><td>8&quot;</td><td>「建筑隐去」</td><td>金调渐平</td><td>室内乐轻入</td></tr><tr><td>K-05</td><td>长焦慢推</td><td>400mm 压缩</td><td>正面·人群方向</td><td>远处转经人群，光点般移动</td><td>12&quot;</td><td>「心的故乡」</td><td>金色背光·光点感</td><td>弦乐渐强</td></tr></tbody></table></div>\n<p>— 落  版 —</p>\n<p>回 到 城 市  ·  叙 事 环 闭 合</p>\n<div class=\"table-notes\"><div class=\"table-note\">内景  城市夜晚 · 设计工作室  ·  与片头完全镜像呼应\n精神完成·落版</div></div>\n<p>画面描述</p>\n<div class=\"table-wrap\"><table><tbody><tr><td>镜像呼应</td><td>与片头构图完全一致：同一张桌，同一盏灯，同一扇落地窗。但此刻：一块山石静静压在蓝图上。片头未完成的模型，已经被完成的新设计图纸替代。这是无声叙事闭环——观众会感受到，无需旁白点破。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>细节指示</td><td>设计师的手——已被风沙晒出痕迹——在图纸上移动，每一笔都有重量。台灯光圈比片头稍大一点（约+15%），象征他带回的「温度」。</td></tr></tbody></table></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>落版字幕</td><td>黑场。金字淡入：「时代首府 · 心域自成」。持续3秒。配乐余韵收尾。</td></tr></tbody></table></div>\n<p>尾章  ·  分镜机位执行表</p>\n<div class=\"table-wrap\"><table><thead><tr><th>镜号</th><th>景别/运动</th><th>焦段</th><th>机位角度</th><th>画面内容</th><th>时长</th><th>对应旁白</th><th>调色</th><th>声音</th></tr></thead><tbody><tr><td>E-01</td><td>ECU 极特写</td><td>85mm 定焦</td><td>俯角·桌面视角</td><td>山石压蓝图·已完成模型·风沙手特写</td><td>10&quot;</td><td>（无旁白·呼应）</td><td>靛蓝+暖光扩+15%</td><td>城市底噪·不压迫</td></tr><tr><td>E-02</td><td>WS 镜像</td><td>50mm 定焦</td><td>与片头完全相同</td><td>片头构图·但一切都变了</td><td>12&quot;</td><td>（呼应·无旁白）</td><td>暖光圈对比片头</td><td>配乐平稳</td></tr><tr><td>E-03</td><td>CU 特写</td><td>85mm 定焦</td><td>平视·手部特写</td><td>风沙手在图纸上·每笔有重量</td><td>8&quot;</td><td>（无旁白）</td><td>温暖·质感</td><td>笔触纸面声</td></tr><tr><td>E-04</td><td>落版字幕</td><td>——</td><td>——</td><td>金字「时代首府·心域自成」·黑底3秒</td><td>14&quot;</td><td>（余韵）</td><td>金字·纯黑底</td><td>配乐收尾·余韵</td></tr></tbody></table></div>\n<p>社交媒体裂变版本</p>\n<p>主版素材拍摄完成后可剪辑以下独立传播单元，共享素材，零额外拍摄成本。</p>\n<div class=\"table-notes\"><div class=\"table-note\">版本一  ·  「静音篇」\n15&quot;  ·  怒江关窗那一刻  ·  适合抖音 / 微博</div></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>画面逻辑</td><td>怒江瀑布轰鸣（8秒）→ 关窗动作 → 一帧黑 → 绝对静场（4秒）→ 落版字：「选择，是最奢侈的安静」→ 品牌落版</td></tr></tbody></table></div>\n<div class=\"table-notes\"><div class=\"table-note\">没有一个豪宅广告敢这样做：8秒的噪音，然后，给你4秒的真正安静。#时代首府 #你的家值得这种安静</div></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>传播逻辑</td><td>反差感制造话题。观众会主动分享「这个广告的静音效果」，讨论即传播。</td></tr></tbody></table></div>\n<div class=\"table-notes\"><div class=\"table-note\">版本二  ·  「生长篇」\n30&quot;  ·  森林延时叠化  ·  适合微信视频号 / 小红书</div></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>画面逻辑</td><td>森林微距（5秒）→ 模型搭建（8秒）→ 延时叠化：森林→建筑立面绿化（10秒）→ 旁白金句 → 落版</td></tr></tbody></table></div>\n<div class=\"table-notes\"><div class=\"table-note\">森林从来不孤立存在。它在空中握手，在地下合作，用一万年长成今天的样子。有些建筑，也该这样生长。</div></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>传播逻辑</td><td>视觉美感强，适合被收藏和转发。延时叠化效果在小红书有自然传播动能。</td></tr></tbody></table></div>\n<div class=\"table-notes\"><div class=\"table-note\">版本三  ·  「仪式篇」\n15&quot;  ·  影子叠合+归家  ·  适合朋友圈广告精准投放</div></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>画面逻辑</td><td>朝圣者磕头（5秒）→ 影子叠合（5秒）→ 居民推开家门·识别灯亮起（3秒）→ 落版字：「每次回家，都是一次仪式」</td></tr></tbody></table></div>\n<div class=\"table-notes\"><div class=\"table-note\">有人用一步一跪丈量信仰。你每天的回家，也是一场朝圣。</div></div>\n<div class=\"table-wrap\"><table><tbody><tr><td>传播逻辑</td><td>情感共鸣型，下班回家时刻投放效果最佳。精准触达高端通勤人群。</td></tr></tbody></table></div>\n<p>导演执行注记  ·  六项核心原则</p>\n<h2>01 · 旁白演员选角与录音</h2>\n<p>拍摄前完成选角，外景拍摄期间现场播放临时旁白校准节奏。声音表演须介于散文电影独白与内心自白之间：绝不说教，绝不煽情。参考调性：贾樟柯纪录片旁白的克制感 + 泰伦斯·马力克《生命之树》的内省质地。男声，40岁上下，不急不缓。每一句话，像书法——每个字都是有意放置的。</p>\n<h2>02 · 镜头哲学</h2>\n<p>禁止为景观而景观的航拍，每个航拍须有叙事理由。主导镜头：长焦压缩——建筑师始终是庞大事物中的渺小见证者，而非主角。移轴镜头仅限冈仁波齐一幕（让现实微缩，而非让模型戏剧化）。手持跟拍仅限朝圣路（增加同行感）。全程拒绝「广告感」运镜。</p>\n<h2>03 · 调色迁移路线</h2>\n<p>调色是情绪迁移，不是滤镜。成都：去饱和·钨丝蓝·轻压迫。折多山：蓝调转冷白·开始呼吸。子梅垭口：冰川纯白·蓝紫阴影·高光过曝。波密：深绿·湿润·阴影有细节。怒江：银白混沌·零暖调·近黑白。318黄昏：琥珀·长影·胶片颗粒。冈仁波齐：金光·近过曝·走进光里。工作室尾章：靛蓝底+局部暖光扩大，构图同片头，情绪完全不同。</p>\n<h2>04 · 声音建筑</h2>\n<p>为每个拍摄地单独配备外景录音师（ASMR级设备，独立于现场录音师）。怒江场景须单独立项后期声音制作：砖墙限制器处理轰鸣段→关窗帧硬切-40dB→静场3秒仅留极轻底噪→鸟鸣→轻弦乐。配乐委托室内乐编制：弦乐组+双簧管/圆号，无打击乐，无电子元素。全片最重要的声音节点是冈仁波齐模型叠合时的3秒「绝对无声」——用无声制造情感高潮。</p>\n<h2>05 · 建筑模型道具规格（四件）</h2>\n<p>道具一·地基剖面模型（第一境）：1:50，岩层纹路模拟，材质反映真实地基用料。道具二·空中庭院立面模型（第二境）：1:50，绿植可附着，须使用真实苔藓素材。道具三·窗户单元模型（第三境）：1:20，功能性插销，可实际开合，合上时内部须有轻微隔音效果。道具四·时代首府完整建筑体模型（终章）：1:100，外观精准，移轴拍摄专用，须保证自然光下质感真实。所有模型：建筑师持用方式如外科医生对待器械——不表演，只使用。</p>\n<h2>06 · 旁白写作执行原则</h2>\n<p>通过测试：每句话须能「讲给普通人听，他能懂」。同时须有「第一次听到会停顿一下」的密度。每句15-22字为宜，句间留「呼吸」空间。禁止：形容词堆砌（「宁静致远」「天人合一」等）；禁止：直接出现产品功能名词；允许：用具体感官细节（手压岩石的重量感、关窗后的鸟鸣、影子叠合的瞬间）带出哲学结论。「去形容词测试」：删掉所有形容词，看核心意思是否依然成立。</p>\n<p>浩宇·时代首府  ·  系列影片第一集</p>\n<p>《生长的序章：从自然到心域》  ·  导演完整执行脚本  ·  2026</p>", "text": "浩宇·时代首府  /  系列影片  第一集\n生 长 的 序 章\n从 自 然 到 心 域\n导演完整执行脚本  ·  终稿\n含原版解说词 · 增补旁白 · 分镜机位表 · 色彩声音备注 · 模型互动指示 · 社交裂变版\n2026  ·  机密  ·  导演终稿\n创作总纲\n核心命题\n这不是一支常规地产宣传片，而是一部关于「建筑生命觉醒史」的思想短片。以建筑师第一人称朝圣之旅为载体，将时代首府五大核心价值与自然界五种极致意象精准对位。观众不会被推销，而会被唤醒。\n五境对应关系\n雪山（子梅垭口） | = 建筑地基  ·  向大地交出诚意的稳固意志\n森林（波密） | = 空中庭院  ·  会呼吸的垂直生态与共生网络\n瀑布（怒江） | = 降噪门窗  ·  拥有过滤世界喧嚣、选择声音的权利\n318朝圣路 | = 归家动线  ·  从漂泊到归属的精神仪式\n神山（冈仁波齐） | = 终极心域  ·  家不是物理空间，而是精神坐标\n三大执行策略\n策略一  叙事：「卖点堆砌」→「哲学公路片」。放弃所有常规地产说辞，采用设计师第一人称视角，将产品卖点与自然意象一一对应。\n策略二  视觉：极致「宏观与微观交互」。核心视觉奇观是「真实自然与微缩模型的时空折叠」——在宏大的瀑布前，设计师关上一扇小窗，整个世界的画面与声音瞬间改变。\n策略三  听觉：声音决定本集50%成败。专项录音师采集ASMR自然声。怒江一幕须在录音棚处理出极致降噪对比感——从雷霆万钧轰鸣，瞬间切换至极度寂静的鸟鸣，以声音直击人心。\n旁白总原则  ·  「哲思大白话」\n每句话须通过「讲给普通人听，他能懂」的测试，同时须有「普通人第一次听到会停顿一下」的密度。每句15-22字。禁止形容词堆砌。用具体感官细节带出哲学结论。\n色彩演进：城市灰蓝 → 冰川纯白 → 雨林翠绿 → 银白水雾 → 琥珀土金 → 神圣金光\n— 序  章 —\n出  发\n内景  城市深夜 · 设计工作室  ·  冷场开场\n建立第一人称视角 · 锚定「那个问题」\n画面描述\n画面 A | 极致特写。制图桌，台灯是画面唯一光源。散落的蓝图，一摞参考书，一个未完成的建筑模型（尾章将被完成，构成叙事闭环）。设计师合上厚重的建筑史，收起空白图纸。\n画面 B | 镜头向左漂移，透过落地玻璃，城市在沉闷的靛蓝与灰色中跳动。特写：一张空白图纸被卷起。起身，背包，离开。\n转  场 | 航拍。越野车翻越折多山垭口，驶离喧嚣的城市。身后，城市网格逐渐收缩。画框打开。世界，开始了。\n色彩指示 | 城市：去饱和，钨丝靛蓝，压迫感。折多山：蓝调渐渐被高原冷白取代，饱和度开始「呼吸」。\n声音指示 | 城市低频嗡鸣如耳鸣底噪。完全寂静。大提琴单音极轻入场——无旋律，只有存在感。\n旁白  ·  画外音（深沉、内省）\n城市深夜的灯光闪烁，我的案头摊开一卷空白图纸。\n有人说，未来的住宅是技术的成果，是功能的更新……\n但我始终相信：居所，是人类精神的延伸。\n它不应被建造，而应被「唤醒」。\n于是我启程，去寻找建筑的原初答案。\n序章  ·  分镜机位执行表\n镜号 | 景别/运动 | 焦段 | 机位角度 | 画面内容 | 时长 | 对应旁白 | 调色 | 声音\nS-01 | ECU 极特写 | 85mm 定焦 | 桌面俯角 | 制图桌全景→合书动作，台灯光圈控制左三分 | 8\" | 「应被唤醒」 | 钨丝蓝·低饱和 | 城市底噪·耳鸣感\nS-02 | CU 特写 | 50mm 定焦 | 平视·书桌 | 空白图纸卷起·背包离开，未完成模型留桌面 | 6\" | 「去寻找答案」 | 同S-01 | 纸张摩擦声\nS-03 | 航拍推进 | 无人机16mm | 正俯→斜俯 | 折多山垭口·越野车翻越·城市消失视野 | 12\" | （无旁白） | 蓝调→冷白渐变 | 大提琴单音入\nS-04 | 航拍后拉 | 无人机16mm | 斜俯·升高 | 城市网格收缩·高原无边展开 | 8\" | （无旁白） | 冷白·高光略曝 | 音乐逐渐清晰\n— 第一境  ·  意志的诞生 —\n雪  山\n外景  子梅垭口 · 贡嘎雪山  ·  破晓·狂风\n建筑哲理：地基是从大地深处生长出来的意志\n画面描述\n仰拍实景 | 贡嘎雪山狂风大作，冰川裂缝透出深蓝光泽。建筑师独行于子梅垭口山脊，风横扫画面，蛮横，有毁灭感。7556米山体撑满天际，山脚岩层向下延伸，两亿年的压缩，静立不动。\n影棚交互⭐ | 【道具：地基剖面模型 1:50，岩层纹路模拟】设计师在黑暗中手抚建筑地基模型，镜头在「手压冰岩」与「手触模型基座」之间交叉剪辑，岩层纹路与模型剖面叠化（透明度约12%）。山即工程，工程即山。\n声音指示 | 风声全频·生理层面制造压迫。风声之下：岩石受压次声波，几乎察觉不到，但身体能感受到。旁白结束后风声渐被弦乐接管，不可硬切。\n色彩指示 | 高调纯白，冰川局部过曝，零暖调。阴影区蓝紫色，有深邃感。如同「光从山里面透出来」。\n旁白  ·  画外音（深沉、内省）\n在子梅垭口，风几乎要把世界撕裂。\n贡嘎雪山立在风暴之后，那是地球亿万年的心跳。\n我将手按在冰冷的岩层上，感到一种沉默的力量。\n建筑的第一课，不是站立，而是生根。\n地基，是从大地深处生长出来的意志。\n建筑的第一课，不是站立——是生根。\n第一境  ·  分镜机位执行表\n镜号 | 景别/运动 | 焦段 | 机位角度 | 画面内容 | 时长 | 对应旁白 | 调色 | 声音\nM-01 | WS 大远景 | 400mm 长焦 | 山脊侧面·人物渺小 | 子梅垭口全景·建筑师独行·贡嘎撑满天际 | 12\" | 「亿万年的心跳」 | 冷白过曝·蓝紫阴影 | 风声全频推顶\nM-02 | MS 中景 | 85mm 定焦 | 正面·逆风站立 | 建筑师逆风而立，衣物猎猎作响 | 6\" | 「沉默的力量」 | 同M-01 | 风声强推\nM-03 | ECU 极特写 | 微距100mm | 水平·手部平视 | 手压冰岩·岩层纹路·皮革手套接触点细节 | 6\" | 「感到一种力量」 | 蓝白冷调·高对比 | 次声波突出·风声减\nM-04 | 叠化·模型 | 85mm+后期 | 与M-03同视角 | 岩层→地基模型交叉叠化（12%透明） | 10\" | 「生长出来的意志」 | 幽灵叠加·透明 | 静场·弦乐轻入\nM-05 | 仰拍慢摇 | 广角24mm | 仰角45° | 仰拍山顶·金光破云·冰川边缘 | 6\" | （无旁白） | 金色顶光·圣光感 | 弦乐渐强\n— 第二境  ·  共生的算法 —\n森  林\n外景  波密原始森林  ·  清晨·迷路中\n建筑哲理：建筑必须参与生命，成为呼吸的一部分\n画面描述\n微距实景 | 阳光穿透树冠，藤蔓交错成空中的网。微距：一滴雨珠悬在苔藓叶片上，折射出头顶树冠。拉开——活的大教堂。气根、附生兰花、层叠蕨类构成垂直城市。建筑师迷路入镜，渺小如尘。\n动效交互⭐ | 【道具：空中庭院立面模型 1:50，绿植可附着】设计师在森林中托起「垂直森林」立面模型，绿意在模型上如延时摄影般蔓延生长。延时叠化：枝叶模型→建筑立面空中庭院，同一逻辑，不同材料。\n声音指示 | 纯粹森林原声：多层次鸟鸣、远处流水、古树吱呀。全程无背景音乐——森林本身是乐谱。随模型互动，轻盈弦乐极轻浮入。\n色彩指示 | 深绿为主，阴影中保留细节，湿度可见（轻微雾气处理）。避免广告荧光绿，要有深邃的生命质感。\n旁白  ·  画外音（深沉、内省）\n在波密的深林，我迷失方向，却第一次看见生命的秩序。\n森林告诉我：建筑不应孤立存在，\n它必须参与生命，成为呼吸的一部分。\n每一片绿意都是器官，每一个家都是社区的肺叶。\n增补旁白  ·  深化「共生」感悟\n根系在地下交织，树冠相互咬合，藤蔓在五十米外的物种间传递水分。\n这不是一片树的集合——这是地球上最精密的城市，\n没有建筑师，没有审批，没有总规划，但每一处都恰到好处。\n空中庭院，不该是阳台上的一盆植物。\n它应该是建筑的肺——是这栋楼活着的证明。\n森林告诉我：建筑必须参与生命，成为呼吸的一部分。\n第二境  ·  分镜机位执行表\n镜号 | 景别/运动 | 焦段 | 机位角度 | 画面内容 | 时长 | 对应旁白 | 调色 | 声音\nF-01 | 微距ECU | 微距100mm | 水平·叶面视角 | 苔藓雨珠·折射树冠 | 5\" | （无旁白·氛围） | 深绿·湿润感 | 雨水滴落声\nF-02 | WS 大远景 | 广角24mm | 仰角·建筑师入镜 | 建筑师迷路仰望树冠，人物渺小 | 10\" | 「第一次看见秩序」 | 蓝绿深邃·光影 | 鸟鸣·古树声\nF-03 | CU 特写 | 50mm 定焦 | 平视·细节 | 树根交织·藤蔓网络·气根细节 | 10\" | 「参与生命」 | 暗绿·高对比 | 森林低频\nF-04 | 模型互动 | 85mm 定焦 | 平视·手持模型 | 设计师托起垂直森林立面模型·绿意蔓延 | 14\" | 「社区的肺叶」 | 绿意暖光出现 | 轻弦乐渐入\nF-05 | 延时叠化 | 广角16mm+后期 | 仰角·树冠视角 | 树冠→建筑立面绿化延时叠化 | 10\" | 「活着的证明」 | 绿白对比·延时感 | 弦乐清晰\n— 第三境  ·  静的边界 —\n瀑  布\n外景  怒江大峡谷 · 瀑布  ·  正午·最大冲击力\n建筑哲理：真正的静，不是无声，而是选择听见什么\n画面描述\n中景实景 | 怒江瀑布雷霆万钧，水雾扑面，声音震耳欲聋。建筑师立于水流中央巨石，水雾将他笼罩，他无法思考。\n特写交互⭐⭐⭐ | 【全片最重要单一动作 / 道具：窗户单元模型 1:20，功能性插销】设计师缓缓合上一个精密的微缩窗户模型。瞬间，瀑布轰鸣切断，转为绝对的寂静。一帧切至全黑。我们听见他的呼吸，三百米外的一只鸟。世界没有改变，只有进入它的方式，改变了。\n后期声音⚠️ | 混音师最高难度工作序列：①轰鸣推到生理临界（约93dB体感）；②关窗帧砖墙限制器硬切至-40dB；③静场3秒仅留极轻底噪；④第3秒出现一声鸟鸣；⑤轻弦乐极轻入。观众须在身体层面感受这个切换，而非仅仅感觉「安静了一些」。\n色彩指示 | 瀑布全程银白混沌，零暖调，近黑白。关窗后画面微微回暖（+200色温），象征「选择」带来的温度。\n旁白  ·  画外音（深沉、内省）\n怒江瀑布在巨石间轰鸣。\n我合上模型的一扇小窗，世界的噪声被轻轻过滤。\n那一刻我明白：真正的静，不是无声，而是选择听见什么。\n家，是人与世界之间的调节阀。\n在世界的奔腾中，为自己留一处静水深流。\n增补旁白  ·  强化「选择权」的主题\n我听见了自己的心跳。一只鸟。水下石头移动的声音。\n世界没有改变，只是我与世界的关系，变了。\n真正好的门窗，不是把世界关在外面，\n而是让你决定，你要住在世界的哪个版本里。\n真正的静，不是无声——而是选择听见什么。\n第三境  ·  分镜机位执行表\n镜号 | 景别/运动 | 焦段 | 机位角度 | 画面内容 | 时长 | 对应旁白 | 调色 | 声音\nW-01 | WS 大远景 | 广角16mm | 正面·峡谷仰视 | 怒江峡谷全景·瀑布喷涌 | 8\" | （无旁白·轰炸） | 银白混沌·零暖调 | 轰鸣全频推顶\nW-02 | MS 中景 | 50mm 定焦 | 正面·巨石立身 | 水雾笼罩·建筑师无法思考 | 6\" | 「巨石间轰鸣」 | 同W-01 | 同上\nW-03 | CU 特写 | 85mm 定焦 | 平视·手持模型 | 微型窗户模型·对准瀑布举起 | 5\" | 「合上小窗」 | 瀑布虚化背景 | 轰鸣保持\nW-04 | ⭐核心 | 85mm 高速 | ECU·关窗手部 | 关窗动作·一帧切黑→静场3秒→鸟鸣 | 14\" | 「选择听见什么」 | 黑帧→微回暖 | 硬切-40dB·鸟鸣\nW-05 | CU 匹配 | 85mm微距 | 平视·窗系统正面 | 建筑实际窗系统关合特写 | 6\" | 「静水深流」 | 暖调·清晰质感 | 鸟鸣→轻弦乐\n— 第四境  ·  精神的方向 —\n朝  圣  路\n外景/内景  318国道 · 朝圣者 · 途中客栈  ·  黄昏至夜晚\n建筑哲理：归家与朝圣，本是一条道路的两端\n画面描述\n主观/特写 | 318国道上朝圣者沾满尘土的额头。一步一叩，将身体化为向信仰的度量衡。夕阳下，设计师的影子与朝圣者的影子交叠前行。\n客栈夜景 | 途中客栈，火堆，酥油茶在陌生人之间传递。朝圣者老茧累累的双手握住茶碗。火光映照每张面孔。设计师坐在对面，沉默，半神游。\n关联互文⭐ | 【匹配剪辑】建筑大堂入口识别灯亮起←→朝圣者双脚踏上新地。相同的「抵达感」，不同的形式。两个动作须在节奏上完全对齐。\n声音指示 | 火焰噼啪声。远处风声。朝圣者低声祈祷，轻到辨不清内容——私密感，不侵扰。旁白结束前弦乐极轻浮入，迎接第五境高潮。\n色彩指示 | 琥珀暖调，夕阳拉长影子，轻微胶片颗粒感。客栈夜景：火光橙暖，画面收紧，亲密感优先于清晰度。\n旁白  ·  画外音（深沉、内省）\n朝圣者一步一叩，将身体化为向信仰的度量衡。\n我与他们同行，影子在夕阳下交叠。\n那一刻我知道：归家与朝圣，本是一条道路的两端。\n归家，是日常的仪式，是心的方向被重新点亮。\n增补旁白  ·  深化「仪式感」\n回家的路，不应该是死去的时间——\n它应该是门槛，是让你重新成为那个，你家所期待的那个人的空间。\n每一条入户小径，每一次识别灯亮起，电梯厅里那熟悉的木香——\n这些不是建筑，是仪式。\n归家与朝圣，本是一条道路的两端。\n第四境  ·  分镜机位执行表\n镜号 | 景别/运动 | 焦段 | 机位角度 | 画面内容 | 时长 | 对应旁白 | 调色 | 声音\nP-01 | LS 长焦远景 | 400mm 压缩 | 侧面·路面平视 | 318公路消失点·朝圣者节律磕头 | 10\" | 「度量衡」 | 琥珀暖调·扬尘 | 风声·脚步·磕头声\nP-02 | CU 特写 | 85mm 定焦 | 低角度·地面仰视 | 额头伏地·沾满尘土·老茧细节 | 6\" | 「将身体化为」 | 暖橙·高对比 | 土地接触低沉声\nP-03 | MS 中景→推 | 50mm 定焦 | 侧面·夕阳逆光 | 两道影子叠合·逆光剪影 | 10\" | 「影子在夕阳下」 | 黄金逆光·剪影 | 配乐轻入\nP-04 | CU 手持 | 35mm 定焦 | 平视·火光 | 茶碗·老茧手·火光映脸 | 12\" | 「心的方向」 | 火光橙暖·暗部深 | 火声·祈祷·弦乐\nP-05 | 匹配剪辑 | 85mm 定焦 | 低角→平视 | 大堂识别灯←→朝圣者落脚·节奏对齐 | 8\" | （互文·无旁白） | 冷暖衔接 | 过渡音效\n— 终  章  ·  心域的坐标 —\n神  山  ·  冈仁波齐\n外景  冈仁波齐峰下  ·  黄金时刻·全片情感高潮\n建筑哲理：最好的建筑，不是被看见，而是让人看见自己\n画面描述\n仰拍山顶 | 从大地开始：尘土，经幡在风中飘动。仰拍慢推，缓缓向上。冈仁波齐雪肩，山顶6638米，暮色中的金光。云与石。定格。\n设计师伫立 | 设计师站在山下，没有尝试攀登，没有掏出笔记本，只是站着，仰望。他的手，无意识地缓缓移向胸口。\n移轴摄影⭐⭐⭐ | 【全片最重要视觉 / 道具：时代首府完整建筑体模型 1:100】移轴摄影。时代首府的建筑实体模型，缓缓与远处的冈仁波齐金色山顶重合，由虚转实。三秒钟，两者是同一个形状、同一种高度、同一件事物。然后——他缓缓放下模型。山，依然在那里。这三秒须完全无声。\n最终画面 | 慢速焦点转移：从设计师面孔拉向远处转经人群——在无限宏大中，生命是移动的光点。生命在延续，仪式在延续。\n声音指示 | 模型叠合3秒：完全无声（零底噪），用无声制造高潮。随建筑师放下模型→室内乐全编制入场（弦乐+圆号）。克制，不冲浪。音符之间的空白，与音符本身同等重要。\n旁白  ·  画外音（深沉、内省）\n我把建筑模型举向金色山顶。\n我翻越群山，最终发现，等待被寻找的从来不是答案——\n而是人类对安宁、共生、归属的永恒渴望。\n最好的建筑，不是被看见，而是让人看见自己。\n真正的奢华，是建筑隐去，生活回到心的故乡。\n增补旁白  ·  尾章三段结构（闭合叙事环）\n——  锚点段\n翻越了那么多山，我没有带回一块岩石，也没有带回一套理论。\n我带回的，是一个问题的答案——\n那个问题，是我在城市里问了很多年，却一直没有勇气停下来听的那个：\n我真正需要的家，长什么样？\n——  五境回响\n雪山教我的，是扎根——不是占据土地，而是与土地共呼吸。\n森林教我的，是共生——不是拥有绿意，而是让绿意成为生活本身的肺。\n瀑布教我的，是选择——真正的安静，不是隔绝世界，而是只让值得的声音进来。\n那条路教我的，是仪式——每一次推开家门，都是一次对自己的重新确认。\n——  收束段（衔接落版「心域自成」）\n而神山教我的，是最后一件事，也是最难的一件事：\n真正好的建筑，不该被记住。\n它只是悄悄退后一步——\n让住在里面的你，越来越清晰地，看见自己。\n最好的建筑，不是被看见——而是让人看见自己。\n真正的奢华，是建筑隐去，生活回到心的故乡。\n终章  ·  分镜机位执行表\n镜号 | 景别/运动 | 焦段 | 机位角度 | 画面内容 | 时长 | 对应旁白 | 调色 | 声音\nK-01 | 仰拍慢推 | 广角16mm→50mm | 正仰角·底部起推 | 经幡→雪肩→山顶金光，15秒慢推完成 | 15\" | 「永恒的渴望」 | 金光·近过曝 | 弦乐极轻准备\nK-02 | MS 中景 | 85mm 定焦 | 正面·逆光 | 设计师伫立仰望，手缓移胸口 | 8\" | 「翻越群山」 | 逆光·剪影 | 接近无声\nK-03 | ⭐移轴核心 | 移轴镜头90mm | 正面·平视 | 建筑模型↔冈仁波齐金顶叠合·3秒无声停留 | 14\" | 「让人看见自己」 | 金光过曝·微缩感 | 完全无声3秒\nK-04 | MS 中景 | 85mm 定焦 | 侧面·跟随 | 设计师放下模型·仰望山依然在 | 8\" | 「建筑隐去」 | 金调渐平 | 室内乐轻入\nK-05 | 长焦慢推 | 400mm 压缩 | 正面·人群方向 | 远处转经人群，光点般移动 | 12\" | 「心的故乡」 | 金色背光·光点感 | 弦乐渐强\n— 落  版 —\n回 到 城 市  ·  叙 事 环 闭 合\n内景  城市夜晚 · 设计工作室  ·  与片头完全镜像呼应\n精神完成·落版\n画面描述\n镜像呼应 | 与片头构图完全一致：同一张桌，同一盏灯，同一扇落地窗。但此刻：一块山石静静压在蓝图上。片头未完成的模型，已经被完成的新设计图纸替代。这是无声叙事闭环——观众会感受到，无需旁白点破。\n细节指示 | 设计师的手——已被风沙晒出痕迹——在图纸上移动，每一笔都有重量。台灯光圈比片头稍大一点（约+15%），象征他带回的「温度」。\n落版字幕 | 黑场。金字淡入：「时代首府 · 心域自成」。持续3秒。配乐余韵收尾。\n尾章  ·  分镜机位执行表\n镜号 | 景别/运动 | 焦段 | 机位角度 | 画面内容 | 时长 | 对应旁白 | 调色 | 声音\nE-01 | ECU 极特写 | 85mm 定焦 | 俯角·桌面视角 | 山石压蓝图·已完成模型·风沙手特写 | 10\" | （无旁白·呼应） | 靛蓝+暖光扩+15% | 城市底噪·不压迫\nE-02 | WS 镜像 | 50mm 定焦 | 与片头完全相同 | 片头构图·但一切都变了 | 12\" | （呼应·无旁白） | 暖光圈对比片头 | 配乐平稳\nE-03 | CU 特写 | 85mm 定焦 | 平视·手部特写 | 风沙手在图纸上·每笔有重量 | 8\" | （无旁白） | 温暖·质感 | 笔触纸面声\nE-04 | 落版字幕 | —— | —— | 金字「时代首府·心域自成」·黑底3秒 | 14\" | （余韵） | 金字·纯黑底 | 配乐收尾·余韵\n社交媒体裂变版本\n主版素材拍摄完成后可剪辑以下独立传播单元，共享素材，零额外拍摄成本。\n版本一  ·  「静音篇」\n15\"  ·  怒江关窗那一刻  ·  适合抖音 / 微博\n画面逻辑 | 怒江瀑布轰鸣（8秒）→ 关窗动作 → 一帧黑 → 绝对静场（4秒）→ 落版字：「选择，是最奢侈的安静」→ 品牌落版\n没有一个豪宅广告敢这样做：8秒的噪音，然后，给你4秒的真正安静。#时代首府 #你的家值得这种安静\n传播逻辑 | 反差感制造话题。观众会主动分享「这个广告的静音效果」，讨论即传播。\n版本二  ·  「生长篇」\n30\"  ·  森林延时叠化  ·  适合微信视频号 / 小红书\n画面逻辑 | 森林微距（5秒）→ 模型搭建（8秒）→ 延时叠化：森林→建筑立面绿化（10秒）→ 旁白金句 → 落版\n森林从来不孤立存在。它在空中握手，在地下合作，用一万年长成今天的样子。有些建筑，也该这样生长。\n传播逻辑 | 视觉美感强，适合被收藏和转发。延时叠化效果在小红书有自然传播动能。\n版本三  ·  「仪式篇」\n15\"  ·  影子叠合+归家  ·  适合朋友圈广告精准投放\n画面逻辑 | 朝圣者磕头（5秒）→ 影子叠合（5秒）→ 居民推开家门·识别灯亮起（3秒）→ 落版字：「每次回家，都是一次仪式」\n有人用一步一跪丈量信仰。你每天的回家，也是一场朝圣。\n传播逻辑 | 情感共鸣型，下班回家时刻投放效果最佳。精准触达高端通勤人群。\n导演执行注记  ·  六项核心原则\n01 · 旁白演员选角与录音\n拍摄前完成选角，外景拍摄期间现场播放临时旁白校准节奏。声音表演须介于散文电影独白与内心自白之间：绝不说教，绝不煽情。参考调性：贾樟柯纪录片旁白的克制感 + 泰伦斯·马力克《生命之树》的内省质地。男声，40岁上下，不急不缓。每一句话，像书法——每个字都是有意放置的。\n02 · 镜头哲学\n禁止为景观而景观的航拍，每个航拍须有叙事理由。主导镜头：长焦压缩——建筑师始终是庞大事物中的渺小见证者，而非主角。移轴镜头仅限冈仁波齐一幕（让现实微缩，而非让模型戏剧化）。手持跟拍仅限朝圣路（增加同行感）。全程拒绝「广告感」运镜。\n03 · 调色迁移路线\n调色是情绪迁移，不是滤镜。成都：去饱和·钨丝蓝·轻压迫。折多山：蓝调转冷白·开始呼吸。子梅垭口：冰川纯白·蓝紫阴影·高光过曝。波密：深绿·湿润·阴影有细节。怒江：银白混沌·零暖调·近黑白。318黄昏：琥珀·长影·胶片颗粒。冈仁波齐：金光·近过曝·走进光里。工作室尾章：靛蓝底+局部暖光扩大，构图同片头，情绪完全不同。\n04 · 声音建筑\n为每个拍摄地单独配备外景录音师（ASMR级设备，独立于现场录音师）。怒江场景须单独立项后期声音制作：砖墙限制器处理轰鸣段→关窗帧硬切-40dB→静场3秒仅留极轻底噪→鸟鸣→轻弦乐。配乐委托室内乐编制：弦乐组+双簧管/圆号，无打击乐，无电子元素。全片最重要的声音节点是冈仁波齐模型叠合时的3秒「绝对无声」——用无声制造情感高潮。\n05 · 建筑模型道具规格（四件）\n道具一·地基剖面模型（第一境）：1:50，岩层纹路模拟，材质反映真实地基用料。道具二·空中庭院立面模型（第二境）：1:50，绿植可附着，须使用真实苔藓素材。道具三·窗户单元模型（第三境）：1:20，功能性插销，可实际开合，合上时内部须有轻微隔音效果。道具四·时代首府完整建筑体模型（终章）：1:100，外观精准，移轴拍摄专用，须保证自然光下质感真实。所有模型：建筑师持用方式如外科医生对待器械——不表演，只使用。\n06 · 旁白写作执行原则\n通过测试：每句话须能「讲给普通人听，他能懂」。同时须有「第一次听到会停顿一下」的密度。每句15-22字为宜，句间留「呼吸」空间。禁止：形容词堆砌（「宁静致远」「天人合一」等）；禁止：直接出现产品功能名词；允许：用具体感官细节（手压岩石的重量感、关窗后的鸟鸣、影子叠合的瞬间）带出哲学结论。「去形容词测试」：删掉所有形容词，看核心意思是否依然成立。\n浩宇·时代首府  ·  系列影片第一集\n《生长的序章：从自然到心域》  ·  导演完整执行脚本  ·  2026"}];

const state = {
  view: 'home',
  currentDocId: null,
  currentFilter: null,
  searchKeyword: '',
  quickAudience: null,
  readingMode: JSON.parse(localStorage.getItem('tsf-reading-mode') || 'false'),
  darkMode: JSON.parse(localStorage.getItem('tsf-dark-mode') || 'false'),
  favorites: JSON.parse(localStorage.getItem('tsf-favorites') || '[]'),
  recents: JSON.parse(localStorage.getItem('tsf-recents') || '[]'),
  progress: JSON.parse(localStorage.getItem('tsf-progress') || '{}'),
};

const app = document.getElementById('app');
const bottomNav = document.getElementById('bottomNav');

function saveState() {
  localStorage.setItem('tsf-reading-mode', JSON.stringify(state.readingMode));
  localStorage.setItem('tsf-dark-mode', JSON.stringify(state.darkMode));
  localStorage.setItem('tsf-favorites', JSON.stringify(state.favorites));
  localStorage.setItem('tsf-recents', JSON.stringify(state.recents));
  localStorage.setItem('tsf-progress', JSON.stringify(state.progress));
}
function applyTheme() { document.body.classList.toggle('dark', state.darkMode); }
function setView(view, payload = null) {
  state.view = view;
  if (view === 'doc') state.currentDocId = payload;
  if (view === 'category') state.currentFilter = payload;
  render();
}
function toggleFavorite(id) {
  if (state.favorites.includes(id)) state.favorites = state.favorites.filter(x => x !== id);
  else state.favorites.unshift(id);
  saveState();
  render();
}
function markRecent(id) {
  state.recents = [id, ...state.recents.filter(x => x !== id)].slice(0, 12);
  saveState();
}
function openDoc(id) {
  markRecent(id);
  state.currentDocId = id;
  state.view = 'doc';
  render();
  setTimeout(() => {
    const key = state.progress[id] || 0;
    const container = document.querySelector('[data-article-scroll]');
    if (container && key > 0) container.scrollTop = Math.max(0, (container.scrollHeight - container.clientHeight) * key);
  }, 40);
}
function updateProgress() {
  const id = state.currentDocId;
  const el = document.querySelector('[data-article-scroll]');
  if (!id || !el) return;
  const max = el.scrollHeight - el.clientHeight;
  const pct = max > 0 ? el.scrollTop / max : 0;
  state.progress[id] = Number(pct.toFixed(4));
  saveState();
  const fill = document.querySelector('.progress-fill');
  if (fill) fill.style.width = Math.round(pct * 100) + '%';
}
function getCounts() {
  return {
    total: DOCS.length,
    documentary: DOCS.filter(d => d.section === 'documentary').length,
    government: DOCS.filter(d => d.subgroup === '政府版').length,
    owner: DOCS.filter(d => d.subgroup === '业主版').length,
    concept: DOCS.filter(d => d.section === 'concept').length,
    overall: DOCS.filter(d => d.section === 'overall').length,
  };
}
function byId(id) { return DOCS.find(d => d.id === id); }
function docCard(doc, extra='') {
  const fav = state.favorites.includes(doc.id) ? '已收藏' : (doc.subtitle || '');
  const progress = state.progress[doc.id] ? (' · 阅读 ' + Math.round(state.progress[doc.id] * 100) + '%') : '';
  return `
    <div class="doc-card" onclick="openDoc('${doc.id}')">
      <div class="doc-top">
        <div>
          <div class="mini">${doc.group}${doc.subgroup ? ' · ' + doc.subgroup : ''}</div>
          <h4>${doc.title}</h4>
        </div>
        <div class="mini">${fav}${progress}</div>
      </div>
      <p>${doc.desc}</p>
      <div class="chip-row" style="margin-top:10px">
        ${(doc.tags || []).slice(0,4).map(tag => `<span class="chip">${tag}</span>`).join('')}
      </div>
      ${extra}
    </div>
  `;
}
function sectionDocs(section, subgroup=null) {
  return DOCS.filter(d => d.section === section && (subgroup ? d.subgroup === subgroup : true));
}
function audienceDocs(audience) {
  return DOCS.filter(d => (d.audience || []).includes(audience));
}
function renderHome() {
  const c = getCounts();
  const overview = DOCS.find(d => d.section === 'overall');
  const recentDocs = state.recents.map(byId).filter(Boolean);
  const favoriteDocs = state.favorites.map(byId).filter(Boolean);
  return `
    <div class="topbar">
      <div class="brand">
        <div>
          <h1>时代首府 · 手机阅读器</h1>
          <p>纪录片 / 概念版 / 总体说明的单文件阅读系统</p>
        </div>
        <button class="icon-btn" onclick="toggleTheme()">${state.darkMode ? '日间' : '夜间'}</button>
      </div>
    </div>

    <section class="hero">
      <div class="eyebrow">Director Reading System</div>
      <h2>把 16 篇工作文档，整理成一套手机可读、可切换、可快速调用的项目阅读器。</h2>
      <p>首页不按文件堆积，而按使用逻辑进入：先看整体，再分纪录片与概念版；同时保留按甲方、剧组、影棚与自己统筹的快速入口。</p>

      <div class="kpi-strip">
        <div class="kpi"><div class="num">${c.total}</div><div class="label">总文档数</div></div>
        <div class="kpi"><div class="num">${c.documentary}</div><div class="label">纪录片文档</div></div>
        <div class="kpi"><div class="num">${c.concept}</div><div class="label">概念版文档</div></div>
      </div>

      <div class="searchbar">
        <input id="homeSearchInput" type="search" placeholder="搜索标题、关键词、正文内容" value="${escapeHtml(state.searchKeyword)}" />
        <button class="primary-btn" onclick="runSearch()">搜索</button>
      </div>
    </section>

    <div class="section-title"><h3>主入口</h3><span>手机查看优先</span></div>
    <div class="grid cols-2">
      <div class="card tap" onclick="openDoc('${overview.id}')">
        <h4>整体介绍</h4>
        <p>单独放置的总说明页，适合先建立整体判断，再进入各分版细看。</p>
        <div class="count">1 篇</div>
      </div>
      <div class="card tap" onclick="setView('category', '纪录片')">
        <h4>纪录片</h4>
        <p>再分政府版与业主版，分别对应立信与立感。</p>
        <div class="count">${c.documentary} 篇（政府版 ${c.government} / 业主版 ${c.owner}）</div>
      </div>
      <div class="card tap" onclick="setView('category', '概念版')">
        <h4>概念版</h4>
        <p>作为独立创作链条成立，保留从母题、旁白到执行与后期的推进路径。</p>
        <div class="count">${c.concept} 篇</div>
      </div>
      <div class="card tap" onclick="setView('quick')">
        <h4>快速导航</h4>
        <p>按“给甲方 / 给剧组 / 给影棚 / 给自己统筹”快速筛文档。</p>
        <div class="count">4 个使用场景</div>
      </div>
    </div>

    <div class="section-title"><h3>快速导航</h3><span>按对象切入</span></div>
    <div class="quick-grid">
      ${['甲方','剧组','影棚','统筹'].map(name => `
        <button class="ghost-btn" style="text-align:left" onclick="openQuick('${name}')">
          <strong>${name}</strong><br><span class="mini">查看推荐文档</span>
