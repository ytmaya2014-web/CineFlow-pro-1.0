<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寰影 CineFlow Pro 1.0</title>
    <!-- 引入 Tailwind CSS 框架引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Babel 用于在浏览器中实时编译 React JSX 代码 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Mammoth 用于 Word 文档解析 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes loading { 0% { width: 0%; } 40% { width: 60%; } 100% { width: 100%; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 核心应用脚本 -->
    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import * as LucideIcons from 'https://esm.sh/lucide-react@0.292.0';

        const {
            Film, BookOpen, LayoutDashboard, Clapperboard, CalendarDays, Users, Camera, Play, CheckCircle, Clock, Search, Bell, Settings, Plus, Image, MoreVertical, AlignLeft, Video, MapPin, CloudRain, FileText, AlertCircle, Activity, Upload, Download, Filter, ChevronRight, Eye, Edit3, Trash2, Highlighter, Move, Maximize, Target, FileDown, ArrowRight, Check, CheckSquare, Square, Send, Inbox, ListTodo, Layers, GripVertical, FileOutput, XCircle, ListChecks, BarChart3, HardDrive, TrendingUp, FolderPlus, Globe, Palette, Monitor, Archive, FilePlus2, FolderOpen
        } = LucideIcons;

        const App = () => {
            // ========================================================
            // 0. 启动屏与自定义弹窗状态
            // ========================================================
            const [showSplash, setShowSplash] = useState(true);
            const [modalConfig, setModalConfig] = useState(null); // 替代 alert 和 confirm 的定制 UI 弹窗

            const showModal = (message, type = 'alert', onConfirm = null) => {
                setModalConfig({ message, type, onConfirm });
            };
            const closeModal = () => setModalConfig(null);

            // ========================================================
            // 全局系统设置状态
            // ========================================================
            const [showSystemSettings, setShowSystemSettings] = useState(false);
            const [themeColor, setThemeColor] = useState('cyan');
            const [bgTheme, setBgTheme] = useState('obsidian');
            const [sysLang, setSysLang] = useState('zh');

            const tColor = useMemo(() => {
                const map = {
                    cyan: { main: 'cyan', text: 'text-cyan-500', textLight: 'text-cyan-400', bg: 'bg-cyan-600', bgHover: 'hover:bg-cyan-500', border: 'border-cyan-500', shadow: 'shadow-[0_0_20px_rgba(6,182,212,0.3)]', activeBg: 'bg-cyan-500/10' },
                    amber: { main: 'amber', text: 'text-amber-500', textLight: 'text-amber-400', bg: 'bg-amber-600', bgHover: 'hover:bg-amber-500', border: 'border-amber-500', shadow: 'shadow-[0_0_20px_rgba(245,158,11,0.3)]', activeBg: 'bg-amber-500/10' },
                    purple: { main: 'purple', text: 'text-purple-500', textLight: 'text-purple-400', bg: 'bg-purple-600', bgHover: 'hover:bg-purple-500', border: 'border-purple-500', shadow: 'shadow-[0_0_20px_rgba(168,85,247,0.3)]', activeBg: 'bg-purple-500/10' },
                };
                return map[themeColor] || map.cyan;
            }, [themeColor]);

            const bTheme = useMemo(() => {
                const map = {
                    obsidian: { root: 'bg-black', panel: 'bg-[#0B0F19]', card: 'bg-gray-900', border: 'border-gray-800' },
                    slate: { root: 'bg-slate-950', panel: 'bg-slate-900', card: 'bg-slate-800', border: 'border-slate-700' },
                    zinc: { root: 'bg-zinc-950', panel: 'bg-zinc-900', card: 'bg-zinc-800', border: 'border-zinc-700' }
                };
                return map[bgTheme] || map.obsidian;
            }, [bgTheme]);

            // ========================================================
            // 核心工作流状态库
            // ========================================================
            const [projectInfo, setProjectInfo] = useState({ title: '', director: '', dp: '', startDate: '' });
            const [archivedProjects, setArchivedProjects] = useState([]); 
            const [activeModule, setActiveModule] = useState('project-setup'); 

            // 剧本导入与校对状态 
            const [ingestStage, setIngestStage] = useState('upload'); 
            const [originalScript, setOriginalScript] = useState('');
            const [editedScript, setEditedScript] = useState('');
            const fileInputRef = useRef(null);
            
            const originalScrollRef = useRef(null);
            const editedScrollRef = useRef(null);
            const isSyncingLeft = useRef(false);
            const isSyncingRight = useRef(false);

            const [parsedScriptBlocks, setParsedScriptBlocks] = useState([]); 

            // 拆解与分镜状态 
            const [activeHighlights, setActiveHighlights] = useState({ cast: true, props: true, vfx: true });
            const [showShotForm, setShowShotForm] = useState(false);
            const [selectedShotId, setSelectedShotId] = useState(null);
            const [selectedShotIds, setSelectedShotIds] = useState(new Set());
            const [newShot, setNewShot] = useState({ size: 'CU', angle: 'Eye Level', movement: 'Static', lens: '50mm', description: '', referenceText: '' });
            
            const [shots, setShots] = useState([]); 

            // 通告与排期状态 
            const [schedule, setSchedule] = useState({
                day1: { id: 'day1', date: '待定', title: 'Day 1: 初始拍摄日', callTime: 'TBD', location: 'TBD', weather: 'TBD', shots: [] }
            });

            const [repoSelectedShotIds, setRepoSelectedShotIds] = useState(new Set());
            const [repoFilter, setRepoFilter] = useState('ALL'); 
            const [draggedShotId, setDraggedShotId] = useState(null);
            const [dragOverDayId, setDragOverDayId] = useState(null);

            // 现场执行状态 
            const [executionActiveDayId, setExecutionActiveDayId] = useState('day1');
            const [executionActiveShotId, setExecutionActiveShotId] = useState(null);
            const [camNames, setCamNames] = useState({ A: 'CAM A (ARRI)', B: 'CAM B (RED)', C: 'CAM C (SONY)' });
            const [shotLogs, setShotLogs] = useState({});

            const navItems = [
                { id: 'dashboard', icon: LayoutDashboard, label: sysLang === 'zh' ? '总览 (Dashboard)' : 'Dashboard' },
                { id: 'script', icon: BookOpen, label: sysLang === 'zh' ? '剧本导入 (Script)' : 'Script Ingest' },
                { id: 'breakdown', icon: AlignLeft, label: sysLang === 'zh' ? '拆解与分镜 (Breakdown)' : 'Breakdown' },
                { id: 'repository', icon: Inbox, label: sysLang === 'zh' ? '资产仓库 (Repository)' : 'Repository' },
                { id: 'schedule', icon: CalendarDays, label: sysLang === 'zh' ? '通告排期 (Schedule)' : 'Scheduling' },
                { id: 'execution', icon: Video, label: sysLang === 'zh' ? '现场执行 (On-Set)' : 'On-Set Logging' },
            ];

            // ========================================================
            // 业务逻辑
            // ========================================================

            useEffect(() => {
                const timer = setTimeout(() => setShowSplash(false), 2500);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                if (activeModule === 'breakdown' && selectedShotId) {
                const activeShot = shots.find(s => s.id === selectedShotId);
                if (activeShot && activeShot.referenceText) {
                    const targetBlock = parsedScriptBlocks.find(b => b.text.includes(activeShot.referenceText));
                    if (targetBlock) {
                    const element = document.getElementById(`script-block-${targetBlock.id}`);
                    if (element) { element.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                    }
                }
                }
            }, [selectedShotId, activeModule, shots, parsedScriptBlocks]);

            useEffect(() => {
                if (activeModule === 'execution') {
                const activeDay = schedule[executionActiveDayId] || Object.values(schedule)[0];
                if (activeDay && activeDay.shots.length > 0 && !executionActiveShotId) {
                    setExecutionActiveShotId(activeDay.shots[0]);
                }
                }
            }, [activeModule, executionActiveDayId, executionActiveShotId, schedule]);

            const initProject = (e) => {
                e.preventDefault();
                if (!projectInfo.title) { showModal(sysLang === 'zh' ? "请输入项目名称" : "Please enter project title"); return; }
                setActiveModule('dashboard');
            };

            const createProjectSnapshot = () => ({
                projectInfo, originalScript, editedScript, ingestStage, parsedScriptBlocks,
                shots, schedule, camNames, shotLogs
            });

            const handleArchiveProject = (silent = false) => {
                if (!projectInfo.title) {
                    if (!silent) showModal(sysLang === 'zh' ? "项目未命名，请先在设置中创建项目！" : "Project unnamed. Please setup first.");
                    return false;
                }
                const snapshot = createProjectSnapshot();
                setArchivedProjects(prev => {
                    const existingIndex = prev.findIndex(p => p.title === projectInfo.title);
                    if (existingIndex >= 0) {
                        const newArchives = [...prev];
                        newArchives[existingIndex] = {
                        id: prev[existingIndex].id,
                        title: projectInfo.title,
                        date: new Date().toLocaleString(),
                        shotsCount: shots.length,
                        data: snapshot
                        };
                        return newArchives;
                    } else {
                        return [{
                        id: Date.now(),
                        title: projectInfo.title,
                        date: new Date().toLocaleString(),
                        shotsCount: shots.length,
                        data: snapshot
                        }, ...prev];
                    }
                });
                if (!silent) showModal(sysLang === 'zh' ? "✅ 项目进度归档成功！已保存/覆盖当前最新版本。" : "✅ Project archived successfully!");
                return true;
            };

            const handleLoadProject = (projId) => {
                const projToLoad = archivedProjects.find(p => p.id === projId);
                if (!projToLoad) return;

                const doLoad = () => {
                    const d = projToLoad.data;
                    setProjectInfo(d.projectInfo);
                    setOriginalScript(d.originalScript);
                    setEditedScript(d.editedScript);
                    setIngestStage(d.ingestStage);
                    setParsedScriptBlocks(d.parsedScriptBlocks);
                    setShots(d.shots);
                    setSchedule(d.schedule);
                    setCamNames(d.camNames || { A: 'CAM A', B: 'CAM B', C: 'CAM C' });
                    setShotLogs(d.shotLogs || {});
                    
                    setSelectedShotIds(new Set());
                    setRepoSelectedShotIds(new Set());
                    setExecutionActiveShotId(null);
                    
                    showModal(sysLang === 'zh' ? `✅ 成功调入项目：${projToLoad.title}` : `✅ Loaded project: ${projToLoad.title}`);
                    setActiveModule('dashboard');
                };

                if (projectInfo.title) {
                    showModal(sysLang === 'zh' ? "⚠️ 加载项目将覆盖当前工作台。系统会自动为您存档当前正在编辑的进度。" : "System will save current before loading.", 'confirm', () => {
                        handleArchiveProject(true); 
                        doLoad();
                    });
                } else {
                    doLoad();
                }
            };

            const handleCreateNewProject = () => {
                showModal(sysLang === 'zh' ? "⚠️ 警告：新建项目将彻底清空当前工作台所有数据！\n系统会自动为您存档当前进度，是否继续？" : "⚠️ Warning: This clears the workspace. Proceed?", 'confirm', () => {
                    if (projectInfo.title) {
                        handleArchiveProject(true); 
                    }
                    setProjectInfo({ title: '', director: '', dp: '', startDate: '' });
                    setOriginalScript('');
                    setEditedScript('');
                    setIngestStage('upload');
                    setParsedScriptBlocks([]);
                    setShots([]);
                    setSchedule({ day1: { id: 'day1', date: '待定', title: 'Day 1: 新建拍摄日', callTime: 'TBD', location: 'TBD', weather: 'TBD', shots: [] } });
                    setShotLogs({});
                    setSelectedShotIds(new Set());
                    setRepoSelectedShotIds(new Set());
                    setExecutionActiveShotId(null);
                    setActiveModule('project-setup');
                });
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIngestStage('loading');
                const extension = file.name.split('.').pop().toLowerCase();
                try {
                if (extension === 'txt') {
                    const text = await file.text(); setOriginalScript(text); setEditedScript(text); setIngestStage('review');
                } else if (extension === 'docx') {
                    if (!window.mammoth) throw new Error("解析引擎尚未就绪，请稍后重试。");
                    const arrayBuffer = await file.arrayBuffer();
                    const result = await window.mammoth.extractRawText({ arrayBuffer });
                    const text = result.value || "（文档内无有效文本提取）";
                    setOriginalScript(text); setEditedScript(text); setIngestStage('review');
                } else { showModal("仅支持 .docx 或 .txt 格式文件"); setIngestStage('upload'); }
                } catch (err) { setOriginalScript(`错误: ${err.message}`); setEditedScript(`错误: ${err.message}`); setIngestStage('review'); }
            };

            const handleOriginalScroll = (e) => {
                if (isSyncingLeft.current) { isSyncingLeft.current = false; return; }
                if (editedScrollRef.current) {
                isSyncingRight.current = true;
                const { scrollTop, scrollHeight, clientHeight } = e.target;
                const maxScroll = scrollHeight - clientHeight;
                if (maxScroll <= 0) return;
                editedScrollRef.current.scrollTop = (scrollTop / maxScroll) * (editedScrollRef.current.scrollHeight - editedScrollRef.current.clientHeight);
                }
            };

            const handleEditedScroll = (e) => {
                if (isSyncingRight.current) { isSyncingRight.current = false; return; }
                if (originalScrollRef.current) {
                isSyncingLeft.current = true;
                const { scrollTop, scrollHeight, clientHeight } = e.target;
                const maxScroll = scrollHeight - clientHeight;
                if (maxScroll <= 0) return;
                originalScrollRef.current.scrollTop = (scrollTop / maxScroll) * (originalScrollRef.current.scrollHeight - originalScrollRef.current.clientHeight);
                }
            };

            const handleConfirmAndBreakdown = () => {
                const lines = editedScript.split('\n');
                const newBlocks = [];
                lines.forEach((line, idx) => {
                const text = line.trim();
                if (!text) return;
                let type = 'action';
                if (/^(INT|EXT|内景|外景|场景|第[一二三四五六七八九十\d]+场|\d+[.\s])/i.test(text)) type = 'scene-heading';
                else if (text.length < 15 && !text.includes('（') && !text.includes('：') && !text.includes('(')) type = 'character';
                else if (text.startsWith('（') || text.startsWith('(') || text.includes('：') || (newBlocks.length > 0 && newBlocks[newBlocks.length - 1].type === 'character')) type = 'dialogue';
                newBlocks.push({ id: `block-${Date.now()}-${idx}`, type, text });
                });
                if (newBlocks.length > 0) setParsedScriptBlocks(newBlocks);
                setActiveModule('breakdown');
            };

            const getOrCreateShotLog = (shotId) => {
                if (shotLogs[shotId]) return shotLogs[shotId];
                return { currentTake: 1, draft: { A: { roll: '', clip: '', lens: '', note: '' }, B: { roll: '', clip: '', lens: '', note: '' }, C: { roll: '', clip: '', lens: '', note: '' } }, history: [] };
            };

            const handleLogChange = (shotId, cam, field, value) => {
                setShotLogs(prev => {
                const log = prev[shotId] || getOrCreateShotLog(shotId);
                return { ...prev, [shotId]: { ...log, draft: { ...log.draft, [cam]: { ...log.draft[cam], [field]: value } } } };
                });
            };

            const handleUpdateCamName = (cam, value) => setCamNames(prev => ({ ...prev, [cam]: value }));

            const handleCommitTake = (shotId, status) => {
                setShotLogs(prev => {
                const log = prev[shotId] || getOrCreateShotLog(shotId);
                const newTake = { id: `tk-${Date.now()}`, takeNum: log.currentTake, status: status, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), cams: JSON.parse(JSON.stringify(log.draft)) };
                return { ...prev, [shotId]: { ...log, currentTake: log.currentTake + 1, history: [newTake, ...log.history], draft: { A: { ...log.draft.A, clip: '', note: '' }, B: { ...log.draft.B, clip: '', note: '' }, C: { ...log.draft.C, clip: '', note: '' } } } };
                });
            };

            const updateTakeCount = (shotId, delta) => {
                setShotLogs(prev => { const log = prev[shotId] || getOrCreateShotLog(shotId); return { ...prev, [shotId]: { ...log, currentTake: Math.max(1, log.currentTake + delta) } }; });
            };

            const toggleShotCompletion = (shotId) => { setShots(shots.map(s => s.id === shotId ? { ...s, status: s.status === 'completed' ? 'pending' : 'completed' } : s)); };
            
            const handleExportPDF = (day) => {
                const dayShots = day.shots.map(id => shots.find(s => s.id === id)).filter(Boolean);
                const htmlContent = `
                <!DOCTYPE html>
                <html lang="zh-CN">
                <head><meta charset="UTF-8"><title>拍摄通告单 - ${day.title}</title>
                <style>body { font-family: 'Helvetica Neue', 'SimHei', sans-serif; padding: 40px; color: #000; background: #fff; line-height: 1.6; } .header { text-align: center; border-bottom: 3px solid #000; padding-bottom: 20px; margin-bottom: 30px; } .header h1 { margin: 0 0 10px 0; font-size: 28px; letter-spacing: 2px; } .header h2 { margin: 0; font-size: 18px; color: #555; font-weight: normal; } .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; } .info-box { border: 1px solid #000; padding: 15px; } .info-box strong { display: inline-block; width: 80px; } table { width: 100%; border-collapse: collapse; margin-top: 10px; } th, td { border: 1px solid #000; padding: 12px 8px; text-align: left; vertical-align: top; } th { background-color: #f0f0f0; font-weight: bold; text-transform: uppercase; font-size: 14px; } .shot-id { font-weight: bold; font-family: monospace; white-space: nowrap; } .footer { margin-top: 50px; text-align: center; font-size: 12px; color: #777; border-top: 1px solid #ddd; padding-top: 20px; }</style>
                </head>
                <body>
                    <div class="header"><h1>CALL SHEET / 拍摄通告单</h1><h2>项目: ${projectInfo.title || '无项目名称'}</h2></div>
                    <div class="info-grid">
                    <div class="info-box"><div><strong>排期日:</strong> ${day.title}</div><div><strong>日期:</strong> ${day.date}</div><div><strong>通告时间:</strong> ${day.callTime}</div></div>
                    <div class="info-box"><div><strong>拍摄地:</strong> ${day.location}</div><div><strong>天气:</strong> ${day.weather}</div><div><strong>总镜头数:</strong> ${day.shots.length} 个</div></div>
                    </div>
                    <h3 style="margin-bottom: 10px; border-left: 5px solid #000; padding-left: 10px;">SHOT LIST / 镜头清单</h3>
                    <table>
                    <thead><tr><th width="8%">编号</th><th width="10%">景别</th><th width="15%">角度</th><th width="15%">运镜</th><th width="10%">焦段</th><th width="42%">画面描述</th></tr></thead>
                    <tbody>
                        ${dayShots.length === 0 ? '<tr><td colspan="6" style="text-align:center; padding: 20px; color:#666;">暂无排期镜头</td></tr>' : ''}
                        ${dayShots.map((s, i) => `<tr><td class="shot-id">SH-${i+1}</td><td>${s.size}</td><td>${s.angle}</td><td>${s.movement}</td><td>${s.lens || '-'}</td><td>${s.description}</td></tr>`).join('')}
                    </tbody>
                    </table>
                    <div class="footer">寰影 CineFlow Pro 数字化场记系统生成 | 打印时间: ${new Date().toLocaleString()}</div>
                </body></html>
                `;
                const printWindow = window.open('', '_blank');
                if (printWindow) { printWindow.document.write(htmlContent); printWindow.document.close(); printWindow.focus(); setTimeout(() => printWindow.print(), 250); } else showModal("请允许浏览器弹出窗口以生成 PDF。");
            };

            const handleExportEditorLogPDF = (day) => {
                const dayShots = day.shots.map(id => shots.find(s => s.id === id)).filter(Boolean);
                const htmlContent = `
                <!DOCTYPE html>
                <html lang="zh-CN">
                <head><meta charset="UTF-8"><title>场记单/摄影日志 - ${day.title}</title>
                <style>body { font-family: 'Helvetica Neue', 'SimHei', sans-serif; padding: 30px; color: #000; background: #fff; line-height: 1.5; font-size: 12px; } .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; } .header h1 { margin: 0 0 5px 0; font-size: 24px; letter-spacing: 2px; } .shot-block { margin-bottom: 30px; border: 2px solid #000; page-break-inside: avoid; } .shot-header { background-color: #000; color: #fff; padding: 8px 12px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; } .shot-desc { padding: 10px 12px; background-color: #f9f9f9; border-bottom: 2px solid #000; font-style: italic; } table { width: 100%; border-collapse: collapse; } th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: middle; } th { background-color: #eee; font-weight: bold; text-transform: uppercase; font-size: 11px; } .take-col { font-size: 16px; font-weight: bold; text-align: center; width: 50px; } .status-CIRCLE { color: #059669; font-weight: bold; font-size: 14px; text-align: center; } .status-NG { color: #dc2626; font-weight: bold; font-size: 14px; text-align: center; text-decoration: line-through; } .cam-name { font-weight: bold; color: #555; font-size: 10px; margin-bottom: 2px; } .clip-name { font-family: monospace; font-size: 11px; word-break: break-all; }</style>
                </head>
                <body>
                    <div class="header"><h1>SCRIPT SUPERVISOR & CAMERA LOG (场记单)</h1><h2>项目: ${projectInfo.title || '无项目名称'} | 拍摄日: ${day.title.split(':')[0]} | 日期: ${day.date}</h2></div>
                    ${dayShots.length === 0 ? '<p style="text-align:center;">今日无拍摄记录</p>' : ''}
                    ${dayShots.map((s, i) => {
                    const logs = shotLogs[s.id]; const history = logs ? logs.history : [];
                    return `
                        <div class="shot-block">
                        <div class="shot-header"><span>SHOT: ${i+1} | ${s.size} | ${s.angle} | ${s.movement}</span><span>${s.status === 'completed' ? 'WRAP' : 'PENDING'}</span></div>
                        <div class="shot-desc">描述: ${s.description}</div>
                        ${history.length > 0 ? `
                            <table><thead><tr><th>TK</th><th>STATUS</th><th>CAM A: ${camNames.A}</th><th>CAM B: ${camNames.B}</th><th>CAM C: ${camNames.C}</th></tr></thead>

                        </div>
                        </div>

                        <h3 className="text-sm font-bold text-white uppercase tracking-widest flex items-center gap-2 mb-2"><AlertCircle className={tColor.text} size={16}/> Today's Call ({sysLang === 'zh' ? '今日通告' : 'Overview'})</h3>

                            <div className="space-y-4 mb-8">
                            <div className={`flex justify-between items-center border-b pb-2 ${bTheme.border}`}><span className="text-xs text-gray-500 uppercase font-bold">Call Time</span><span className="text-sm font-bold text-white">{activeDay?.callTime}</span></div>
                            <div className={`flex justify-between items-center border-b pb-2 ${bTheme.border}`}><span className="text-xs text-gray-500 uppercase font-bold">Location</span><span className="text-sm font-bold text-white text-right max-w-[150px] truncate" title={activeDay?.location}>{activeDay?.location}</span></div>

                        <button onClick={() => fileInputRef.current?.click()} className={`${tColor.bg} ${tColor.bgHover} text-white font-medium px-8 py-3 rounded-lg ${tColor.shadow} transition-all flex items-center justify-center gap-2 mx-auto`}><Upload size={18} /> {sysLang === 'zh' ? '选择文件' : 'Select File'}</button>
                        <input ref={fileInputRef} type="file" className="hidden" accept=".docx,.txt" onChange={handleFileUpload} onClick={(e) => { e.target.value = null; }} />
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center">
                        <Activity size={48} className={`${tColor.text} animate-pulse mb-6`} />
                        <p className={`text-sm ${tColor.textLight} font-mono tracking-widest uppercase animate-pulse`}>正在读取并解析文档结构 (Engine Processing)...</p>
                    </div>
                    )}
                    {ingestStage === 'review' && (
                    <div className="flex-1 flex flex-col h-full overflow-hidden animate-in fade-in duration-500">
                        <div className={`h-16 border-b flex items-center justify-between px-6 shrink-0 ${bTheme.card} ${bTheme.border}`}>
                        <div className="flex items-center gap-3"><CheckCircle size={20} className="text-green-500" /><span className="text-white font-medium">{sysLang === 'zh' ? '文档提取成功 - 进入校对模式' : 'Extracted Successfully'}</span><span className={`text-xs text-gray-500 ml-4 px-2 py-1 rounded ${bTheme.panel}`}>提示: 左右两栏滚动已同步</span></div>
                        <div className="flex gap-3"><button onClick={() => setIngestStage('upload')} className="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all">重新上传</button><button onClick={handleConfirmAndBreakdown} className={`${tColor.bg} ${tColor.bgHover} text-white px-5 py-2 rounded-lg text-sm font-medium flex items-center gap-2 shadow-lg transition-all`}>确认修正并进入拆解 <ArrowRight size={16} /></button></div>
                        </div>
                        <div className="flex-1 flex overflow-hidden">
                        <div className={`w-1/2 border-r flex flex-col ${bTheme.card} bg-opacity-50 ${bTheme.border}`}><div className={`h-12 flex items-center px-6 border-b shrink-0 ${bTheme.panel} ${bTheme.border}`}><span className="text-xs font-semibold text-gray-400 uppercase tracking-widest flex items-center gap-2"><FileText size={14}/> 提取原稿 (Source Document) <span className="px-2 py-0.5 bg-gray-700 rounded text-[10px] text-gray-300">只读</span></span></div><div className="flex-1 p-8 overflow-y-auto custom-scrollbar" ref={originalScrollRef} onScroll={handleOriginalScroll}><pre className="text-gray-500 font-serif text-lg leading-relaxed whitespace-pre-wrap">{originalScript}</pre></div></div>
                        <div className={`w-1/2 flex flex-col ${bTheme.panel}`}><div className={`h-12 flex items-center px-6 border-b shrink-0 ${bTheme.card} ${bTheme.border}`}><span className={`text-xs font-semibold ${tColor.textLight} uppercase tracking-widest flex items-center gap-2`}><Edit3 size={14}/> 工作台修正区 (Working Script)</span></div><div className="flex-1 p-8 overflow-y-hidden"><textarea ref={editedScrollRef} onScroll={handleEditedScroll} value={editedScript} onChange={(e) => setEditedScript(e.target.value)} className={`w-full h-full bg-transparent text-gray-200 font-serif text-lg leading-relaxed resize-none outline-none focus:ring-0 overflow-y-auto custom-scrollbar`} placeholder="在此对提取出的剧本进行排版调整或错误修正..."/></div></div>
                        </div>
                    </div>
                    )}
                </div>
                );
            };

            const renderBreakdownWorkspace = () => {
                const activeShot = shots.find(s => s.id === selectedShotId);
                const renderBlockText = (text) => {
                let elements = [text];
                shots.forEach(shot => {
                    if (!shot.referenceText || shot.referenceText.length < 2) return;
                    elements = elements.flatMap(el => {
                    if (typeof el !== 'string') return [el]; 
                    const parts = el.split(shot.referenceText);
                    const res = [];
                    parts.forEach((part, i) => { res.push(part); if (i < parts.length - 1) { const isSelected = selectedShotId === shot.id; res.push(<span key={`shot-${shot.id}-${i}`} className={`transition-all duration-300 ${isSelected ? `${tColor.activeBg} ${tColor.textLight} rounded px-1 ${tColor.shadow}` : 'opacity-30 text-gray-500'}`} title={isSelected ? '当前选中镜头' : '已分配至镜头清单'}>{shot.referenceText}</span>); } });
                    return res;
                    });
                });
                if (activeHighlights.cast) elements = elements.flatMap(el => { if (typeof el !== 'string') return [el]; const parts = el.split('李明'); const res = []; parts.forEach((part, i) => { res.push(part); if (i < parts.length - 1) res.push(<span key={`cast-${i}`} className="bg-green-500/20 text-green-400 border-b border-green-500 px-1 mx-1 rounded cursor-pointer hover:bg-green-500/30">李明</span>); }); return res; });
                if (activeHighlights.props) elements = elements.flatMap(el => { if (typeof el !== 'string') return [el]; const parts = el.split('手电筒'); const res = []; parts.forEach((part, i) => { res.push(part); if (i < parts.length - 1) res.push(<span key={`prop-${i}`} className="bg-orange-500/20 text-orange-400 border-b border-orange-500 px-1 mx-1 rounded cursor-pointer hover:bg-orange-500/30">手电筒</span>); }); return res; });
                if (activeHighlights.vfx) elements = elements.flatMap(el => { if (typeof el !== 'string') return [el]; const parts = el.split('全息投影仪闪烁着蓝光'); const res = []; parts.forEach((part, i) => { res.push(part); if (i < parts.length - 1) res.push(<span key={`vfx-${i}`} className="bg-blue-500/20 text-blue-400 border-b border-blue-500 px-1 mx-1 rounded cursor-pointer">全息投影仪闪烁着蓝光</span>); }); return res; });
                return elements;
                };

                return (
                <div className={`flex-1 flex overflow-hidden ${bTheme.panel}`}>

                    <div className={`px-6 py-3 border-b flex gap-4 shrink-0 ${bTheme.card} bg-opacity-50 ${bTheme.border}`}>

                        <button onClick={() => toggleHighlight('props')} className={`text-xs px-3 py-1 rounded-full border transition-all ${activeHighlights.props ? 'bg-orange-500/20 text-orange-400 border-orange-500/50' : 'bg-transparent text-gray-500 border-gray-700'}`}>道具</button>
                        <button onClick={() => toggleHighlight('vfx')} className={`text-xs px-3 py-1 rounded-full border transition-all ${activeHighlights.vfx ? 'bg-blue-500/20 text-blue-400 border-blue-500/50' : 'bg-transparent text-gray-500 border-gray-700'}`}>特效</button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-8 pl-12 font-serif text-lg text-gray-300 space-y-6 leading-relaxed tracking-wide custom-scrollbar" onMouseUp={handleTextSelection}>
                        {parsedScriptBlocks.map((block) => (
                            <div key={block.id} id={`script-block-${block.id}`} className={` ${block.type === 'scene-heading' ? 'font-bold text-white uppercase mb-8 border-b-2 border-gray-800 pb-2' : ''} ${block.type === 'character' ? 'text-center uppercase font-bold text-white mt-6' : ''} ${block.type === 'dialogue' ? `w-2/3 mx-auto text-left text-gray-200 p-4 rounded-lg border ${bTheme.card} ${bTheme.border}` : ''} ${block.type === 'action' ? 'text-justify' : ''} hover:bg-gray-800/30 p-2 -mx-2 rounded cursor-text transition-all duration-300 group relative ${activeShot && activeShot.referenceText && block.text.includes(activeShot.referenceText) ? `${tColor.activeBg} border-l-4 ${tColor.border} ${tColor.shadow} translate-x-1` : 'border-l-4 border-transparent'} `}>
                            {activeShot && activeShot.referenceText && block.text.includes(activeShot.referenceText) && <div className="absolute -left-10 top-2"><span className={`${tColor.bg} text-white text-[10px] font-black px-1.5 py-1 rounded shadow-md`}>SH</span></div>}
                            {renderBlockText(block.text)}
                            </div>
                        ))}
                        {parsedScriptBlocks.length === 0 && <div className="text-center text-gray-500 mt-20">{sysLang === 'zh' ? '请先在“剧本导入”模块中导入您的剧本文件' : 'Please import script first.'}</div>}
                    </div>
                    </div>
                    <div className={`w-[55%] flex flex-col ${bTheme.root}`} onClick={() => setSelectedShotId(null)}> 
                    <div className={`h-14 flex items-center justify-between px-6 border-b shrink-0 ${bTheme.card} ${bTheme.border}`} onClick={e => e.stopPropagation()}>
                        <div className="flex items-center gap-4"><button onClick={handleSelectAllShots} className={`text-gray-400 hover:${tColor.textLight} transition-colors`} title="全选未入库镜头">{selectedShotIds.size > 0 && selectedShotIds.size === shots.filter(s=>!s.inRepo).length ? <CheckSquare size={18}/> : <Square size={18}/>}</button><h2 className="text-sm font-semibold text-white flex items-center gap-2"><Camera size={16} className={tColor.text} /> 镜头清单 <span className={`text-xs px-2 py-0.5 rounded-full text-gray-400 ml-2 ${bTheme.panel}`}>{shots.length}</span></h2></div>

                        {selectedShotIds.size > 0 && <button onClick={handlePushToRepository} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold rounded bg-green-600 hover:bg-green-500 text-white animate-in zoom-in duration-200 shadow-[0_0_15px_rgba(22,163,74,0.4)]"><Send size={14} /> 推送入库 ({selectedShotIds.size})</button>}
                        <button onClick={() => setShowShotForm(!showShotForm)} className={`flex items-center gap-1 px-4 py-1.5 text-xs font-bold rounded transition-colors ${showShotForm ? 'bg-gray-800 text-white' : `${tColor.bg} ${tColor.bgHover} text-white`}`}>{showShotForm ? '取消添加' : <><Plus size={14} /> 新建镜头</>}</button>

                            <div><label className="block text-[10px] text-gray-500 mb-1 flex items-center gap-1"><Target size={12}/> 角度</label><select value={newShot.angle} onChange={(e) => setNewShot({...newShot, angle: e.target.value})} className={`w-full border rounded p-2 text-sm text-white outline-none focus:${tColor.border} ${bTheme.panel} ${bTheme.border}`}><option value="Eye Level">Eye Level (平视)</option><option value="High Angle">High Angle (俯视)</option><option value="Low Angle">Low Angle (仰视)</option><option value="Over Shoulder">OTS (过肩)</option></select></div>
                            <div><label className="block text-[10px] text-gray-500 mb-1 flex items-center gap-1"><Move size={12}/> 运镜</label><select value={newShot.movement} onChange={(e) => setNewShot({...newShot, movement: e.target.value})} className={`w-full border rounded p-2 text-sm text-white outline-none focus:${tColor.border} ${bTheme.panel} ${bTheme.border}`}><option value="Static">Static (固定)</option><option value="Pan">Pan (摇摄)</option><option value="Tilt">Tilt (俯仰)</option><option value="Dolly In">Dolly In (推)</option></select></div>
                            <div><label className="block text-[10px] text-gray-500 mb-1 flex items-center gap-1"><Video size={12}/> 焦段</label><input type="text" value={newShot.lens} onChange={(e) => setNewShot({...newShot, lens: e.target.value})} className={`w-full border rounded p-2 text-sm text-white outline-none focus:${tColor.border} ${bTheme.panel} ${bTheme.border}`} placeholder="e.g. 50mm" /></div>
                        </div>
                        <div className="mb-4"><label className="block text-[10px] text-gray-500 mb-1">画面描述 (选自原文: "{newShot.referenceText || '无'})"</label><textarea value={newShot.description} onChange={(e) => setNewShot({...newShot, description: e.target.value})} className={`w-full h-20 border rounded p-3 text-sm text-white outline-none resize-none focus:${tColor.border} ${bTheme.panel} ${bTheme.border}`} placeholder="描述这个镜头画面内发生的动作或构图重点..." /></div>
                        <div className="flex justify-end gap-3"><button onClick={() => setShowShotForm(false)} className="px-4 py-2 text-sm text-gray-400 hover:text-white">取消</button><button onClick={handleAddShot} className={`px-6 py-2 ${tColor.bg} ${tColor.bgHover} text-white font-bold rounded shadow-lg ${tColor.shadow}`}>保存镜头</button></div>
                        </div>
                    )}
                    <div className="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
                        {shots.length === 0 ? (
                        <div className="h-full flex flex-col items-center justify-center text-gray-600"><ImageIcon size={48} className="mb-4 opacity-20" /><p>暂无镜头，请在左侧划选文字提取分镜。</p></div>
                        ) : (
                        shots.map((shot, index) => (
                            <div key={shot.id} onClick={(e) => { e.stopPropagation(); setSelectedShotId(shot.id === selectedShotId ? null : shot.id); }} className={`border rounded-xl p-5 transition-all group cursor-pointer shadow-sm relative overflow-hidden ${selectedShotId === shot.id ? `${tColor.activeBg} ${tColor.border} ${tColor.ring} ring-1` : `${bTheme.card} bg-opacity-40 ${bTheme.border} hover:${tColor.border}`} ${shot.inRepo ? 'opacity-50 grayscale hover:grayscale-0' : ''}`}>
                            {shot.inRepo && <div className={`absolute top-0 right-0 text-gray-400 text-[9px] px-3 py-1 rounded-bl-lg font-black tracking-widest flex items-center gap-1 ${bTheme.panel}`}><Inbox size={10}/> 已入库</div>}

                                <div className="flex items-start gap-4">

                            ) : (
                                <table className="w-full text-left border-collapse text-sm">
                                <thead><tr className={`border-b text-[10px] text-gray-400 uppercase tracking-wider ${bTheme.card} ${bTheme.border}`}><th className="py-3 px-5 font-bold">Take</th><th className="py-3 px-5 font-bold">Status</th><th className={`py-3 px-5 font-bold border-l ${bTheme.border}`}>{camNames.A}</th><th className={`py-3 px-5 font-bold border-l ${bTheme.border}`}>{camNames.B}</th><th className={`py-3 px-5 font-bold border-l ${bTheme.border}`}>{camNames.C}</th></tr></thead>
                                <tbody className={`divide-y ${bTheme.border}`}>
                                    {activeLogState.history.map(tk => (
                                    <tr key={tk.id} className={`hover:${bTheme.card} transition-colors`}>
                                        <td className="py-4 px-5 font-mono text-lg font-black text-white">{String(tk.takeNum).padStart(2,'0')}</td>
                                        <td className="py-4 px-5">
                                        {tk.status === 'CIRCLE' ? <span className="text-emerald-500 font-black uppercase text-xs flex items-center gap-1.5 bg-emerald-500/10 px-2 py-1 rounded w-max"><div className="w-2 h-2 rounded-full border-2 border-emerald-500"></div> CIRCLE</span> : <span className="text-red-500 font-bold uppercase text-xs flex items-center gap-1 line-through bg-red-500/10 px-2 py-1 rounded w-max"><XCircle size={12}/> NG</span>}
                                        </td>
                                        {['A', 'B', 'C'].map(c => (
                                        <td key={`${tk.id}-${c}`} className={`py-3 px-5 border-l align-top ${bTheme.border}`}>
                                            {tk.cams[c].clip ? (
                                            <div className="space-y-1"><div className={`font-mono text-xs ${tColor.textLight} break-all bg-black/40 p-1.5 rounded`}>{tk.cams[c].clip}</div><div className="flex gap-2 text-[9px] text-gray-500 font-bold uppercase"><span>R: {tk.cams[c].roll || '-'}</span> <span>L: {tk.cams[c].lens || '-'}</span></div>{tk.cams[c].note && <div className={`text-[10px] text-gray-400 italic leading-snug mt-1 border-l-2 pl-1.5 ${bTheme.border}`}>{tk.cams[c].note}</div>}</div>
                                            ) : <span className="text-gray-700 text-xs italic">-</span>}
                                        </td>
                                        ))}
                                    </tr>
                                    ))}
                                </tbody>
                                </table>
                            )}
                            </div>

                            <div className="flex justify-end pb-12">
                            <button onClick={() => toggleShotCompletion(activeShot.id)} className={`px-8 py-4 rounded-xl font-black uppercase tracking-widest text-sm flex items-center gap-2 transition-all ${activeShot.status === 'completed' ? `text-gray-400 border ${bTheme.card} ${bTheme.border}` : `${tColor.bg} ${tColor.bgHover} text-white ${tColor.shadow}`}`}>
                                {activeShot.status === 'completed' ? '撤销杀青 (Undo Wrap)' : <><CheckCircle size={18}/> 确认此镜头完成 (Wrap Shot)</>}
                            </button>
                            </div>
                        </div>
                        ) : (
                        <div className="h-full flex flex-col items-center justify-center text-gray-600"><Clapperboard size={64} className="mb-4 opacity-20" /><p className="text-sm font-bold">请在左侧选择要执行的镜头</p></div>
                        )}
                    </div>
                    </div>
                </div>
                );
            };

            const renderActiveModule = () => {
                switch(activeModule) {
                case 'project-setup': return renderProjectSetup();
                case 'dashboard': return renderDashboardWorkspace();
                case 'script': return renderScriptModule(); 
                case 'breakdown': return renderBreakdownWorkspace();
                case 'repository': return renderRepositoryWorkspace();
                case 'schedule': return renderRepositoryWorkspace(); 
                case 'execution': return renderExecutionWorkspace();
                default: return <div className="flex-1 flex items-center justify-center text-gray-500 bg-[#0B0F19]">模块加载异常</div>;
                }
            };

            if (showSplash) {
                return (
                <div className="flex h-screen w-full items-center justify-center bg-[#020617] overflow-hidden relative font-sans">
                    <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-cyan-900/20 via-black to-black"></div>
                    <div className="z-10 flex flex-col items-center animate-in fade-in zoom-in-95 duration-1000">
                    <div className="w-24 h-24 bg-gray-900 border-2 border-gray-800 rounded-[2rem] flex items-center justify-center shadow-2xl mb-8 relative overflow-hidden group">
                        <div className="absolute inset-0 bg-cyan-500/10 animate-pulse"></div>
                        <Clapperboard size={48} className="text-cyan-500 drop-shadow-[0_0_15px_rgba(6,182,212,0.5)]" />
                    </div>
                    <h1 className="text-5xl md:text-7xl font-black text-white tracking-tighter mb-4 flex items-center">
                        <span className="text-gray-300 font-serif tracking-[0.2em] mr-6 text-4xl md:text-5xl">寰影</span>
                        CineFlow<span className="text-cyan-500 ml-1">Pro</span>
                    </h1>
                    <div className="flex items-center gap-4 mt-2">
                        <span className="text-xs md:text-sm font-mono text-gray-400 tracking-[0.4em] uppercase">Digital Production OS</span>
                        <span className="px-2 py-0.5 bg-cyan-500/10 text-cyan-400 text-[10px] font-black rounded border border-cyan-500/30">v1.0</span>
                    </div>
                    <div className="w-64 h-1 bg-gray-800 rounded-full mt-16 overflow-hidden relative">
                        <div className="absolute top-0 left-0 h-full bg-cyan-500 shadow-[0_0_10px_rgba(6,182,212,0.8)] animate-[loading_2.5s_ease-in-out_forwards]"></div>
                    </div>
                    <div className="mt-4 text-[9px] font-mono text-gray-600 uppercase tracking-widest animate-pulse">
                        Initializing Pipeline Engine...
                    </div>
                    </div>
                </div>
                );
            }

            return (
                <div className={`flex h-screen w-full font-sans text-gray-100 overflow-hidden ${bTheme.root}`}>
                    {renderSidebar()}
                    <div className="flex-1 flex flex-col h-full min-w-0">
                        {renderHeader()}
                        {renderActiveModule()}
                    </div>
                    {renderSystemSettingsModal()}
                    {renderModal()}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
