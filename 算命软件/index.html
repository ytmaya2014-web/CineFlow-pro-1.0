<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="算命">
<meta name="theme-color" content="#0a0a1a">
<title>命镜 — 命理随身</title>
<title>命镜 — 星辰为镜，照见本心</title>
<style>
/* ═══════════════════════════════════════════════════════════════════
   ASTRAL GRIMOIRE · 暗黑魔典美学
   ═══════════════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Noto+Serif+SC:wght@300;400;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── 星云底色 ── */
  --void-deep: #06050f;
  --void: #0c0a1a;
  --void-mid: #120f28;
  --nebula-purple: #1a1240;
  --nebula-indigo: #14183a;

  /* ── 魔法金 ── */
  --gold: #d4a843;
  --gold-bright: #f0cc6e;
  --gold-pale: #c8a45c;
  --gold-glow: rgba(212, 168, 67, 0.35);
  --gold-ghost: rgba(212, 168, 67, 0.08);

  /* ── 星尘 ── */
  --stardust: #e8def8;
  --stardust-dim: #a099c0;
  --stardust-muted: #6b6388;

  /* ── 魔法光泽 ── */
  --surface: rgba(255, 255, 255, 0.04);
  --surface-hover: rgba(255, 255, 255, 0.08);
  --surface-gold: rgba(212, 168, 67, 0.06);
  --surface-gold-hover: rgba(212, 168, 67, 0.12);

  /* ── 魔法元素色 ── */
  --arcane: #a78bfa;
  --arcane-bright: #c4b5fd;
  --arcane-glow: rgba(167, 139, 250, 0.3);
  --rose: #e85d75;
  --rose-light: #f493a8;
  --rose-glow: rgba(232, 93, 117, 0.25);
  --red: #e85d75;              /* alias for inline compat */
  --emerald: #34d399;
  --emerald-light: #6ee7b7;
  --emerald-glow: rgba(52, 211, 153, 0.2);
  --sapphire: #60a5fa;
  --sapphire-glow: rgba(96, 165, 250, 0.2);

  /* ── 边框 ── */
  --border: rgba(255, 255, 255, 0.06);
  --border-gold: rgba(212, 168, 67, 0.18);
  --border-focus: rgba(212, 168, 67, 0.5);

  /* ── 形状 ── */
  --radius-sm: 10px;
  --radius: 16px;
  --radius-lg: 20px;
  --radius-xl: 24px;

  /* ── 阴影 ── */
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
  --shadow: 0 4px 20px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
  --shadow-gold: 0 4px 24px rgba(212, 168, 67, 0.15);

  --nav-height: 68px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --font-display: 'Cinzel Decorative', 'Noto Serif SC', serif;
  --font-body: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
  --font-mono: 'SF Mono', 'Cascadia Code', monospace;
  --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-magic: 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
}

/* ── 暗黑星云底 ── */
html, body {
  height: 100%;
  overflow: hidden;
}
body {
  font-family: var(--font-body);
  background: var(--void-deep);
  color: var(--stardust);
  -webkit-font-smoothing: antialiased;
  display: flex;
  justify-content: center;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* 星云层 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 25% 0%, rgba(167, 139, 250, 0.13) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 75% 15%, rgba(212, 168, 67, 0.08) 0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 30% 70%, rgba(96, 165, 250, 0.07) 0%, transparent 55%),
    radial-gradient(ellipse 40% 25% at 70% 85%, rgba(232, 93, 117, 0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
  animation: nebulaDrift 30s ease-in-out infinite alternate;
}
@keyframes nebulaDrift {
  0% { opacity: 0.7; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.05); }
}

/* 魔法粒子 */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 12% 8%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 23% 18%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1.5px 1.5px at 45% 12%, rgba(212,168,67,0.5), transparent),
    radial-gradient(1px 1px at 67% 22%, rgba(255,255,255,0.35), transparent),
    radial-gradient(1.5px 1.5px at 78% 7%, rgba(167,139,250,0.45), transparent),
    radial-gradient(1px 1px at 8% 35%, rgba(212,168,67,0.4), transparent),
    radial-gradient(1px 1px at 34% 42%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1.5px 1.5px at 55% 38%, rgba(96,165,250,0.4), transparent),
    radial-gradient(1px 1px at 82% 45%, rgba(255,255,255,0.35), transparent),
    radial-gradient(1px 1px at 15% 62%, rgba(232,93,117,0.3), transparent),
    radial-gradient(1.5px 1.5px at 42% 68%, rgba(212,168,67,0.4), transparent),
    radial-gradient(1px 1px at 63% 72%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 88% 65%, rgba(167,139,250,0.35), transparent),
    radial-gradient(1.5px 1.5px at 28% 85%, rgba(52,211,153,0.3), transparent),
    radial-gradient(1px 1px at 52% 88%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 73% 82%, rgba(212,168,67,0.35), transparent),
    radial-gradient(1.5px 1.5px at 92% 88%, rgba(255,255,255,0.3), transparent);
  background-size: 200% 200%;
  pointer-events: none;
  z-index: 0;
  animation: starTwinkle 8s ease-in-out infinite alternate;
}
@keyframes starTwinkle {
  0% { opacity: 0.5; background-position: 0% 0%; }
  50% { opacity: 0.9; }
  100% { opacity: 0.6; background-position: 100% 100%; }
}

#app {
  width: 100%;
  max-width: 480px;
  height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  z-index: 1;
}

/* ═══════════════════════════════════════════════════════════════════
   TAB PANELS
   ═══════════════════════════════════════════════════════════════════ */
.tab-panel {
  position: absolute;
  inset: 0;
  top: 0;
  bottom: var(--nav-height);
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 16px;
  padding-bottom: calc(20px + var(--safe-bottom));
  display: none;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
.tab-panel.active { display: block; animation: tabReveal 0.5s var(--ease-magic); }
@keyframes tabReveal {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.tab-panel::-webkit-scrollbar { width: 3px; }
.tab-panel::-webkit-scrollbar-track { background: transparent; }
.tab-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }

/* ═══════════════════════════════════════════════════════════════════
   PAGE HEADER
   ═══════════════════════════════════════════════════════════════════ */
.page-header {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.04em;
  margin-bottom: 18px;
  text-align: center;
  background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold-pale) 60%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
}
.page-header::after {
  content: '';
  display: block;
  width: 40px;
  height: 2px;
  margin: 10px auto 0;
  background: linear-gradient(90deg, transparent, var(--gold-glow), var(--gold), var(--gold-glow), transparent);
  border-radius: 1px;
}

/* ═══════════════════════════════════════════════════════════════════
   CARDS — 魔法卡片
   ═══════════════════════════════════════════════════════════════════ */
.card {
  background: linear-gradient(160deg, var(--surface) 0%, rgba(255,255,255,0.02) 50%, var(--surface) 100%);
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-bottom: 14px;
  border: 1px solid var(--border);
  position: relative;
  transition: all 0.4s var(--ease-magic);
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(135deg, rgba(212,168,67,0.12), transparent 40%, transparent 60%, rgba(212,168,67,0.08));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}
.card-header {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: var(--gold-pale);
  margin-bottom: 12px;
}

/* ═══════════════════════════════════════════════════════════════════
   FORMS
   ═══════════════════════════════════════════════════════════════════ */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--stardust-dim);
  margin-bottom: 6px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.form-input, select.form-input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--stardust);
  font-size: 15px;
  font-family: var(--font-body);
  outline: none;
  transition: all 0.3s;
}
.form-input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--gold-ghost), 0 0 20px var(--gold-ghost);
  background: rgba(255,255,255,0.06);
}
.form-input::placeholder { color: var(--stardust-muted); }

/* ═══════════════════════════════════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.3s var(--ease-magic);
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.4s;
}
.btn:active::after { opacity: 1; }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg, #8b6914 0%, #b8942e 30%, #d4a843 50%, #b8942e 70%, #8b6914 100%);
  background-size: 200% auto;
  color: #1a1000;
  font-weight: 700;
  letter-spacing: 0.02em;
  box-shadow: 0 4px 20px rgba(180, 140, 50, 0.25), inset 0 1px 0 rgba(255,255,255,0.15);
  animation: goldShimmer 4s linear infinite;
}
@keyframes goldShimmer {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}
.btn-primary:active { box-shadow: 0 2px 10px rgba(180, 140, 50, 0.3); }

.btn-secondary {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--stardust-dim);
}
.btn-secondary:active { background: var(--surface-hover); }

.btn-small {
  padding: 9px 18px;
  font-size: 13px;
  width: auto;
  border-radius: 100px;
  font-weight: 500;
  letter-spacing: 0.02em;
}

.btn-danger {
  background: rgba(232, 93, 117, 0.08);
  color: var(--rose-light);
  border: 1px solid rgba(232, 93, 117, 0.15);
}
.btn-danger:active { background: rgba(232, 93, 117, 0.15); }

/* ═══════════════════════════════════════════════════════════════════
   GENDER TOGGLE
   ═══════════════════════════════════════════════════════════════════ */
.gender-toggle { display: flex; gap: 10px; }
.gender-btn {
  flex: 1;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--stardust-dim);
  font-size: 15px;
  font-weight: 500;
  font-family: var(--font-body);
  cursor: pointer;
  text-align: center;
  transition: all 0.3s;
}
.gender-btn.selected {
  background: var(--surface-gold);
  border-color: var(--gold);
  color: var(--gold-bright);
  box-shadow: 0 0 24px var(--gold-ghost);
}

/* ═══════════════════════════════════════════════════════════════════
   CHECKBOX
   ═══════════════════════════════════════════════════════════════════ */
.checkbox-row { display: flex; align-items: center; gap: 10px; margin-top: -6px; margin-bottom: 16px; }
.checkbox-row input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--gold); }
.checkbox-row label { font-size: 13px; color: var(--stardust-dim); }

/* ═══════════════════════════════════════════════════════════════════
   PROFILE CARDS
   ═══════════════════════════════════════════════════════════════════ */
.profile-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(135deg, var(--surface), rgba(255,255,255,0.02));
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.3s var(--ease-magic);
  position: relative;
}
.profile-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, var(--gold-ghost), transparent 60%);
  opacity: 0;
  transition: opacity 0.4s;
}
.profile-card:hover::before { opacity: 1; }
.profile-card.active-profile {
  border-color: var(--gold);
  box-shadow: 0 0 30px var(--gold-ghost), inset 0 0 20px var(--gold-ghost);
}
.profile-card:active { transform: scale(0.98); }
.profile-info { flex: 1; }
.profile-name { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--stardust); letter-spacing: 0.02em; }
.profile-detail { font-size: 13px; color: var(--stardust-dim); margin-top: 3px; }
.profile-actions { display: flex; gap: 6px; }

/* ═══════════════════════════════════════════════════════════════════
   DAY CARDS
   ═══════════════════════════════════════════════════════════════════ */
.day-card {
  background: linear-gradient(135deg, var(--surface), rgba(255,255,255,0.02));
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--emerald);
  transition: all 0.3s;
}
.day-card.avoid { border-left-color: var(--rose); }
.day-date { font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--gold-pale); }
.day-reason { font-size: 13px; color: var(--stardust-dim); margin-top: 4px; line-height: 1.6; }

/* ═══════════════════════════════════════════════════════════════════
   DATE DISPLAY
   ═══════════════════════════════════════════════════════════════════ */
.date-display {
  font-size: 13px;
  color: var(--stardust-dim);
  margin-bottom: 16px;
  padding: 11px 16px;
  background: var(--surface);
  border-radius: var(--radius-sm);
  text-align: center;
  border: 1px solid var(--border);
  letter-spacing: 0.02em;
}

/* ═══════════════════════════════════════════════════════════════════
   EMPTY STATE
   ═══════════════════════════════════════════════════════════════════ */
.empty-state {
  text-align: center;
  padding: 56px 20px;
  color: var(--stardust-muted);
}
.empty-state .empty-icon { font-size: 64px; margin-bottom: 18px; opacity: 0.6; animation: iconPulse 3s ease-in-out infinite; }
@keyframes iconPulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.06); opacity: 0.7; }
}
.empty-state p { font-size: 15px; line-height: 1.8; color: var(--stardust-dim); }

/* ═══════════════════════════════════════════════════════════════════
   LOADING SPINNER — 魔法罗盘
   ═══════════════════════════════════════════════════════════════════ */
.loading-spinner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 40px 20px;
  color: var(--stardust-dim);
  font-size: 14px;
}
.spinner {
  width: 44px; height: 44px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-right-color: var(--gold);
  border-radius: 50%;
  animation: spin 1.2s linear infinite, spinnerGlow 2s ease-in-out infinite;
  box-shadow: 0 0 16px var(--gold-glow);
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes spinnerGlow {
  0%, 100% { box-shadow: 0 0 12px var(--gold-glow); }
  50% { box-shadow: 0 0 28px var(--gold-glow), 0 0 48px rgba(212,168,67,0.1); }
}

/* ═══════════════════════════════════════════════════════════════════
   MODAL — 魔法卷轴展开
   ═══════════════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(2, 2, 10, 0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-sheet {
  background: linear-gradient(180deg, #1a1545 0%, #100e2e 100%);
  width: 100%;
  max-width: 480px;
  border-radius: 24px 24px 0 0;
  padding: 27px 18px;
  padding-bottom: calc(27px + var(--safe-bottom));
  max-height: 90vh;
  overflow-y: auto;
  animation: scrollUnfurl 0.45s var(--ease-magic);
  border-top: 1px solid var(--border-gold);
  box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
}
@keyframes scrollUnfurl {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  text-align: center;
  letter-spacing: 0.04em;
  background: linear-gradient(180deg, var(--gold-bright), var(--gold-pale));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ═══════════════════════════════════════════════════════════════════
   NAVIGATION — 魔法罗盘底栏
   ═══════════════════════════════════════════════════════════════════ */
#bottom-nav {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  z-index: 50;
  padding: 0 8px 6px;
  background: linear-gradient(0deg, rgba(6,5,15,0.95) 0%, rgba(6,5,15,0.85) 70%, transparent 100%);
  padding-bottom: calc(6px + var(--safe-bottom));
}
#bottom-nav nav {
  display: flex;
  gap: 0;
  background: rgba(255,255,255,0.03);
  border-radius: 100px;
  padding: 4px;
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}
.nav-btn {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 8px 4px 6px;
  background: transparent;
  border: none;
  border-radius: 100px;
  color: var(--stardust-muted);
  font-size: 10px;
  font-weight: 500;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.3s var(--ease-magic);
  letter-spacing: 0.02em;
  position: relative;
}
.nav-btn .nav-icon { font-size: 19px; transition: transform 0.3s; }
.nav-btn.active {
  color: var(--gold-bright);
  background: var(--surface-gold);
  box-shadow: 0 0 16px var(--gold-ghost);
}
.nav-btn.active .nav-icon { transform: scale(1.1); }
.nav-btn:active { transform: scale(0.95); }

/* ═══════════════════════════════════════════════════════════════════
   QUICK-ASK BUTTONS — 胶囊卡片网格
   ═══════════════════════════════════════════════════════════════════ */
.quick-asks {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin: 12px 0;
}
.quick-asks.rows-3 { grid-template-columns: repeat(3, 1fr); }
.quick-ask-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 12px 10px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--stardust-dim);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.25s var(--ease-magic);
  letter-spacing: 0.02em;
  line-height: 1.4;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.quick-ask-btn:hover { background: var(--surface-hover); transform: translateY(-1px); }
.quick-ask-btn:active { transform: scale(0.96); }
.quick-ask-btn.accent { border-color: rgba(232,93,117,0.25); color: var(--rose-light); background: rgba(232,93,117,0.06); }
.quick-ask-btn.primary { border-color: var(--border-gold); color: var(--gold-bright); background: var(--surface-gold); }
.quick-ask-btn.feature { border-color: var(--border-gold); color: var(--gold-pale); background: var(--surface-gold); }

/* ═══════════════════════════════════════════════════════════════════
   CHAT BUBBLES — 段间距 + 时间戳 + 双色
   ═══════════════════════════════════════════════════════════════════ */
.chat-bubble {
  max-width: 88%;
  padding: 15px 18px 13px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.85;
  word-break: break-word;
  position: relative;
  animation: bubbleIn 0.4s var(--ease-magic);
}
.chat-bubble p, .chat-bubble div:not(.chat-time) { margin-bottom: 0.5rem; }
.chat-bubble .chat-time {
  display: block;
  font-size: 10px;
  color: var(--stardust-muted);
  margin-top: 6px;
  opacity: 0.6;
}
.chat-bubble.system {
  max-width: 100%;
  text-align: center;
  background: transparent;
  border: none;
  color: var(--stardust-dim);
  font-size: 13px;
  padding: 8px 14px;
}
/* Bubble inner formatting */
.chat-bubble p { margin-bottom: 0.6rem; }
.chat-bubble p:last-child { margin-bottom: 0; }
.chat-bubble .bubble-h2 {
  font-weight: 700;
  font-size: 14px;
  color: var(--gold-bright);
  margin-top: 0.4rem;
  margin-bottom: 0.3rem;
  letter-spacing: 0.02em;
}
.chat-bubble strong {
  font-weight: 700;
  color: var(--gold-bright);
  letter-spacing: 0.02em;
}
.chat-bubble.ai {
  align-self: flex-start;
  background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
  border: 1px solid var(--border);
}
.chat-bubble.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #3d2e0f 0%, #5a4215 50%, #4a3510 100%) !important;
  border: 1px solid rgba(212,168,67,0.15);
  color: var(--stardust);
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.chat-bubble.typing::after {
  content: '✦';
  display: inline-block;
  animation: sparkFloat 0.8s ease-in-out infinite;
  margin-left: 4px;
  color: var(--gold);
}
@keyframes sparkFloat {
  0%, 100% { opacity: 0.3; transform: translateY(0); }
  50% { opacity: 1; transform: translateY(-3px); }
}

/* ═══════════════════════════════════════════════════════════════════
   CHAT CONTAINER — 气泡容器
   ═══════════════════════════════════════════════════════════════════ */
.chat-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 80px;
}

@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(8px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.chat-bubble:nth-child(1) { animation-delay: 0s; }
.chat-bubble:nth-child(2) { animation-delay: 0.05s; }
.chat-bubble:nth-child(3) { animation-delay: 0.1s; }
.chat-bubble:nth-child(4) { animation-delay: 0.15s; }
.chat-bubble:nth-child(5) { animation-delay: 0.2s; }

/* ═══════════════════════════════════════════════════════════════════
   CHAT INPUT BAR
   ═══════════════════════════════════════════════════════════════════ */
#chat-input-bar, #crystal-input-bar {
  position: fixed;
  bottom: calc(var(--nav-height) + var(--safe-bottom) - 4px);
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  z-index: 80;
  padding: 6px 12px;
  pointer-events: none;
}
#chat-input-bar > div, #crystal-input-bar > div {
  width: 100%;
  max-width: 480px;
  display: flex;
  gap: 8px;
  align-items: center;
  pointer-events: auto;
}
#chat-input, #crystal-search {
  flex: 1;
  padding: 14px 18px;
  background: rgba(20, 16, 45, 0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--stardust);
  font-size: 15px;
  font-family: var(--font-body);
  outline: none;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  transition: all 0.3s;
}
#chat-input:focus, #crystal-search:focus {
  border-color: var(--border-focus);
  box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 0 3px var(--gold-ghost), 0 0 32px var(--gold-ghost);
}
#chat-input::placeholder, #crystal-search::placeholder { color: var(--stardust-muted); }

#chat-send-btn {
  flex-shrink: 0;
  width: 46px; height: 46px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #8b6914, #d4a843);
  color: #1a1000;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px var(--gold-glow);
  transition: all 0.3s;
}
#chat-send-btn:active { transform: scale(0.9); }
#chat-send-btn:disabled { opacity: 0.2; pointer-events: none; }

#chat-hepan-btn, #chat-clear-btn {
  flex-shrink: 0;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  color: var(--stardust-dim);
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
#chat-hepan-btn:active, #chat-clear-btn:active { transform: scale(0.92); }

/* ═══════════════════════════════════════════════════════════════════
   PRIVACY NOTE
   ═══════════════════════════════════════════════════════════════════ */
.privacy-note {
  font-size: 12px;
  color: var(--stardust-muted);
  text-align: center;
  margin-top: 12px;
}

/* ═══════════════════════════════════════════════════════════════════
   MOBILE REFINEMENTS
   ═══════════════════════════════════════════════════════════════════ */
@media (max-width: 380px) {
  .nav-btn { font-size: 9px; }
  .nav-btn .nav-icon { font-size: 17px; }
  .chat-bubble { max-width: 92%; font-size: 13px; }
}

<script>
/* ── 全局配置：DeepSeek 接口 & API Key 读取 ── */
const API_URL = 'https://api.deepseek.com/chat/completions';
function getApiKey() {
  return localStorage.getItem('deepseek_api_key') || '';
}

/* ══════════════════════════════════════════════════════════════════
   SYSTEM PROMPT — 每次调用实时注入当前时间
   ══════════════════════════════════════════════════════════════════ */
function buildSystemPrompt(type) {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  const weekdays = ['星期天','星期一','星期二','星期三','星期四','星期五','星期六'];
  const wd = weekdays[now.getDay()];
  const seasons = ['冬季','冬季','春季','春季','春季','夏季','夏季','夏季','秋季','秋季','秋季','冬季'];
  const season = seasons[now.getMonth()];
  const dateStr = y + '年' + m + '月' + d + '日 ' + wd;
  const monthStr = y + '年' + m + '月';

  const full = '你是命理师。当前' + dateStr + '，' + season + '，' + y + '年。' +
    '命盘已由本地引擎精确计算，你只需用大白话向用户解读——不需要自己排盘。' +

/* ══════════════════════════════════════════════════════════════════
   PROFILES MANAGER (localStorage)
   ══════════════════════════════════════════════════════════════════ */
const STORAGE_KEY = 'fortune_profiles';

const Profiles = {
  getAll() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  },
  saveAll(profiles) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles));
  },
  getActive() {
    return this.getAll().find(p => p.isDefault) || null;
  },
  getById(id) {
    return this.getAll().find(p => p.id === id);
  },
  save(profile) {
    const profiles = this.getAll();
    const idx = profiles.findIndex(p => p.id === profile.id);
    if (idx >= 0) profiles[idx] = profile;
    else profiles.push(profile);
    this.saveAll(profiles);
  },
  delete(id) {
    const profiles = this.getAll().filter(p => p.id !== id);
    if (profiles.length > 0 && !profiles.some(p => p.isDefault)) {
      profiles[0].isDefault = true;
    }
    this.saveAll(profiles);
  },
  setActive(id) {
    const profiles = this.getAll();
    profiles.forEach(p => { p.isDefault = (p.id === id); });
    this.saveAll(profiles);
  },
  // 排盘缓存
  cacheReading(id, bazi, dayMaster, dayMasterElement, fullText) {
    const profiles = this.getAll();
    const p = profiles.find(p => p.id === id);
    if (p) {
      p.lastReading = { timestamp: Date.now(), fullText, bazi, dayMaster, dayMasterElement };
      this.saveAll(profiles);
    }
  },
  // 日运缓存
  getDailyCache(id, date) {
    const p = this.getById(id);
    return p?.dailyCache?.date === date ? p.dailyCache.text : null;
  },
  setDailyCache(id, date, text) {
    const profiles = this.getAll();
    const p = profiles.find(p => p.id === id);
    if (p) { p.dailyCache = { date, text }; this.saveAll(profiles); }
  },
  // 月运缓存
  getMonthlyCache(id, month) {
    const p = this.getById(id);
    return p?.monthlyCache?.month === month ? p.monthlyCache.text : null;
  },
  setMonthlyCache(id, month, text) {
    const profiles = this.getAll();
    const p = profiles.find(p => p.id === id);
    if (p) { p.monthlyCache = { month, text }; this.saveAll(profiles); }
  },
  // 提取八字摘要
  getBaziSummary(profile) {
    return profile?.lastReading?.bazi || null;
  },
  getDayMaster(profile) {
    return profile?.lastReading?.dayMaster || null;
  }
};

/* ══════════════════════════════════════════════════════════════════
   STREAMING HELPER — 直接调 DeepSeek
   ══════════════════════════════════════════════════════════════════ */
let _scrollRAF = null;
function scheduleScrollToBottom() {
  if (_scrollRAF) return;
  _scrollRAF = requestAnimationFrame(() => {
    _scrollRAF = null;
    const panel = document.querySelector('.tab-panel.active');
    if (panel) panel.scrollTop = panel.scrollHeight;
  });
}

async function streamFetch(type, body, targetEl, { onDone, onError } = {}) {
  const key = getApiKey();
  if (!key) {
    const errBubble = createBubble('⚠️ 还没设置 DeepSeek API Key，去👤档案页下方设置一下', true);
    if (targetEl) targetEl.appendChild(errBubble);
    if (onError) onError('未设置 API Key');
    return;
  }

  try {
    const messages = [
      { role: 'system', content: buildSystemPrompt(type) },
      { role: 'user', content: buildUserPrompt(type, body) }
    ];

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages,
        temperature: 0.7,
        max_tokens: type === 'full' ? 2048 : 1024,
        stream: true
      })
    });

    if (!res.ok) {
      const err = await res.text();
      let msg = '请求出错了';
      if (res.status === 401) msg = 'API Key 无效，去👤档案页检查一下';
      else if (res.status === 402) msg = 'DeepSeek 余额不足了';
      throw new Error(msg);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let bubble = null;

    function flushBubble() {
      if (bubble && targetEl) {
        bubble.classList.remove('typing');
        targetEl.appendChild(bubble);
        bubble = null;
      }
    }

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const jsonStr = line.slice(6).trim();
        if (jsonStr === '[DONE]') continue;
        try {
          const data = JSON.parse(jsonStr);
          const content = data.choices?.[0]?.delta?.content;
          if (content) {
            if (!bubble) {
              bubble = createBubble('', false, true);
              if (targetEl) targetEl.appendChild(bubble);
            }
            // Accumulate raw text, then re-render bubble innerHTML for formatting
            bubble._rawText = (bubble._rawText || '') + content;
            // Render formatted HTML
            let html = bubble._rawText;
            // Escape + format
            const escaped = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const withBold = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            const paragraphs = withBold.split(/\n{2,}/);
            const rendered = paragraphs.map(p => {
              const trimmed = p.trim();
              if (!trimmed) return '';
              if (/^#\s/.test(trimmed)) return '<div class="bubble-h2">' + trimmed.replace(/^#\s+/, '') + '</div>';
              const lines = trimmed.split('\n');
              const formatted = lines.map(line => {
                const t = line.trim();
                if (/^(性格|事业|感情|健康|财运|运势|未来|水晶|整体|总结|注意|建议|推荐|命盘|八字|日主|大运|流年|姓名|职业|评分|匹配|年度|月份|今日|本月|适合|避免|宜|忌)/.test(t)) return '<div class="bubble-h2">' + t + '</div>';
                if (/^[📿☀️🌙📅💬👤💎⚙️🔮❤️💼📊🏠📝🔑✅⚠️🔄💰✨💎🌟]/.test(t)) return '<div class="bubble-h2">' + t + '</div>';
                return t;
              }).join('<br>');
              return '<p>' + formatted + '</p>';
            }).filter(Boolean).join('');
            // Preserve time span, replace content
            const timeSpan = bubble.querySelector('.chat-time');
            bubble.innerHTML = rendered;
            if (timeSpan) bubble.appendChild(timeSpan);
            scheduleScrollToBottom();
          }
        } catch (e) { /* skip incomplete line */ }
      }
    }
    flushBubble();
    if (onDone) onDone();
  } catch (err) {
    const errBubble = createBubble('⚠️ ' + (err.message || '网络出了点问题，稍等再试试'), true);
    if (targetEl) targetEl.appendChild(errBubble);
    if (onError) onError(err.message);
  }
}

function createBubble(text, role = 'ai', isTyping = false) {
  const div = document.createElement('div');
  div.className = 'chat-bubble ' + role + (isTyping ? ' typing' : '');
  // Add timestamp
  const time = document.createElement('span');
  time.className = 'chat-time';
  time.textContent = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

  // Smart formatting: \n\n → paragraph break, **text** → bold heading, single \n → <br>
  let html = '';
  if (text) {
    // Escape HTML first
    const escaped = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    // **bold** markers
    const withBold = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Split by double newline → paragraphs
    const paragraphs = withBold.split(/\n{2,}/);
    html = paragraphs
      .map(p => {
        const trimmed = p.trim();
        if (!trimmed) return '';
        // Lines starting with # (like # 性格) become headings
        if (/^#\s/.test(trimmed)) {
          return '<div class="bubble-h2">' + trimmed.replace(/^#\s+/, '') + '</div>';
        }
        // Lines ending with ：or : become subheadings
        const lines = trimmed.split('\n');
        const formatted = lines.map(line => {
          const t = line.trim();
          if (/^(性格|事业|感情|健康|财运|运势|未来|水晶|整体|总结|注意|建议|推荐|命盘|八字|日主|大运|流年|姓名|职业|评分|匹配|年度|月份|今日|本月|适合|避免|宜|忌)/.test(t)) {
            return '<div class="bubble-h2">' + t + '</div>';
          }
          if (/^[📿☀️🌙📅💬👤💎⚙️🔮❤️💼📊🏠📝🔑✅⚠️🔄💰✨💎🌟]/.test(t)) {
            return '<div class="bubble-h2">' + t + '</div>';
          }
          return t;
        }).join('<br>');
        return '<p>' + formatted + '</p>';
      })
      .filter(Boolean)
      .join('');
  }
  div.innerHTML = html;
  div.appendChild(time);
  return div;
}

/* ══════════════════════════════════════════════════════════════════

function buildUserPrompt(type, body) {

  const timeNote = timeUnknown ? '（时辰不确定，按中午12点推的，可能有偏差）' : '';

  switch (type) {
    case 'full':
      return `请帮我排盘：
出生日期：${birthDate || '未提供'}（阳历。注意：月份是${birthDate ? birthDate.split('-')[1] + '月' : '未知'}）
出生时间：${birthTime || '12:00'}${timeNote}
出生地点：${birthPlace || '未提供'}
性别：${gender || '未提供'}
${name ? '称呼：' + name : ''}

请按顺序来：整体印象→性格→事业财运→感情家庭→未来一年注意→水晶推荐→温暖收尾。像讲故事不要列条列点。输出八字四柱（格式"甲子 丙寅 戊辰 丁巳"）方便后续查询。`;

    case 'daily':
      return `用户的八字：${bazi || '未知'}。今天${new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}。请推今日运势，4-5句话。`;

    case 'daily_lucky':
      return `用户的八字：${bazi || '未知'}。今天${new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}。请做今日宜忌分析：【适合做的事】3-5件+【最好别做的事】2-3件。`;

    case 'monthly':
      return `用户的八字：${bazi || '未知'}。当前${new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long'})}。请推本月运势，4-6句话。`;

    case 'luckydays':
      return `用户的八字：${bazi || '未知'}。想选"${activity || '出行'}"的吉日，范围${dateFrom || '今天'}到${dateTo || '30天后'}。请逐一检视，给3-5个推荐日和1-2个避开日。`;

    case 'chat':
      return body.question || '';

    default:
      return body.question || '';
  }
}

async function doFullReading() {
  const profile = Profiles.getActive();
  if (!profile) return;

  const panel = document.getElementById('panel-fortune');
  panel.innerHTML = '<div class="page-header">📿 正在排盘</div><div class="loading-spinner"><div class="spinner"></div>正在仔细推演你的命盘…</div><div class="chat-container" id="fortune-chat"></div>';

  const chat = document.getElementById('fortune-chat');
  // Small delay so user sees the spinner
  await new Promise(r => setTimeout(r, 600));

  // Clear spinner, show chat
  panel.querySelector('.loading-spinner')?.remove();

  let fullText = '';
  let bazi = '';
  let dayMaster = '';
  let dayMasterElement = '';

  await streamFetch('full', {
    name: profile.name,
    birthDate: profile.birthDate,
    birthTime: profile.birthTime,
    birthPlace: profile.birthPlace,
    gender: profile.gender,
    timeUnknown: !profile.birthTime
  }, chat, {
    onDone() {
      // Collect text from all bubbles except errors
      const bubbles = chat.querySelectorAll('.chat-bubble:not([style*="color"])');
      bubbles.forEach(b => {
        const t = b.textContent || '';
        fullText += t;
        // Try to extract bazi from text (pattern: 4 pairs of characters)
        const baziMatch = t.match(/[甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥]\s*[甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥]\s*[甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥]\s*[甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥]/);
        if (baziMatch && !bazi) {
          bazi = baziMatch[0];
          // day master is first char of third pair
          const parts = baziMatch[0].split(/\s+/);
          if (parts.length >= 3) {
            dayMaster = parts[2].charAt(0);
            const dmMap = { '甲': '木', '乙': '木', '丙': '火', '丁': '火', '戊': '土', '己': '土', '庚': '金', '辛': '金', '壬': '水', '癸': '水' };
            dayMasterElement = dmMap[dayMaster] || '';
          }
        }
      });
      if (bazi) {
        Profiles.cacheReading(profile.id, bazi, dayMaster, dayMasterElement, fullText);
      }
      // Re-render with refresh button
      const btnRow = document.createElement('div');
      btnRow.style.cssText = 'margin-top:16px;display:flex;gap:10px;';
      btnRow.innerHTML = '<button class="btn btn-primary" onclick="doFullReading()">🔄 重新排盘</button><button class="btn btn-secondary btn-small" onclick="switchTab(\'daily\')">去看看日运 →</button>';
      panel.appendChild(btnRow);
      // 水晶速搭
      const matchEl = document.createElement('div');
      matchEl.id = 'crystal-quick-match';
      matchEl.style.marginTop = '20px';
      panel.appendChild(matchEl);
      setTimeout(() => renderCrystalQuickMatch(profile), 100);
    },
    onError(err) {
      const btnRow = document.createElement('div');
      btnRow.style.cssText = 'margin-top:16px;';
      btnRow.innerHTML = '<button class="btn btn-primary" onclick="doFullReading()">🔄 再试试</button>';
      panel.appendChild(btnRow);
    }
  });
}

async function doDailyReading() {
  const profile = Profiles.getActive();
  if (!profile) return;

  const panel = document.getElementById('panel-daily');
  const existingChat = document.getElementById('daily-chat');
  if (existingChat) existingChat.innerHTML = '';

  const chat = document.getElementById('daily-chat') || (() => {
    panel.querySelector('.chat-container').innerHTML = '';
    return panel.querySelector('.chat-container');
  })();

  const loading = document.createElement('div');
  loading.className = 'loading-spinner';
  loading.innerHTML = '<div class="spinner"></div>正在推今天的运势…';
  chat.appendChild(loading);

  let fullText = '';
  await streamFetch('daily', {
    bazi: Profiles.getBaziSummary(profile)
  }, chat, {
    onDone() {
      loading.remove();
      const bubbles = chat.querySelectorAll('.chat-bubble:not([style*="color"])');
      bubbles.forEach(b => { fullText += (b.textContent || '') + ' '; });
      Profiles.setDailyCache(profile.id, today(), fullText.trim());
    },
    onError() {
      loading.remove();
    }
  });
}

async function doLuckydays() {
  const profile = Profiles.getActive();
  if (!profile) return;

  const activity = document.getElementById('lucky-activity').value;
  const dateFrom = document.getElementById('lucky-from').value;
  const dateTo = document.getElementById('lucky-to').value;
  const resultEl = document.getElementById('lucky-result');

  resultEl.innerHTML = '<div class="loading-spinner" style="margin-top:16px;"><div class="spinner"></div>正在帮你翻黄历挑日子…</div>';

  // We use a special approach for luckydays: full text returned, then parsed into cards
  let fullText = '';
  const tempDiv = document.createElement('div');

  await streamFetch('luckydays', {
    bazi: Profiles.getBaziSummary(profile),
    activity,
    dateFrom,
    dateTo
  }, tempDiv, {
    onDone() {
      const bubbles = tempDiv.querySelectorAll('.chat-bubble:not([style*="color"])');
      bubbles.forEach(b => { fullText += (b.textContent || ''); });

      // Render result as chat + maybe parse days into cards
      resultEl.innerHTML = '';
      const container = document.createElement('div');
      container.className = 'chat-container';
      container.style.marginTop = '16px';
      bubbles.forEach(b => container.appendChild(b.cloneNode(true)));
      resultEl.appendChild(container);

      // Add a refresh button
      const btnRow = document.createElement('div');
      btnRow.style.marginTop = '16px';
      btnRow.innerHTML = '<button class="btn btn-primary btn-small" onclick="doLuckydays()">🔄 重新查询</button>';
      resultEl.appendChild(btnRow);
    },
    onError(err) {
      resultEl.innerHTML = `<div class="chat-bubble" style="color:var(--red);margin-top:16px;">⚠️ ${err || '查询出错了，再试试'}</div>`;
    }
  });
}

function saveProfileForm(existingId) {
  const name = document.getElementById('pf-name').value.trim();
  const birthDate = document.getElementById('pf-date').value;
  const timeUnknown = document.getElementById('pf-time-unknown').checked;
  const birthTime = timeUnknown ? null : document.getElementById('pf-time').value;
  const birthPlace = document.getElementById('pf-place').value.trim();
  const genderBtn = document.querySelector('#pf-gender .gender-btn.selected');
  const gender = genderBtn ? genderBtn.dataset.g : null;

  if (!name || !birthDate) {
    alert('昵称和出生日期至少得填上哦');
    return;
  }

  const profiles = Profiles.getAll();
  const profile = {
    id: existingId || uuid(),
    name,
    birthDate,
    birthTime,
    birthPlace,
    gender,
    isDefault: existingId
      ? (profiles.find(p => p.id === existingId)?.isDefault || false)
      : (profiles.length === 0),
    lastReading: existingId ? profiles.find(p => p.id === existingId)?.lastReading || null : null,
    dailyCache: existingId ? profiles.find(p => p.id === existingId)?.dailyCache || null : null,
    monthlyCache: existingId ? profiles.find(p => p.id === existingId)?.monthlyCache || null : null,
    createdAt: existingId ? profiles.find(p => p.id === existingId)?.createdAt : Date.now()
  };

  Profiles.save(profile);
  if (!existingId) Profiles.setActive(profile.id);

  renderProfiles();
  renderFortune();
  renderDaily();
  renderMonthly();
  renderLuckydays();

  // If new profile created, switch to fortune tab
  if (!existingId) {
    switchTab('fortune');
  }
}

function pickCrystalWuxing(targetWx) {
  const result = document.getElementById('crystal-match-result');
  if (!result) return;

  // 高亮被选中的按钮
  document.querySelectorAll('.crystal-wuxing-btn').forEach(b => {
    const wx = b.dataset.wx;
    const colors = { 金:'#94a3b8', 木:'#22c55e', 水:'#3b82f6', 火:'#ef4444', 土:'#f59e0b' };
    const isSel = wx === targetWx;
    b.style.background = isSel ? colors[wx]+'22' : 'rgba(255,255,255,0.04)';
    b.style.borderColor = isSel ? colors[wx] : 'rgba(255,255,255,0.12)';
    b.style.boxShadow = isSel ? `0 0 16px ${colors[wx]}33` : 'none';
    b.style.color = isSel ? colors[wx] : 'var(--stardust-dim)';
  });

  // 筛选目标五行水晶
  const matched = CRYSTAL_DB.filter(c => c.element.includes(targetWx));
  // 从水→木→火→土→金→水 相生链里找可叠加的
  const shengChain = ['水','木','火','土','金'];
  const wxIdx = shengChain.indexOf(targetWx);
  const complementWx = shengChain[(wxIdx + 1) % 5]; // 相生的五行（补用神叠加）
  const complementMatched = CRYSTAL_DB.filter(c => c.element.includes(complementWx));

  // 相克五行（避开）
  const keMap = { 金:'木', 木:'土', 土:'水', 水:'火', 火:'金' };
  const avoidWx = Object.entries(keMap).filter(([k,v]) => v === targetWx).map(([k]) => k)[0] || '';

  let html = '';

  // 推荐搭配
  html += '<div style="margin-top:8px;">';
  html += '<div style="font-size:13px;font-weight:600;margin-bottom:6px;color:var(--gold-bright);">✨ 推荐腕间搭配</div>';
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">';
  const top3 = matched.slice(0, 3);
  top3.forEach((c, i) => {
    const isCol = isCrystalCollected(c.name);
    html += `<div style="
      flex:1;min-width:100px;padding:10px 8px;border-radius:12px;
      background:rgba(255,255,255,0.06);border:1px solid var(--border);
      text-align:center;cursor:pointer;transition:all 0.2s;
    " onclick="toggleCrystalQuickCollect('${c.name}', this)">
      <div style="font-size:24px;">${c.emoji}</div>
      <div style="font-size:12px;font-weight:600;margin:4px 0;">${c.name}</div>
      <div style="font-size:10px;color:var(--stardust-muted);">${c.use}</div>
      <div style="font-size:16px;margin-top:4px;color:${isCol ? 'var(--gold)' : 'var(--stardust-muted)'};">${isCol ? '★' : '☆'}</div>
    </div>`;
  });
  html += '</div>';

  // 配戴建议
  html += '<div style="font-size:12px;color:var(--stardust-dim);line-height:1.8;">';
  html += `<div>🔹 左手戴${top3[0]?.name||'水晶'}（招财/桃花/提升运）</div>`;
  if (complementMatched.length > 0) {
    html += `<div>🔹 可叠戴 <span style="color:#f59e0b;">${complementMatched[0].name}</span>（${complementWx}生${targetWx}，效果叠加）</div>`;
  }
  if (avoidWx) {
    html += `<div>🔸 避免与<span style="color:var(--rose-light);">${avoidWx}性</span>水晶同戴（五行相克）</div>`;
  }
  html += '<div>🔸 新买先用流水/月光净化，日常每月净化1-2次</div>';
  html += '<div>🔸 体质虚弱者慎用钛晶、捷克陨石；孕妇只建议白水晶</div>';
  html += '</div>';

  // 右上臂/随身推荐
  html += '<div style="margin-top:10px;font-size:12px;color:var(--stardust-muted);">';
  html += '右上臂（右·辟邪化煞版）：';
  const forRight = matched.filter(c => c.use.includes('辟邪') || c.use.includes('防护') || c.use.includes('化煞'));
  if (forRight.length > 0) {
    html += forRight.slice(0,2).map(c => `${c.emoji}${c.name}`).join(' / ');
  } else {
    html += matched.slice(3,5).map(c => `${c.emoji}${c.name}`).join(' / ') || '黑曜石';
  }
  html += '</div>';

  html += '</div>'; // result inner

  result.innerHTML = html;
}

function toggleCrystalQuickCollect(name, el) {
  let collected = [];
  try { collected = JSON.parse(localStorage.getItem('fortune_crystals') || '[]'); } catch(e) {}
  const idx = collected.indexOf(name);
  if (idx >= 0) {
    collected.splice(idx, 1);
    const star = el.querySelector('div:last-child');
    if (star) { star.textContent = '☆'; star.style.color = 'var(--stardust-muted)'; }
  } else {
    collected.push(name);
    const star = el.querySelector('div:last-child');
    if (star) { star.textContent = '★'; star.style.color = 'var(--gold)'; }
  }
  localStorage.setItem('fortune_crystals', JSON.stringify(collected));
}

function isCrystalCollected(name) {
  try {
    const col = JSON.parse(localStorage.getItem('fortune_crystals') || '[]');
    return col.includes(name);
  } catch(e) { return false; }
}

function bindCrystalCollectButtons() {
  // Scan chat bubbles for crystal names and add collect markers.
  const CRYSTALS = ['白水晶','月光石','白幽灵','白碧玺','闪灵钻','绿幽灵','绿松石','紫水晶','翡翠','绿发晶','孔雀石','海蓝宝','黑曜石','茶水晶','黑发晶','黑碧玺','蓝玛瑙','青金石','舒曼石','石榴石','红发晶','草莓晶','红纹石','红碧玺','粉水晶','紫锂辉石','黄水晶','虎眼石','金发晶','钛晶','黄碧玺','黄铁矿','萤石','琥珀','蔷薇辉石','锂云母','捷克陨石','拉利玛','舒俱徕','橄榄石','烟晶'];
  let collected = [];
  try { collected = JSON.parse(localStorage.getItem('fortune_crystals') || '[]'); } catch(e) {}

  // One-time event delegation: markers inserted via innerHTML keep working.
  const histRoot = document.getElementById('chat-history');
  if (histRoot && !histRoot.dataset.crystalDelegated) {
    histRoot.dataset.crystalDelegated = '1';
    histRoot.addEventListener('click', (e) => {
      const m = e.target.closest('[data-crystal]');
      if (m && histRoot.contains(m)) toggleCrystalCollect(m.getAttribute('data-crystal'), m);
    });
  }

  document.querySelectorAll('#chat-history .chat-bubble.ai').forEach(bubble => {
    if (bubble.dataset.crystalScanned) return;   // process each bubble only once
    bubble.dataset.crystalScanned = '1';
    let html = bubble.innerHTML;
    let changed = false;
    CRYSTALS.forEach(c => {
      if (html.includes(c) && html.indexOf('data-crystal="' + c + '"') < 0) {
        const isCollected = collected.includes(c);
        const marker = '<span data-crystal="' + c + '" style="cursor:pointer;font-size:16px;margin-left:2px;color:' +
          (isCollected ? 'var(--gold)' : 'var(--stardust-muted)') + ';">' + (isCollected ? ' ★' : ' ☆') + '</span>';
        html = html.replace(c, c + marker);      // first occurrence only
        changed = true;
      }
    });
    if (changed) bubble.innerHTML = html;        // single DOM write per bubble
  });
}

function saveChatHistory() {
  const history = document.getElementById('chat-history');
  if (history) {
    try {
      // Only save last 50 messages to avoid localStorage overflow
      const bubbles = history.querySelectorAll('.chat-bubble:not(.system)');
      let count = 0;
      const clone = history.cloneNode(true);
      const allBubbles = clone.querySelectorAll('.chat-bubble:not(.system)');
      allBubbles.forEach((b, i) => { if (i < allBubbles.length - 50) b.remove(); });
      localStorage.setItem('fortune_chat_history', clone.innerHTML);
    } catch(e) { /* ignore */ }
  }
}

async function doChatSend() {
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send-btn');

  if (!question) return;

  // Build context
  const now = new Date();
  const currentYear = now.getFullYear();
  const currentMonth = now.getMonth() + 1;
  let contextMsg = question;
  if (profile && profile.lastReading) {
    contextMsg = `【时间校准——最重要！】当前是${currentYear}年${currentMonth}月，不是2024年也不是2025年。如果用户问"这两年""最近""未来一年"等时间相关的问题，必须从${currentYear}年算起！推算流年要推${currentYear}年、${currentYear+1}年，不要推过去。

请基于用户的八字来回答。风格保持大白话、有温度、不吓人。如果问题跟命理无关，先简短回答，再从命理角度给点建议。`;

请回答这个问题。如果跟命理有关，提示用户先去命盘Tab排盘会更精准。风格白话、有温度。`;
  }

(function(){

  const lunarDays=['','初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
  const tg=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const dz=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];

  const info=[0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,

    0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,
    0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
    0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,
    0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
    0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0,

    0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,
    0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
    0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,
    0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,
    0x14b63,0x09370,0x049f8,0x04970,0x064b0,0x168a6,0x0ea50,0x06aa0,0x1a6c4,0x0aae0,
    0x092e0,0x0d2e3,0x0c960,0x0d557,0x0d4a0,0x0da50,0x05d55,0x056a0,0x0a6d0,0x055d4,
    0x052d0,0x0a9b8,0x0a950,0x0b4a0,0x0b6a6,0x0ad50,0x055a0,0x0aba4,0x0a5b0,0x052b0,

    0x0e968,0x0d520,0x0daa0,0x16aa6,0x056d0,0x04ae0,0x0a9d4,0x0a4d0,0x0d150,0x0f252,0x0d520];

  function leapMonth(y){return info[y-1900]&0xf;}
  function monthDays(y,m){return (info[y-1900]&(0x10000>>m))?30:29;}
  function yearDays(y){let s=0;for(let i=0x8000;i>0x8;i>>=1)s+=(info[y-1900]&i)?30:29;return s+((info[y-1900]&0xf)?((info[y-1900]&0x10000)?30:29):(monthDays(y,12)==29?29:30));}
  function ganzhiDay(d){let days=Math.floor((d-new Date(1900,0,1))/86400000);return tg[days%10]+dz[days%12];}

  window.solarToLunar=function(date){
    let y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
    let base=new Date(1900,0,31);
    let offset=Math.floor((date-base)/86400000);
    let ly=1900;
    while(ly<2100){let yd=yearDays(ly);if(offset<yd)break;offset-=yd;ly++;}
    let leap=leapMonth(ly),isLeap=false,lm,ld;
    for(lm=1;lm<=12;lm++){
      let md=monthDays(ly,lm);
      if(offset<md){ld=offset+1;break;}
      offset-=md;
      if(lm===leap){md=(info[ly-1900]&0x10000)?30:29;if(offset<md){isLeap=true;ld=offset+1;break;}offset-=md;}
    }
    let yrTg=tg[(ly-4)%10],yrDz=dz[(ly-4)%12];
    return{
      year:ly,month:lm,day:ld,isLeap:isLeap,
      monthCN:(isLeap?'闰':'')+lunarMonths[lm-1],
      dayCN:lunarDays[ld],
      yearCN:yrTg+yrDz+'年',
      shengXiao:sx[(ly-4)%12],
      ganzhiDay:ganzhiDay(date)
    };
  };
})();

function updateSolarResult() {
  const y = parseInt(document.getElementById('lny-year').value) || new Date().getFullYear();
  const m = parseInt(document.getElementById('lny-month').value) || 1;
  const d = parseInt(document.getElementById('lny-day').value) || 1;
  const isLeap = document.getElementById('lny-isleap').checked;
  // Approximate: find solar date for given lunar date (search within the year range)
  // Use a simple approach: iterate through days and find the closest match
  const el = document.getElementById('lunar-result');
  if (!el) return;
  // For now, show the lunar date info
  const yTG = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'][(y-4)%10];
  const yDZ = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'][(y-4)%12];
  const LM=['正','二','三','四','五','六','七','八','九','十','冬','腊'];
  const LD=['','初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
  // Find solar date by scanning
  let found = null;
  const start = new Date(y-1, 11, 1);
  const end = new Date(y+1, 0, 31);
  for (let d0 = new Date(start); d0 <= end; d0.setDate(d0.getDate()+1)) {
    const r = solarToLunar(d0);
    if (r.year === y && r.month === m && r.day === d && r.isLeap === isLeap) {
      found = new Date(d0);
      break;
    }
  }
  if (found) {
    const r = solarToLunar(found);
    el.innerHTML =
      '<b>公历：</b>' + found.getFullYear() + '年' + (found.getMonth()+1) + '月' + found.getDate() + '日<br>' +
      '<b>农历：</b>' + r.yearCN + ' ' + (isLeap?'闰':'') + LM[m-1] + '月' + LD[d] + '<br>' +
      '<b>生肖：</b>' + r.shengXiao + '<br>' +
      '<b>日干支：</b>' + r.ganzhiDay;
  } else {
    el.innerHTML = '<b>农历：</b>' + yTG + yDZ + '年 ' + (isLeap?'闰':'') + LM[m-1] + '月' + LD[d] + '<br><span style="color:var(--red);">该日期可能不存在，请检查</span>';
  }
}

/* ══════════════════════════════════════════════════════════════════
   合盘功能 — 两人八字配对
   ══════════════════════════════════════════════════════════════════ */
function showHePan() {
  const profile = Profiles.getActive();
  if (!profile || !profile.lastReading) {
    alert('先给自己排个盘，再看看跟TA合不合～');
    switchTab('fortune');
    return;
  }

  const allProfiles = Profiles.getAll();
  const partnerOptions = allProfiles.filter(p => p.id !== profile.id);

  // Build modal HTML
  let partnerSelectHtml = `
    <div class="form-group">
      <label class="form-label">选择伴侣档案</label>
      <select class="form-select" id="hepan-partner-select">
        <option value="">手动填写</option>
        ${partnerOptions.map(p => `<option value="${p.id}">${p.name || '未命名'} — ${p.birthDate}</option>`).join('')}
      </select>
    </div>`;

  let manualFormHtml = `
    <div id="hepan-manual">
      <div class="form-group">
        <label class="form-label">TA的昵称</label>
        <input type="text" class="form-input" id="hepan-name" placeholder="比如：老婆">
      </div>
      <div class="form-group">
        <label class="form-label">TA的生日（阳历）</label>
        <input type="date" class="form-input" id="hepan-date">
      </div>
      <div class="form-group">
        <label class="form-label">TA的出生时间</label>
        <input type="time" class="form-input" id="hepan-time" value="12:00">
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="hepan-time-unknown" checked onchange="
          const t=document.getElementById('hepan-time');
          t.style.opacity=this.checked?'0.5':'1';
        ">
        <label for="hepan-time-unknown">我不确定TA的时辰</label>
      </div>
      <div class="form-group">
        <label class="form-label">TA的性别</label>
        <div class="gender-toggle" id="hepan-gender">
          <button class="gender-btn" data-g="男">男</button>
          <button class="gender-btn selected" data-g="女">女</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">TA的出生地（选填）</label>
        <input type="text" class="form-input" id="hepan-place" placeholder="比如：上海">
      </div>
    </div>`;

  // Show as a card overlay in the chat panel
  const history = document.getElementById('chat-history');
  const formCard = document.createElement('div');
  formCard.id = 'hepan-card';
  formCard.className = 'card';
  formCard.style.cssText = 'border: 2px solid var(--red); margin-top:12px;';
  formCard.innerHTML = `
    <div class="card-header"><span class="icon">❤️</span> 看看你们合不合适</div>
    <p style="font-size:13px;color:var(--stardust-muted);margin-bottom:12px;">
      你的八字：<strong>${profile.lastReading.bazi || '已排盘'}</strong>
    </p>
    ${partnerSelectHtml}
    ${manualFormHtml}
    <button class="btn btn-primary" onclick="doHePan('${profile.id}')" style="background:var(--red);margin-top:8px;">
      ❤️ 开始合盘
    </button>
    <button class="btn btn-secondary" style="margin-top:6px;" onclick="document.getElementById('hepan-card').remove()">
      取消
    </button>
  `;

  // Insert after quick asks area, before history
  const quickAsks = document.getElementById('quick-asks');
  if (quickAsks) quickAsks.after(formCard);
  else history.before(formCard);

  formCard.scrollIntoView({ behavior: 'smooth' });

  // Bind partner select toggle
  const sel = formCard.querySelector('#hepan-partner-select');
  if (sel) {
    sel.onchange = () => {
      const manual = formCard.querySelector('#hepan-manual');
      if (manual) manual.style.display = sel.value ? 'none' : 'block';
    };
  }

  // Bind gender buttons
  formCard.querySelectorAll('#hepan-gender .gender-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      formCard.querySelectorAll('#hepan-gender .gender-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });

  // Init time opacity
  const hepanTime = document.getElementById('hepan-time');
  if (hepanTime) hepanTime.style.opacity = '0.5';
}

async function doHePan(myProfileId) {
  const myProfile = Profiles.getById(myProfileId);
  if (!myProfile) return;

  const sel = document.getElementById('hepan-partner-select');
  let partnerName, partnerBazi, partnerData;

  if (sel && sel.value) {
    // Use existing profile
    const partner = Profiles.getById(sel.value);
    if (!partner) return;
    partnerName = partner.name;
    partnerData = `出生: ${partner.birthDate}, ${partner.birthTime || '12:00'}, ${partner.gender || '未知'}`;
    partnerBazi = partner.lastReading ? `八字: ${partner.lastReading.bazi}, 日主五行: ${partner.lastReading.dayMasterElement || '?'}` : `生辰: ${partner.birthDate}, ${partner.birthTime || '12:00'}`;
  } else {
    // Manual entry
    partnerName = document.getElementById('hepan-name').value.trim();
    const pDate = document.getElementById('hepan-date').value;
    const pTimeUnknown = document.getElementById('hepan-time-unknown').checked;
    const pTime = pTimeUnknown ? '12:00' : document.getElementById('hepan-time').value;
    const pGenderBtn = document.querySelector('#hepan-gender .gender-btn.selected');
    const pGender = pGenderBtn ? pGenderBtn.dataset.g : '未知';
    const pPlace = document.getElementById('hepan-place').value.trim();
    if (!partnerName || !pDate) { alert('至少填一下TA的昵称和生日哦'); return; }
    partnerData = `出生: ${pDate}, ${pTime}, ${pGender}, ${pPlace || '未知地点'}${pTimeUnknown ? '(时辰不确定)' : ''}`;
    partnerBazi = `生辰: ${pDate}, ${pTime}, ${pGender}`;
  }

  // Remove the form card
  const card = document.getElementById('hepan-card');
  if (card) card.remove();

  // Build question
  const question = `我和${partnerName}在一起怎么样？请帮我做一个合盘分析，包括：
1. 两人的性格合不合（五行互补还是冲克）
2. 感情相处中各自需要注意什么
3. 两人的事业/财运是互补还是互相消耗
4. 适合一起做什么（比如一起创业、一起旅行的气场合不合）
5. 有没有需要特别注意的年份或方面
6. 如果合适的话，推荐一种两人可以一起戴的水晶（要具体）

我的信息→八字：${myProfile.lastReading.bazi || '已排盘'}，日主五行：${myProfile.lastReading.dayMasterElement || '?'}，${myProfile.birthDate}，${myProfile.birthTime || '12:00'}
TA的信息→${partnerData}，${partnerBazi}

请全程用大白话，像朋友帮你看一样。有不好的地方直接说，但要给实际建议不要吓人。`;

  // Inject into chat
  const history = document.getElementById('chat-history');
  const userBubble = createBubble('❤️ 我和' + partnerName + '合不合？', 'user');
  history.appendChild(userBubble);
  saveChatHistory();

  const aiBubble = createBubble('', 'ai', true);
  history.appendChild(aiBubble);
  history.parentElement.scrollTop = history.parentElement.scrollHeight;

  await streamFetch('chat', { question, bazi: myProfile.lastReading.bazi || '' }, history, {
    onDone() {
      const input = document.getElementById('chat-input');
      if (input) { input.disabled = false; input.focus(); }
      const sendBtn = document.getElementById('chat-send-btn');
      if (sendBtn) sendBtn.disabled = false;
      saveChatHistory();
    },
    onError() {
      const input = document.getElementById('chat-input');
      if (input) { input.disabled = false; input.focus(); }
      const sendBtn = document.getElementById('chat-send-btn');
      if (sendBtn) sendBtn.disabled = false;
      saveChatHistory();
    }
  });
}
