<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寰影 CineFlow Pro 1.8.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        .custom-scrollbar { 
            -webkit-overflow-scrolling: touch; 
            overscroll-behavior-y: contain;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        
        .selectable-text {
            -webkit-user-select: text !important;
            user-select: text !important;
            cursor: text;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes loading { 0% { width: 0%; } 40% { width: 60%; } 100% { width: 100%; } }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

        /* ================= 浅色主题 (Paper Mode) ================= */
        .theme-paper { background-color: #f3f4f6 !important; color: #111827 !important; }
        .theme-paper .bg-black { background-color: #f9fafb !important; }
        .theme-paper .bg-\[\#0B0F19\] { background-color: #f3f4f6 !important; }
        .theme-paper .bg-gray-900 { background-color: #ffffff !important; }
        .theme-paper .bg-gray-800 { background-color: #f3f4f6 !important; }
        .theme-paper .bg-gray-700 { background-color: #e5e7eb !important; }
        
        .theme-paper .text-white { color: #111827 !important; }
        .theme-paper .text-gray-100, .theme-paper .text-gray-200 { color: #1f2937 !important; }
        .theme-paper .text-gray-300, .theme-paper .text-gray-400 { color: #4b5563 !important; }
        .theme-paper .text-gray-500, .theme-paper .text-gray-600 { color: #6b7280 !important; }
        
        .theme-paper .border-gray-800 { border-color: #e5e7eb !important; }
        .theme-paper .border-gray-700 { border-color: #d1d5db !important; }
        
        .theme-paper .bg-black\/20, .theme-paper .bg-black\/40 { background-color: rgba(255,255,255,0.6) !important; }
        .theme-paper .bg-black\/50, .theme-paper .bg-black\/80 { background-color: rgba(255,255,255,0.85) !important; }

        /* ================= 复古胶片主题 (Sepia Mode) ================= */
        .theme-sepia { background-color: #2c241b !important; color: #e8dcc7 !important; }
        .theme-sepia .bg-black { background-color: #1a1510 !important; }
        .theme-sepia .bg-\[\#0B0F19\] { background-color: #241c14 !important; }
        .theme-sepia .bg-gray-900 { background-color: #382c20 !important; }
        .theme-sepia .bg-gray-800 { background-color: #4a3b2b !important; }
        .theme-sepia .bg-gray-700 { background-color: #5c4a36 !important; }
        
        .theme-sepia .text-white { color: #fef0d9 !important; }
        .theme-sepia .text-gray-100, .theme-sepia .text-gray-200 { color: #e8dcc7 !important; }
        .theme-sepia .text-gray-300, .theme-sepia .text-gray-400 { color: #c4ae8f !important; }
        .theme-sepia .text-gray-500, .theme-sepia .text-gray-600 { color: #9c8464 !important; }
        
        .theme-sepia .border-gray-800 { border-color: #4a3b2b !important; }
        .theme-sepia .border-gray-700 { border-color: #5c4a36 !important; }
        
        .theme-sepia .bg-black\/20, .theme-sepia .bg-black\/40 { background-color: rgba(44,36,27,0.6) !important; }
        .theme-sepia .bg-black\/50, .theme-sepia .bg-black\/80 { background-color: rgba(26,21,16,0.85) !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import * as LucideIcons from 'https://esm.sh/lucide-react@0.292.0';

        const {
            Film, BookOpen, LayoutDashboard, Clapperboard, CalendarDays, Users, Camera, Play, CheckCircle, Clock, Search, Bell, Settings, Plus, FileVideo, MoreVertical, AlignLeft, Video, MapPin, CloudRain, FileText, AlertCircle, Activity, Upload, Download, Filter, ChevronRight, Eye, Edit3, Trash2, Highlighter, Move, Maximize, Target, FileDown, ArrowRight, Check, CheckSquare, Square, Send, Inbox, ListTodo, Layers, GripVertical, FileOutput, XCircle, ListChecks, BarChart3, HardDrive, TrendingUp, FolderPlus, Globe, Palette, Monitor, Archive, FilePlus2, FolderOpen, Sun, Save, SidebarOpen, Zap, Timer, Clapperboard: ClapperboardIcon, Compass
        } = LucideIcons;

        const STORAGE_KEY = 'cineflow_pro_data_v1.8';
        const SETTINGS_KEY = 'cineflow_pro_settings_v1.8';

        const loadData = (key, defaultVal) => {
            try {
                const item = window.localStorage.getItem(key);
                return item ? JSON.parse(item) : defaultVal;
            } catch (error) {
                return defaultVal;
            }
        };

        const App = () => {
            const [mobileTab, setMobileTab] = useState('left'); 

            const savedSettings = loadData(SETTINGS_KEY, { themeColor: 'cyan', bgTheme: 'obsidian', sysLang: 'zh' });
            const [showSystemSettings, setShowSystemSettings] = useState(false);
            const [themeColor, setThemeColor] = useState(savedSettings.themeColor);
            const [bgTheme, setBgTheme] = useState(savedSettings.bgTheme);
            const [sysLang, setSysLang] = useState(savedSettings.sysLang);

            useEffect(() => {
                window.localStorage.setItem(SETTINGS_KEY, JSON.stringify({ themeColor, bgTheme, sysLang }));
            }, [themeColor, bgTheme, sysLang]);

            const [showSplash, setShowSplash] = useState(true);
            const [modalConfig, setModalConfig] = useState(null); 

            const showModal = (message, type = 'alert', onConfirm = null) => {
                setModalConfig({ message, type, onConfirm });
            };
            const closeModal = () => setModalConfig(null);

            useEffect(() => {
                const handleModalKeydown = (e) => {
                    if (modalConfig) {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            if (modalConfig.onConfirm) modalConfig.onConfirm();
                            closeModal();
                        } else if (e.key === 'Escape') {
                            e.preventDefault();
                            closeModal();
                        }
                    }
                };
                window.addEventListener('keydown', handleModalKeydown);
                return () => window.removeEventListener('keydown', handleModalKeydown);
            }, [modalConfig]);

            const tColor = useMemo(() => {
                const map = {
                    cyan: { main: 'cyan', text: 'text-cyan-500', textLight: 'text-cyan-400', bg: 'bg-cyan-600', bgHover: 'hover:bg-cyan-500', border: 'border-cyan-500', shadow: 'shadow-[0_0_20px_rgba(6,182,212,0.3)]', activeBg: 'bg-cyan-500/10' },
                    amber: { main: 'amber', text: 'text-amber-500', textLight: 'text-amber-400', bg: 'bg-amber-600', bgHover: 'hover:bg-amber-500', border: 'border-amber-500', shadow: 'shadow-[0_0_20px_rgba(245,158,11,0.3)]', activeBg: 'bg-amber-500/10' },
                    purple: { main: 'purple', text: 'text-purple-500', textLight: 'text-purple-400', bg: 'bg-purple-600', bgHover: 'hover:bg-purple-500', border: 'border-purple-500', shadow: 'shadow-[0_0_20px_rgba(168,85,247,0.3)]', activeBg: 'bg-purple-500/10' },
                };
                return map[themeColor] || map.cyan;
            }, [themeColor]);

            const bTheme = useMemo(() => {
                const map = {
                    obsidian: { root: 'bg-black', panel: 'bg-[#0B0F19]', card: 'bg-gray-900', border: 'border-gray-800' },
                    slate: { root: 'bg-slate-950', panel: 'bg-slate-900', card: 'bg-slate-800', border: 'border-slate-700' },
                    zinc: { root: 'bg-zinc-950', panel: 'bg-zinc-900', card: 'bg-zinc-800', border: 'border-zinc-700' },
                    paper: { root: 'bg-gray-100', panel: 'bg-gray-200', card: 'bg-white', border: 'border-gray-300' },
                    sepia: { root: 'bg-[#2c241b]', panel: 'bg-[#241c14]', card: 'bg-[#382c20]', border: 'border-[#4a3b2b]' }
                };
                return map[bgTheme] || map.obsidian;
            }, [bgTheme]);

            const savedProject = loadData(STORAGE_KEY, {
                projectInfo: { title: '', director: '', dp: '', startDate: '' },
                archivedProjects: [],
                ingestStage: 'upload',
                originalScript: '',
                editedScript: '',
                parsedScriptBlocks: [],
                shots: [],
                schedule: { day1: { id: 'day1', date: '', title: 'Day 1: 初始拍摄日', callTime: '', location: '', weather: '', shots: [] } },
                camNames: { A: 'CAM A (ARRI)', B: 'CAM B (RED)', C: 'CAM C (SONY)' },
                shotLogs: { __global_clips: { A: '', B: '', C: '' } }
            });

            const [projectInfo, setProjectInfo] = useState(savedProject.projectInfo);
            const [archivedProjects, setArchivedProjects] = useState(savedProject.archivedProjects); 
            const [activeModule, setActiveModule] = useState(savedProject.projectInfo.title ? 'dashboard' : 'project-setup'); 

            const [ingestStage, setIngestStage] = useState(savedProject.ingestStage); 
            const [originalScript, setOriginalScript] = useState(savedProject.originalScript);
            const [editedScript, setEditedScript] = useState(savedProject.editedScript);
            const [parsedScriptBlocks, setParsedScriptBlocks] = useState(savedProject.parsedScriptBlocks); 

            const [shots, setShots] = useState(savedProject.shots); 
            const [schedule, setSchedule] = useState(savedProject.schedule);
            const [camNames, setCamNames] = useState(savedProject.camNames);
            const [shotLogs, setShotLogs] = useState(savedProject.shotLogs || { __global_clips: { A: '', B: '', C: '' } });

            const fileInputRef = useRef(null);
            const importProjectInputRef = useRef(null); 
            const originalScrollRef = useRef(null);
            const editedScrollRef = useRef(null);
            const isSyncingLeft = useRef(false);
            const isSyncingRight = useRef(false);
            const [activeHighlights, setActiveHighlights] = useState({ cast: true, props: true, vfx: true });
            const [showShotForm, setShowShotForm] = useState(false);
            const [selectedShotId, setSelectedShotId] = useState(null);
            const [selectedShotIds, setSelectedShotIds] = useState(new Set());
            const [newShot, setNewShot] = useState({ size: 'CU', angle: 'Eye Level', movement: 'Static', lens: '50mm', description: '', referenceText: '' });
            const [repoSelectedShotIds, setRepoSelectedShotIds] = useState(new Set());
            const [repoFilter, setRepoFilter] = useState('ALL'); 
            const [draggedShotId, setDraggedShotId] = useState(null);
            const [dragOverDayId, setDragOverDayId] = useState(null);
            const [executionActiveDayId, setExecutionActiveDayId] = useState('day1');
            const [scheduleActiveDayId, setScheduleActiveDayId] = useState('day1'); 
            const [executionActiveShotId, setExecutionActiveShotId] = useState(null);

            const [selectionPopup, setSelectionPopup] = useState(null);

            useEffect(() => {
                const projectDataToSave = {
                    projectInfo, archivedProjects, ingestStage, originalScript, editedScript,
                    parsedScriptBlocks, shots, schedule, camNames, shotLogs
                };
                window.localStorage.setItem(STORAGE_KEY, JSON.stringify(projectDataToSave));
            }, [projectInfo, archivedProjects, ingestStage, originalScript, editedScript, parsedScriptBlocks, shots, schedule, camNames, shotLogs]);


            const navItems = [
                { id: 'dashboard', icon: LayoutDashboard, label: sysLang === 'zh' ? '总览大盘 (Dashboard)' : 'Dashboard', short: '总览' },
                { id: 'script', icon: BookOpen, label: sysLang === 'zh' ? '剧本解析 (Script)' : 'Script', short: '剧本' },
                { id: 'breakdown', icon: AlignLeft, label: sysLang === 'zh' ? '拆解分镜 (Breakdown)' : 'Breakdown', short: '拆解' },
                { id: 'repository', icon: Inbox, label: sysLang === 'zh' ? '资产仓库 (Repository)' : 'Repository', short: '仓库' },
                { id: 'schedule', icon: CalendarDays, label: sysLang === 'zh' ? '通告排期 (Schedule)' : 'Schedule', short: '排期' },
                { id: 'execution', icon: Video, label: sysLang === 'zh' ? '现场打板 (Execution)' : 'Execution', short: '打板' },
            ];

            const handleModuleSwitch = (id) => {
                setActiveModule(id);
                setMobileTab('left');
                setSelectionPopup(null);
            }

            useEffect(() => {
                const timer = setTimeout(() => setShowSplash(false), 2500);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                if (activeModule === 'breakdown' && selectedShotId && mobileTab === 'left') {
                    const activeShot = shots.find(s => s.id === selectedShotId);
                    if (activeShot && activeShot.referenceText) {
                        const targetBlock = parsedScriptBlocks.find(b => b.text.includes(activeShot.referenceText));
                        if (targetBlock) {
                            setTimeout(() => {
                                const element = document.getElementById(`script-block-${targetBlock.id}`);
                                if (element) { element.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                            }, 100);
                        }
                    }
                }
            }, [selectedShotId, activeModule, shots, parsedScriptBlocks, mobileTab]);

            useEffect(() => {
                if (!window.mammoth) {
                    const script = document.createElement('script');
                    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
                    script.async = true;
                    document.head.appendChild(script);
                }
            }, []);

            useEffect(() => {
                if (activeModule === 'execution') {
                    const activeDay = schedule[executionActiveDayId] || Object.values(schedule)[0];
                    if (activeDay && activeDay.shots.length > 0 && !executionActiveShotId) {
                        setExecutionActiveShotId(activeDay.shots[0]);
                    }
                }
            }, [activeModule, executionActiveDayId, executionActiveShotId, schedule]);

            useEffect(() => {
                if (activeModule === 'execution' && executionActiveShotId) {
                    setShotLogs(prev => {
                        if (!prev[executionActiveShotId]) {
                            const gc = prev.__global_clips || { A: '', B: '', C: '' };
                            return {
                                ...prev,
                                [executionActiveShotId]: {
                                    currentTake: 1,
                                    draft: {
                                        A: { roll: '', clip: gc.A, lens: '', note: '' },
                                        B: { roll: '', clip: gc.B, lens: '', note: '' },
                                        C: { roll: '', clip: gc.C, lens: '', note: '' }
                                    },
                                    history: []
                                }
                            };
                        }
                        return prev;
                    });
                }
            }, [activeModule, executionActiveShotId]);

            const checkAndShowSelection = () => {
                const selection = window.getSelection(); 
                const text = selection.toString().trim(); 
                if (text.length > 2) { 
                    if (selection.rangeCount > 0) {
                        const range = selection.getRangeAt(0);
                        const rect = range.getBoundingClientRect();
                        if (rect.width === 0 && rect.height === 0) return;
                        
                        let top = rect.bottom + 15; 
                        if (top > window.innerHeight - 80) {
                            top = rect.top - 55;
                        }
                        
                        setSelectionPopup({
                            x: Math.max(80, rect.left + (rect.width / 2)), 
                            y: top,
                            text: text
                        });
                    }
                } else {
                    setSelectionPopup(null);
                }
            };

            useEffect(() => {
                let timeoutId;
                const onSelectionChange = () => {
                    if (activeModule !== 'breakdown') return;
                    clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => {
                        checkAndShowSelection();
                    }, 300); 
                };
                document.addEventListener('selectionchange', onSelectionChange);
                return () => {
                    document.removeEventListener('selectionchange', onSelectionChange);
                    clearTimeout(timeoutId);
                };
            }, [activeModule]);

            useEffect(() => {
                const handleGlobalKeyDown = (e) => {
                    if (activeModule === 'breakdown') {
                        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'n') {
                            e.preventDefault();
                            setShowShotForm(prev => !prev);
                        }
                        if (e.key.toLowerCase() === 'w' && selectionPopup) {
                            const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
                            if (activeTag !== 'input' && activeTag !== 'textarea') {
                                e.preventDefault();
                                quickSaveShot(selectionPopup.text);
                            }
                        }
                        if (e.key === 'Escape') {
                            if (selectionPopup) {
                                setSelectionPopup(null);
                                if (window.getSelection) window.getSelection().removeAllRanges();
                            }
                            else if (showShotForm) setShowShotForm(false);
                            else if (selectedShotId) setSelectedShotId(null);
                        }
                    }
                };
                window.addEventListener('keydown', handleGlobalKeyDown);
                return () => window.removeEventListener('keydown', handleGlobalKeyDown);
            }, [activeModule, showShotForm, selectedShotId, selectionPopup]);


            const initProject = (e) => {
                e.preventDefault();
                if (!projectInfo.title) { showModal(sysLang === 'zh' ? "请输入项目名称" : "Please enter project title"); return; }
                handleModuleSwitch('dashboard');
            };

            const createProjectSnapshot = () => ({
                projectInfo, originalScript, editedScript, ingestStage, parsedScriptBlocks,
                shots, schedule, camNames, shotLogs
            });

            const handleExportToDisk = () => {
                if (!projectInfo.title) {
                    showModal(sysLang === 'zh' ? "请先创建并命名项目后再导出。" : "Please name the project before exporting.");
                    return;
                }
                const snapshot = createProjectSnapshot();
                const dataStr = JSON.stringify(snapshot, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `CineFlow_Proj_${projectInfo.title}_${new Date().getTime()}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showModal(sysLang === 'zh' ? "✅ 跨端工程文件 (.json) 已保存至您的本地硬盘/设备。" : "✅ Project exported successfully.");
            };

            const handleImportFromDisk = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const text = await file.text();
                    const d = JSON.parse(text);
                    if (!d.projectInfo || !d.shots) throw new Error("Invalid format");

                    const doLoad = () => {
                        setProjectInfo(d.projectInfo); setOriginalScript(d.originalScript || ''); setEditedScript(d.editedScript || ''); setIngestStage(d.ingestStage || 'upload');
                        setParsedScriptBlocks(d.parsedScriptBlocks || []); setShots(d.shots || []); setSchedule(d.schedule || {}); setCamNames(d.camNames || { A: 'CAM A', B: 'CAM B', C: 'CAM C' }); setShotLogs(d.shotLogs || { __global_clips: { A: '', B: '', C: '' } });
                        setSelectedShotIds(new Set()); setRepoSelectedShotIds(new Set()); setExecutionActiveShotId(null);
                        showModal(sysLang === 'zh' ? `✅ 成功从本地调入跨端工程：${d.projectInfo.title}` : `✅ Successfully imported project.`);
                        handleModuleSwitch('dashboard');
                    };

                    if (projectInfo.title) {
                        showModal(sysLang === 'zh' ? "⚠️ 从本地导入将覆盖当前工作台。系统会自动为您在浏览器存档当前进度。" : "Import will overwrite workspace. Save local?", 'confirm', () => { handleArchiveProject(true); doLoad(); });
                    } else { doLoad(); }

                } catch (err) {
                    showModal(sysLang === 'zh' ? "❌ 导入失败：该文件不是有效的 CineFlow 工程文件。" : "❌ Import failed: Invalid file.");
                }
                e.target.value = null; 
            };

            const handleArchiveProject = (silent = false) => {
                if (!projectInfo.title) {
                    if (!silent) showModal(sysLang === 'zh' ? "项目未命名，请先在设置中创建项目！" : "Project unnamed. Please setup first.");
                    return false;
                }
                const snapshot = createProjectSnapshot();
                setArchivedProjects(prev => {
                    const existingIndex = prev.findIndex(p => p.title === projectInfo.title);
                    if (existingIndex >= 0) {
                        const newArchives = [...prev];
                        newArchives[existingIndex] = { id: prev[existingIndex].id, title: projectInfo.title, date: new Date().toLocaleString(), shotsCount: shots.length, data: snapshot };
                        return newArchives;
                    } else {
                        return [{ id: Date.now(), title: projectInfo.title, date: new Date().toLocaleString(), shotsCount: shots.length, data: snapshot }, ...prev];
                    }
                });
                if (!silent) showModal(sysLang === 'zh' ? "✅ 项目进度已在浏览器本地存档成功！" : "✅ Project archived successfully!");
                return true;
            };

            const handleLoadProject = (projId) => {
                const projToLoad = archivedProjects.find(p => p.id === projId);
                if (!projToLoad) return;
                const doLoad = () => {
                    const d = projToLoad.data;
                    setProjectInfo(d.projectInfo); setOriginalScript(d.originalScript); setEditedScript(d.editedScript); setIngestStage(d.ingestStage);
                    setParsedScriptBlocks(d.parsedScriptBlocks); setShots(d.shots); setSchedule(d.schedule); setCamNames(d.camNames || { A: 'CAM A', B: 'CAM B', C: 'CAM C' }); setShotLogs(d.shotLogs || { __global_clips: { A: '', B: '', C: '' } });
                    setSelectedShotIds(new Set()); setRepoSelectedShotIds(new Set()); setExecutionActiveShotId(null);
                    showModal(sysLang === 'zh' ? `✅ 成功调入存档项目：${projToLoad.title}` : `✅ Loaded project: ${projToLoad.title}`);
                    handleModuleSwitch('dashboard');
                };
                if (projectInfo.title) {
                    showModal(sysLang === 'zh' ? "⚠️ 加载项目将覆盖当前工作台。系统会自动为您存档当前正在编辑的进度。" : "System will save current before loading.", 'confirm', () => { handleArchiveProject(true); doLoad(); });
                } else { doLoad(); }
            };

            const handleDeleteProject = (projId) => {
                showModal(
                    sysLang === 'zh' ? "⚠️ 危险操作：确定要永久删除此存档项目吗？\n此操作无法恢复！" : "⚠️ Warning: Permanently delete this archived project? This cannot be undone!", 
                    'confirm', 
                    () => { setArchivedProjects(prev => prev.filter(p => p.id !== projId)); showModal(sysLang === 'zh' ? "✅ 项目已永久删除。" : "✅ Project deleted successfully."); }
                );
            };

            const handleCreateNewProject = () => {
                showModal(sysLang === 'zh' ? "⚠️ 警告：新建项目将彻底清空当前工作台所有数据！\n系统会自动为您存档当前进度，是否继续？" : "⚠️ Warning: This clears the workspace. Proceed?", 'confirm', () => {
                    if (projectInfo.title) handleArchiveProject(true); 
                    setProjectInfo({ title: '', director: '', dp: '', startDate: '' }); setOriginalScript(''); setEditedScript(''); setIngestStage('upload'); setParsedScriptBlocks([]);
                    setShots([]); setSchedule({ day1: { id: 'day1', date: '', title: 'Day 1: 新建拍摄日', callTime: '', location: '', weather: '', shots: [] } }); setShotLogs({ __global_clips: { A: '', B: '', C: '' } });
                    setSelectedShotIds(new Set()); setRepoSelectedShotIds(new Set()); setExecutionActiveShotId(null);
                    handleModuleSwitch('project-setup');
                });
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIngestStage('loading');
                const extension = file.name.split('.').pop().toLowerCase();
                try {
                if (extension === 'txt') {
                    const text = await file.text(); setOriginalScript(text); setEditedScript(text); setIngestStage('review');
                } else if (extension === 'docx') {
                    if (!window.mammoth) throw new Error("解析引擎尚未就绪，请稍后重试。");
                    const arrayBuffer = await file.arrayBuffer();
                    const result = await window.mammoth.extractRawText({ arrayBuffer });
                    const text = result.value || "（文档内无有效文本提取）";
                    setOriginalScript(text); setEditedScript(text); setIngestStage('review');
                } else { showModal("仅支持 .docx 或 .txt 格式文件"); setIngestStage('upload'); }

                    const { scrollTop, scrollHeight, clientHeight } = e.target;
                    const maxScroll = scrollHeight - clientHeight;
                    if (maxScroll <= 0) return;
                    editedScrollRef.current.scrollTop = (scrollTop / maxScroll) * (editedScrollRef.current.scrollHeight - editedScrollRef.current.clientHeight);
                }
            };

            const handleEditedScroll = (e) => {
                if (isSyncingRight.current) { isSyncingRight.current = false; return; }

                    if (hollywoodSceneRegex.test(text)) type = 'scene-heading';

                    newBlocks.push({ id: `block-${Date.now()}-${idx}`, type, text });

                    currentTake: 1,

                        A: { roll: '', clip: gc.A, lens: '', note: '' },

                        C: { roll: '', clip: gc.C, lens: '', note: '' }

                            </div>

                        <div className="flex gap-2 lg:gap-3"><button onClick={() => setIngestStage('upload')} className="bg-gray-800 hover:bg-gray-700 text-white px-3 lg:px-4 py-1.5 lg:py-2 rounded-lg text-[10px] lg:text-sm font-medium transition-all">重新上传</button><button onClick={handleConfirmAndBreakdown} className={`${tColor.bg} ${tColor.bgHover} text-white px-3 lg:px-5 py-1.5 lg:py-2 rounded-lg text-[10px] lg:text-sm font-medium flex items-center gap-1 lg:gap-2 shadow-lg transition-all`}>确认无误 <span className="hidden sm:inline">进入拆解</span> <ArrowRight size={14} className="lg:w-4 lg:h-4"/></button></div>

                const activeShot = shots.find(s => s.id === selectedShotId);

                const isBlockActive = (blockText) => {
                    if (!activeShot || !activeShot.referenceText) return false;
                    const refSegments = activeShot.referenceText.split(/[\r\n]+/).map(s => s.trim()).filter(s => s.length > 1);
                    return refSegments.some(ref => blockText.includes(ref));
                };

                const renderBlockText = (text) => {
                let elements = [text];
                shots.forEach(shot => {
                    if (!shot.referenceText || shot.referenceText.length < 2) return;
                    
                    const refSegments = shot.referenceText.split(/[\r\n]+/).map(s => s.trim()).filter(s => s.length > 1);
                    
                    refSegments.forEach(refSegment => {
                        elements = elements.flatMap(el => {
                        if (typeof el !== 'string') return [el]; 
                        const parts = el.split(refSegment);
                        const res = [];
                        parts.forEach((part, i) => { 
                            res.push(part); 
                            if (i < parts.length - 1) { 
                                const isSelected = selectedShotId === shot.id; 
                                res.push(
                                    <span 
                                        key={`shot-${shot.id}-${i}-${Math.random().toString(36).substr(2, 5)}`} 
                                        onClick={(e) => { e.stopPropagation(); setSelectedShotId(shot.id); }}
                                        className={`transition-all duration-300 cursor-pointer rounded px-1 ${isSelected ? `${tColor.bg} text-white shadow-md` : `${tColor.activeBg} ${tColor.text} opacity-70 hover:opacity-100`}`}

                                    >
                                        {refSegment}
                                    </span>
                                ); 
                            } 
                        });
                        return res;
                        });
                    });
                });
                if (activeHighlights.cast) elements = elements.flatMap(el => { if (typeof el !== 'string') return [el]; const parts = el.split('李明'); const res = []; parts.forEach((part, i) => { res.push(part); if (i < parts.length - 1) res.push(<span key={`cast-${i}`} className="bg-green-500/20 text-green-400 border-b border-green-500 px-1 mx-1 rounded cursor-pointer hover:bg-green-500/30">李明</span>); }); return res; });
                if (activeHighlights.props) elements = elements.flatMap(el => { if (typeof el !== 'string') return [el]; const parts = el.split('手电筒'); const res = []; parts.forEach((part, i) => { res.push(part); if (i < parts.length - 1) res.push(<span key={`prop-${i}`} className="bg-orange-500/20 text-orange-400 border-b border-orange-500 px-1 mx-1 rounded cursor-pointer hover:bg-orange-500/30">手电筒</span>); }); return res; });
                if (activeHighlights.vfx) elements = elements.flatMap(el => { if (typeof el !== 'string') return [el]; const parts = el.split('全息投影仪闪烁着蓝光'); const res = []; parts.forEach((part, i) => { res.push(part); if (i < parts.length - 1) res.push(<span key={`vfx-${i}`} className="bg-blue-500/20 text-blue-400 border-b border-blue-500 px-1 mx-1 rounded cursor-pointer">全息投影仪闪烁着蓝光</span>); }); return res; });
                return elements;
                };

                return (

                            </button>

                        </div>

                                <div className="flex-1 min-w-0">
                                <div className="flex gap-1 lg:gap-1.5 mb-1 lg:mb-1.5"><span className={`text-[7px] lg:text-[8px] px-1 lg:px-1.5 py-0.5 rounded text-gray-300 ${bTheme.panel}`}>{shot.size}</span><span className={`text-[7px] lg:text-[8px] px-1 lg:px-1.5 py-0.5 rounded text-gray-300 ${bTheme.panel}`}>{shot.movement}</span></div>
                                <p className="text-[9px] lg:text-[10px] text-gray-300 line-clamp-2 lg:truncate">{shot.description}</p>
                                </div>
                                {shot.status === 'completed' && <CheckCircle size={12} className="text-emerald-500 mt-1 lg:w-[14px] lg:h-[14px] shrink-0"/>}
                            </div>
                            ))
                        )}
                        </div>
                    </div>

                    <div className={`flex-1 flex-col overflow-y-auto p-4 lg:p-10 custom-scrollbar touch-pan-y min-h-0 ${mobileTab === 'right' ? 'flex' : 'hidden'} lg:flex ${bTheme.root}`}>
                        {activeShot && activeLogState ? (
                        <div className="max-w-6xl mx-auto w-full">
                            <div className={`border lg:border-2 rounded-2xl lg:rounded-[2rem] p-5 lg:p-8 mb-6 lg:mb-8 shadow-2xl relative overflow-hidden flex flex-col lg:flex-row lg:justify-between items-start lg:items-end gap-6 lg:gap-0 ${bTheme.card} ${bTheme.border}`}>
                            <div className="absolute top-0 left-0 right-0 h-2 lg:h-4 bg-[repeating-linear-gradient(45deg,#000,#000_20px,#fff_20px,#fff_40px)] opacity-20"></div>
                            <div className="pt-2 lg:pt-4 flex-1 w-full">
                                <div className="flex flex-wrap items-center gap-2 lg:gap-3 mb-3 lg:mb-4">
                                <span className="bg-red-500 text-white text-[8px] lg:text-[10px] font-black uppercase px-2 lg:px-3 py-0.5 lg:py-1 rounded-full animate-pulse flex items-center gap-1"><span className="w-1 lg:w-1.5 h-1 lg:h-1.5 bg-white rounded-full"></span> LIVE SLATE</span>
                                <span className={`${tColor.text} text-[8px] lg:text-[10px] font-bold uppercase tracking-widest`}>{activeDay?.title}</span>
                                </div>
                                <h2 className="text-xl lg:text-3xl font-black text-white uppercase tracking-tighter mb-1.5 lg:mb-2">SHOT: {activeShot.size} / {activeShot.angle}</h2>
                                <p className="text-gray-400 text-xs lg:text-sm max-w-2xl leading-relaxed line-clamp-3 lg:line-clamp-none">"{activeShot.description}"</p>
                            </div>
                            <div className={`flex flex-col items-center p-4 lg:p-5 rounded-2xl lg:rounded-3xl border shadow-inner w-full lg:w-auto lg:min-w-[160px] ${bTheme.panel} ${bTheme.border}`}>
                                <span className="text-[9px] lg:text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-1">Current Take</span>
                                <div className="flex items-center justify-between lg:justify-center gap-4 lg:gap-6 w-full">
                                <button onClick={() => updateTakeCount(activeShot.id, -1)} className={`w-10 h-10 lg:w-8 lg:h-8 rounded-full text-white hover:bg-red-500/50 hover:text-red-400 font-bold ${bTheme.card}`}>-</button>
                                <span className={`text-5xl lg:text-6xl font-mono font-black ${tColor.text}`}>{String(activeLogState.currentTake).padStart(2, '0')}</span>
                                <button onClick={() => updateTakeCount(activeShot.id, 1)} className={`w-10 h-10 lg:w-8 lg:h-8 rounded-full text-white hover:bg-emerald-500/50 hover:text-emerald-400 font-bold ${bTheme.card}`}>+</button>
                                </div>
                            </div>
                            </div>

                            <div className={`border rounded-2xl lg:rounded-3xl p-4 lg:p-6 mb-6 lg:mb-8 ${bTheme.card} bg-opacity-50 ${bTheme.border}`}>
                            <div className="flex items-center justify-between mb-4 lg:mb-6">
                                <h3 className="text-xs lg:text-sm font-bold text-white uppercase tracking-widest flex items-center gap-1.5 lg:gap-2"><Camera size={14} className={`lg:w-4 lg:h-4 ${tColor.text}`}/> 机位参数 (Active Inputs)</h3>
                            </div>
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 lg:gap-6">
                                {['A', 'B', 'C'].map(cam => {
                                const camDraft = activeLogState.draft[cam];
                                const activeColor = cam === 'A' ? 'border-red-500/30' : cam === 'B' ? 'border-blue-500/30' : 'border-emerald-500/30';
                                const labelColor = cam === 'A' ? 'text-red-400' : cam === 'B' ? 'text-blue-400' : 'text-emerald-400';

                                return (
                                    <div key={`cam-${cam}`} className={`border-2 rounded-xl lg:rounded-2xl p-4 lg:p-5 bg-black/40 ${activeColor} relative shadow-inner`}>
                                    <input type="text" value={camNames[cam]} onChange={(e) => handleUpdateCamName(cam, e.target.value)} className={`w-full bg-transparent text-base lg:text-lg font-black uppercase tracking-widest ${labelColor} mb-3 lg:mb-4 border-b border-transparent hover:border-gray-700 focus:border-current outline-none transition-colors`} />
                                    <div className="space-y-3 lg:space-y-4">
                                        <div><label className="block text-[11px] lg:text-xs uppercase font-bold text-gray-500 mb-1">Clip File (文件名)</label><input type="text" value={camDraft.clip || ''} onChange={e => handleLogChange(activeShot.id, cam, 'clip', e.target.value)} className={`w-full border rounded-lg px-3 py-3 lg:py-2.5 text-base lg:text-sm text-gray-100 focus:${tColor.border} outline-none font-mono tracking-wider shadow-inner ${bTheme.panel} ${bTheme.border} h-12 lg:h-10`} placeholder={`e.g. ${cam}001_C001`} /></div>
                                        <div className="flex gap-3 lg:gap-4">
                                        <div className="w-1/2"><label className="block text-[11px] lg:text-xs uppercase font-bold text-gray-500 mb-1">Roll</label><input type="text" value={camDraft.roll || ''} onChange={e => handleLogChange(activeShot.id, cam, 'roll', e.target.value)} className={`w-full border rounded-lg px-3 py-3 lg:py-2.5 text-base lg:text-sm text-white focus:${tColor.border} outline-none uppercase font-mono ${bTheme.panel} ${bTheme.border} h-12 lg:h-10`} placeholder={`${cam}001`} /></div>
                                        <div className="w-1/2"><label className="block text-[11px] lg:text-xs uppercase font-bold text-gray-500 mb-1">Lens (mm)</label><input type="text" value={camDraft.lens || ''} onChange={e => handleLogChange(activeShot.id, cam, 'lens', e.target.value)} className={`w-full border rounded-lg px-3 py-3 lg:py-2.5 text-base lg:text-sm text-white focus:${tColor.border} outline-none ${bTheme.panel} ${bTheme.border} h-12 lg:h-10`} placeholder="35" /></div>
                                        </div>
                                        <div><label className="block text-[11px] lg:text-xs uppercase font-bold text-gray-500 mb-1">Camera Note</label><textarea value={camDraft.note || ''} onChange={e => handleLogChange(activeShot.id, cam, 'note', e.target.value)} className={`w-full h-20 lg:h-20 border rounded-lg p-3 lg:p-2.5 text-sm lg:text-xs text-white focus:${tColor.border} outline-none resize-none ${bTheme.panel} ${bTheme.border}`} placeholder="焦点/构图备注..." /></div>
                                    </div>
                                    </div>
                                );
                                })}
                            </div>
                            <div className={`mt-6 lg:mt-8 flex flex-col lg:flex-row justify-center gap-3 lg:gap-6 pt-4 lg:pt-6 border-t ${bTheme.border}`}>
                                <button onClick={() => handleCommitTake(activeShot.id, 'NG')} className="w-full lg:w-auto px-6 lg:px-10 py-3 lg:py-4 bg-red-600 hover:bg-red-500 text-white font-black uppercase tracking-[0.1em] lg:tracking-[0.2em] text-xs lg:text-sm rounded-xl lg:rounded-2xl flex justify-center items-center gap-2 lg:gap-3 shadow-[0_0_15px_rgba(220,38,38,0.3)] transition-all active:scale-95"><XCircle size={16} className="lg:w-5 lg:h-5"/> 标记 NG (废片)</button>
                                <button onClick={() => handleCommitTake(activeShot.id, 'CIRCLE')} className="w-full lg:w-auto px-6 lg:px-10 py-3 lg:py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-black uppercase tracking-[0.1em] lg:tracking-[0.2em] text-xs lg:text-sm rounded-xl lg:rounded-2xl flex justify-center items-center gap-2 lg:gap-3 shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-all active:scale-95"><CheckCircle size={16} className="lg:w-5 lg:h-5"/> 标记 CIRCLE (保条)</button>
                            </div>
                            </div>

                            <div className={`border rounded-2xl lg:rounded-3xl overflow-hidden mb-8 lg:mb-12 ${bTheme.panel} ${bTheme.border}`}>
                            <div className={`p-4 lg:p-5 border-b flex justify-between items-center ${bTheme.card} ${bTheme.border}`}><h3 className="text-xs lg:text-sm font-bold text-white uppercase tracking-widest flex items-center gap-1.5 lg:gap-2"><ListChecks size={14} className={`lg:w-4 lg:h-4 ${tColor.text}`}/> Take History (场记流水)</h3><span className="text-[10px] lg:text-xs text-gray-500 font-mono">Total Takes: {activeLogState.history.length}</span></div>
                            {activeLogState.history.length === 0 ? (
                                <div className="p-8 lg:p-10 text-center text-gray-600 text-xs lg:text-sm">此镜头暂无打板记录，在上方录入信息并点击标记按钮。</div>
                            ) : (
                                <div className="overflow-x-auto custom-scrollbar">
                                <table className="w-full text-left border-collapse text-xs lg:text-sm min-w-[500px]">
                                <thead><tr className={`border-b text-[9px] lg:text-[10px] text-gray-400 uppercase tracking-wider ${bTheme.card} ${bTheme.border}`}><th className="py-2.5 lg:py-3 px-3 lg:px-5 font-bold w-12 lg:w-16">Take</th><th className="py-2.5 lg:py-3 px-3 lg:px-5 font-bold w-20 lg:w-24">Status</th><th className={`py-2.5 lg:py-3 px-3 lg:px-5 font-bold border-l w-1/3 ${bTheme.border}`}>{camNames.A}</th><th className={`py-2.5 lg:py-3 px-3 lg:px-5 font-bold border-l w-1/3 ${bTheme.border}`}>{camNames.B}</th><th className={`py-2.5 lg:py-3 px-3 lg:px-5 font-bold border-l w-1/3 ${bTheme.border}`}>{camNames.C}</th></tr></thead>
                                <tbody className={`divide-y ${bTheme.border}`}>
                                    {activeLogState.history.map(tk => (
                                    <tr key={tk.id} className={`hover:${bTheme.card} transition-colors group/take`}>
                                        <td className="py-3 lg:py-4 px-3 lg:px-5 font-mono text-base lg:text-lg font-black text-white relative">
                                            {/* 删除单条 Take 功能 */}
                                            <button onClick={() => handleDeleteTake(activeShot.id, tk.id)} className="absolute left-0 top-1/2 -translate-y-1/2 ml-0.5 p-1 text-gray-600 hover:text-red-500 lg:opacity-0 lg:group-hover/take:opacity-100 transition-opacity bg-black/50 rounded shadow-md"><Trash2 size={12}/></button>
                                            <span className="ml-5">{String(tk.takeNum).padStart(2,'0')}</span>
                                        </td>
                                        <td className="py-3 lg:py-4 px-3 lg:px-5">
                                        {tk.status === 'CIRCLE' ? <span className="text-emerald-500 font-black uppercase text-[10px] lg:text-xs flex items-center gap-1 lg:gap-1.5 bg-emerald-500/10 px-1.5 lg:px-2 py-1 rounded w-max"><div className="w-1.5 h-1.5 lg:w-2 lg:h-2 rounded-full border border-emerald-500 lg:border-2"></div> CIRCLE</span> : <span className="text-red-500 font-bold uppercase text-[10px] lg:text-xs flex items-center gap-1 line-through bg-red-500/10 px-1.5 lg:px-2 py-1 rounded w-max"><XCircle size={10} className="lg:w-3 lg:h-3"/> NG</span>}
                                        </td>
                                        {['A', 'B', 'C'].map(c => (
                                        <td key={`${tk.id}-${c}`} className={`py-2.5 lg:py-3 px-3 lg:px-5 border-l align-top ${bTheme.border}`}>
                                            <div className="space-y-1">
                                                {/* 核心修复：就算清空，占位符也存在，永不消失的输入框 */}
                                                <input 
                                                    type="text" 
                                                    value={tk.cams[c].clip || ''} 
                                                    onChange={(e) => handleEditTakeClip(activeShot.id, tk.id, c, e.target.value)}
                                                    className={`font-mono text-[10px] lg:text-xs ${tColor.textLight} break-all bg-black/40 p-1 lg:p-1.5 rounded w-full border border-transparent hover:border-gray-600 focus:border-cyan-500 outline-none transition-colors placeholder-gray-600 placeholder-italic`}
                                                    title="点击修改文件名"
                                                    placeholder="[未录入]"
                                                />
                                                <div className="flex flex-col sm:flex-row gap-1 sm:gap-2 text-[8px] lg:text-[9px] text-gray-500 font-bold uppercase px-1"><span>R: {tk.cams[c].roll || '-'}</span> <span>L: {tk.cams[c].lens || '-'}</span></div>
                                                {tk.cams[c].note && <div className={`text-[9px] lg:text-[10px] text-gray-400 italic leading-snug mt-1 border-l-2 pl-1.5 ${bTheme.border}`}>{tk.cams[c].note}</div>}
                                            </div>
                                        </td>
                                        ))}
                                    </tr>
                                    ))}
                                </tbody>
                                </table>
                                </div>
                            )}
                            </div>

                            <div className="flex justify-center lg:justify-end pb-8 lg:pb-12 px-4 lg:px-0">
                            <button onClick={() => toggleShotCompletion(activeShot.id)} className={`w-full lg:w-auto px-6 lg:px-8 py-3 lg:py-4 rounded-xl font-black uppercase tracking-widest text-xs lg:text-sm flex justify-center items-center gap-2 transition-all ${activeShot.status === 'completed' ? `text-gray-400 border ${bTheme.card} ${bTheme.border}` : `${tColor.bg} ${tColor.bgHover} text-white ${tColor.shadow}`}`}>
                                {activeShot.status === 'completed' ? '撤销杀青 (Undo Wrap)' : <><CheckCircle size={16} className="lg:w-[18px] lg:h-[18px]"/> 确认此镜头完成 (Wrap Shot)</>}
                            </button>
                            </div>
                        </div>
                        ) : (
                        <div className="h-full flex flex-col items-center justify-center text-gray-600 px-4 text-center"><Clapperboard size={48} className="lg:w-16 lg:h-16 mb-3 lg:mb-4 opacity-20" /><p className="text-xs lg:text-sm font-bold">请选择要执行的镜头</p></div>
                        )}
                    </div>
                    </div>
                </div>
                );
            };

            const renderActiveModule = () => {
                switch(activeModule) {
                case 'project-setup': return renderProjectSetup();
                case 'dashboard': return renderDashboardWorkspace();
                case 'script': return renderScriptModule(); 
                case 'breakdown': return renderBreakdownWorkspace();
                case 'repository': return renderRepositoryWorkspace();
                case 'schedule': return renderScheduleWorkspace(); 
                case 'execution': return renderExecutionWorkspace();
                default: return <div className="flex-1 flex items-center justify-center text-gray-500 bg-[#0B0F19]">模块加载异常</div>;
                }
            };

            if (showSplash) {
                return (
                <div className={`flex h-screen w-full items-center justify-center bg-[#020617] overflow-hidden relative font-sans ${bgTheme === 'paper' ? 'theme-paper' : ''} ${bgTheme === 'sepia' ? 'theme-sepia' : ''}`}>
                    <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-cyan-900/20 via-black to-black"></div>
                    <div className="z-10 flex flex-col items-center animate-in fade-in zoom-in-95 duration-1000 p-6 text-center">
                    <div className="w-20 h-20 lg:w-24 lg:h-24 bg-gray-900 border-2 border-gray-800 rounded-2xl lg:rounded-[2rem] flex items-center justify-center shadow-2xl mb-6 lg:mb-8 relative overflow-hidden group">
                        <div className="absolute inset-0 bg-cyan-500/10 animate-pulse"></div>
                        <Clapperboard size={40} className={`lg:w-12 lg:h-12 text-cyan-500 drop-shadow-[0_0_15px_rgba(6,182,212,0.5)]`} />
                    </div>
                    <h1 className="text-4xl lg:text-7xl font-black text-white tracking-tighter mb-3 lg:mb-4 flex items-center justify-center flex-wrap">
                        <span className="text-gray-300 font-serif tracking-[0.2em] mr-4 lg:mr-6 text-3xl lg:text-5xl shrink-0">寰影</span>
                        <span>CineFlow<span className="text-cyan-500 ml-1">Pro</span></span>
                    </h1>
                    <div className="flex flex-col sm:flex-row items-center gap-2 lg:gap-4 mt-2">
                        <span className="text-[10px] lg:text-sm font-mono text-gray-400 tracking-[0.3em] lg:tracking-[0.4em] uppercase">Digital Production OS</span>
                        <span className="px-2 py-0.5 bg-cyan-500/10 text-cyan-400 text-[9px] lg:text-[10px] font-black rounded border border-cyan-500/30">v1.8.1 Ultimate</span>
                    </div>
                    <div className="w-48 lg:w-64 h-1 bg-gray-800 rounded-full mt-10 lg:mt-16 overflow-hidden relative">
                        <div className="absolute top-0 left-0 h-full bg-cyan-500 shadow-[0_0_10px_rgba(6,182,212,0.8)] animate-[loading_2.5s_ease-in-out_forwards]"></div>
                    </div>
                    <div className="mt-4 text-[8px] lg:text-[9px] font-mono text-gray-600 uppercase tracking-widest animate-pulse">
                        Initializing Pipeline Engine...
                    </div>
                    </div>
                </div>
                );
            }

            return (
                <div className={`flex flex-col lg:flex-row h-[100dvh] w-full font-sans text-gray-100 overflow-hidden ${bTheme.root} ${bgTheme === 'paper' ? 'theme-paper' : ''} ${bgTheme === 'sepia' ? 'theme-sepia' : ''}`}>
                    {renderSidebar()}
                    <div className="flex-1 flex flex-col h-full min-w-0 pb-[65px] lg:pb-0 relative">
                        {renderHeader()}
                        {renderActiveModule()}
                        {renderMobileNav()}
                    </div>
                    {renderSystemSettingsModal()}
                    {renderModal()}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
